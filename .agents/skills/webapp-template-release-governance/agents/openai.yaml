interface:
  display_name: "Webapp Template Release Governance"
  short_description: "发布/版本/回滚 Release / 发布质量门禁"
  default_prompt: "Use $webapp-template-release-governance 按中文主线 + English anchors 处理：先收敛真源、范围、验证和风险；执行发布质量门禁（含边界清晰、合理严谨、模块化、高内聚、低耦合、单一职责），绑定 commit/tag/image/migration/target evidence，控制最小发布面、低配服务器不构建、health/ready/smoke、rollback point、清理边界和 docs/progress 同步。"
