interface:
  display_name: "Webapp Template Page Design Governance"
  short_description: "页面设计治理 Page / 页面质量门禁"
  default_prompt: "Use $webapp-template-page-design-governance 按中文主线 + English anchors 处理：先收敛真源、范围、验证和风险；执行页面质量门禁（含语义清晰、职业任务文案、边界清晰、合理严谨、模块化、高内聚、低耦合、单一职责），评估页面主任务、功能细节、信息密度、真实后端/RBAC 支撑、字段残值/缺值、可访问性和浏览器回归，优先复用共享组件并避免页面私有真源。"
