name: webapp-template-prod

services:
  postgres:
    image: postgres:18
    container_name: "${PROJECT_SLUG:-webapp-template}-postgres"
    restart: always
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-replace-me}"
      POSTGRES_DB: "${POSTGRES_DB:-webapp_template}"
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
    mem_limit: "${POSTGRES_MEM_LIMIT:-256m}"
    mem_reservation: "${POSTGRES_MEM_RESERVATION:-128m}"
    volumes:
      - "${POSTGRES_DATA_DIR:-/data/your-project/postgres}:/var/lib/postgresql"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
    networks: {}

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: "${PROJECT_SLUG:-webapp-template}-jaeger"
    restart: always
    ports:
      - "${JAEGER_5775_PORT:-15775}:5775/udp"
      - "${JAEGER_6831_PORT:-16831}:6831/udp"
      - "${JAEGER_6832_PORT:-16832}:6832/udp"
      - "${JAEGER_5778_PORT:-15778}:5778"
      - "${JAEGER_UI_PORT:-16687}:16686"
      - "${JAEGER_14268_PORT:-24268}:14268"
      - "${JAEGER_14250_PORT:-24250}:14250"
      - "${JAEGER_9411_PORT:-19411}:9411"
      - "${JAEGER_OTLP_GRPC_PORT:-14317}:4317"
      - "${JAEGER_OTLP_HTTP_PORT:-14318}:4318"
    environment:
      PROMETHEUS_QUERY_SUPPORT_SPANMETRICS_CONNECTOR: true
      METRICS_STORAGE_TYPE: prometheus
      PROMETHEUS_SERVER_URL: "${PROMETHEUS_SERVER_URL:-http://prometheus:9090}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: "${JAEGER_MEM_LIMIT:-96m}"
    mem_reservation: "${JAEGER_MEM_RESERVATION:-48m}"
    networks: {}

  app-server:
    image: "${APP_IMAGE:-webapp-template-server:dev}"
    container_name: "${PROJECT_SLUG:-webapp-template}-server"
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_started
    ports:
      - "${APP_HTTP_PORT:-8200}:8000"
      - "${APP_GRPC_PORT:-9200}:9000"
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
      # 设计意图：默认 DSN 必须与本项目 prod 配置保持一致，避免 .env 未显式覆盖时误连占位库名或占位密码。
      POSTGRES_DSN: "${POSTGRES_DSN:-postgres://postgres:replace-me@postgres:5432/webapp_template?sslmode=disable}"
      TRACE_ENDPOINT: "${TRACE_ENDPOINT:-jaeger:4318}"
    mem_limit: "${APP_MEM_LIMIT:-160m}"
    mem_reservation: "${APP_MEM_RESERVATION:-80m}"
    networks: {}
