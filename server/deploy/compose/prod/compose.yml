services:
  mysql:
    image: mysql:8
    container_name: "${PROJECT_SLUG:-your-project}-mysql"
    restart: always
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-replace-me}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-app}"
      MYSQL_USER: "${MYSQL_USER:-app_user}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:-replace-me}"
    mem_limit: 512m
    mem_reservation: 256m
    volumes:
      - "${MYSQL_DATA_DIR:-/data/your-project/mysql/data}:/var/lib/mysql"
      - "${MYSQL_CONF_FILE:-/data/your-project/mysql/conf/mysql8.cnf}:/etc/mysql/conf.d/mysql8.cnf:ro"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
    networks: {}

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: "${PROJECT_SLUG:-your-project}-jaeger"
    restart: always
    ports:
      - "${JAEGER_5775_PORT:-15775}:5775/udp"
      - "${JAEGER_6831_PORT:-16831}:6831/udp"
      - "${JAEGER_6832_PORT:-16832}:6832/udp"
      - "${JAEGER_5778_PORT:-15778}:5778"
      - "${JAEGER_UI_PORT:-16687}:16686"
      - "${JAEGER_14268_PORT:-24268}:14268"
      - "${JAEGER_14250_PORT:-24250}:14250"
      - "${JAEGER_9411_PORT:-19411}:9411"
      - "${JAEGER_OTLP_GRPC_PORT:-14317}:4317"
      - "${JAEGER_OTLP_HTTP_PORT:-14318}:4318"
    environment:
      PROMETHEUS_QUERY_SUPPORT_SPANMETRICS_CONNECTOR: true
      METRICS_STORAGE_TYPE: prometheus
      PROMETHEUS_SERVER_URL: "${PROMETHEUS_SERVER_URL:-http://prometheus:9090}"
    mem_limit: 192m
    mem_reservation: 96m
    networks: {}

  app-server:
    image: "${APP_IMAGE:-your-project-server:dev}"
    container_name: "${PROJECT_SLUG:-your-project}-server"
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      jaeger:
        condition: service_started
    ports:
      - "${APP_HTTP_PORT:-8200}:8000"
      - "${APP_GRPC_PORT:-9200}:9000"
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
    mem_limit: 128m
    mem_reservation: 64m
    networks: {}
