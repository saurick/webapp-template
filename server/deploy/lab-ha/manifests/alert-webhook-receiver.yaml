apiVersion: v1
kind: ConfigMap
metadata:
  name: alert-webhook-receiver-app
  namespace: monitoring
data:
  receiver.py: |
    #!/usr/bin/env python3
    import json
    import logging
    import os
    import ssl
    import threading
    import uuid
    from collections import deque
    from datetime import datetime, timezone
    from http import HTTPStatus
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer
    from pathlib import Path
    from urllib.error import HTTPError, URLError
    from urllib.parse import parse_qs, urlparse
    from urllib.request import Request, urlopen

    DATA_PATH = Path(os.getenv("DATA_PATH", "/data/alerts.jsonl"))
    OPS_STATE_DIR = DATA_PATH.parent / "ops-state"
    MAX_EVENTS = int(os.getenv("MAX_EVENTS", "200"))
    MAX_BODY_BYTES = int(os.getenv("MAX_BODY_BYTES", str(2 * 1024 * 1024)))
    K8S_TOKEN_PATH = Path("/var/run/secrets/kubernetes.io/serviceaccount/token")
    K8S_CA_PATH = Path("/var/run/secrets/kubernetes.io/serviceaccount/ca.crt")
    K8S_API_HOST = os.getenv("KUBERNETES_SERVICE_HOST", "kubernetes.default.svc")
    K8S_API_PORT = os.getenv("KUBERNETES_SERVICE_PORT_HTTPS", "443")
    K8S_API_BASE = f"https://{K8S_API_HOST}:{K8S_API_PORT}"
    LIVE_STATUS_TIMEOUT_SECONDS = float(os.getenv("LIVE_STATUS_TIMEOUT_SECONDS", "3"))
    STORE_LOCK = threading.Lock()
    EVENTS = deque(maxlen=MAX_EVENTS)
    BOOT_NODE_ORDER = [
        {"name": "node3", "ip": "192.168.0.128", "order": 1},
        {"name": "node2", "ip": "192.168.0.108", "order": 2},
        {"name": "node1", "ip": "192.168.0.7", "order": 3},
    ]
    SHUTDOWN_NODE_ORDER = [
        {"name": "node1", "ip": "192.168.0.7", "order": 1},
        {"name": "node2", "ip": "192.168.0.108", "order": 2},
        {"name": "node3", "ip": "192.168.0.128", "order": 3},
    ]
    PORTAL_ENTRY_NODE = {"name": "node2", "ip": "192.168.0.108"}
    BOOT_WORKLOAD_GROUPS = [
        {
            "key": "portal",
            "label": "Portal",
            "namespace": "lab-portal",
            "requirements": [{"prefix": "lab-portal-", "label": "portal", "min_ready": 1}],
        },
        {
            "key": "database",
            "label": "PostgreSQL",
            "namespace": "database",
            "requirements": [{"prefix": "app-pg-", "label": "cluster", "min_ready": 1}],
        },
        {
            "key": "harbor",
            "label": "Harbor",
            "namespace": "harbor",
            "requirements": [
                {"prefix": "harbor-core-", "label": "core", "min_ready": 1},
                {"prefix": "harbor-database-", "label": "database", "min_ready": 1},
                {"prefix": "harbor-redis-", "label": "redis", "min_ready": 1},
                {"prefix": "harbor-registry-", "label": "registry", "min_ready": 1},
                {"prefix": "harbor-jobservice-", "label": "jobservice", "min_ready": 1},
            ],
        },
        {
            "key": "grafana",
            "label": "Grafana",
            "namespace": "monitoring",
            "requirements": [{"prefix": "kube-prometheus-stack-grafana-", "label": "grafana", "min_ready": 1}],
        },
        {
            "key": "alert-sink",
            "label": "Alert Sink",
            "namespace": "monitoring",
            "requirements": [{"prefix": "alert-webhook-receiver-", "label": "alert-sink", "min_ready": 1}],
        },
        {
            "key": "webapp-lab",
            "label": "WebApp Lab",
            "namespace": "webapp",
            "requirements": [{"prefix": "webapp-template-", "label": "lab", "min_ready": 1}],
        },
        {
            "key": "prod-trial",
            "label": "Prod-Trial",
            "namespace": "webapp-prod-trial",
            "requirements": [{"prefix": "webapp-template-prod-trial-", "label": "active+preview", "min_ready": 2}],
        },
    ]
    BOOT_PROBE_URLS = [
        {"key": "portal", "label": "Portal", "url": "http://192.168.0.108:30088/"},
        {"key": "lab", "label": "WebApp Lab", "url": "http://192.168.0.108:32668/readyz"},
        {"key": "active", "label": "Prod-Trial Active", "url": "http://192.168.0.108:30089/readyz"},
        {"key": "preview", "label": "Prod-Trial Preview", "url": "http://192.168.0.108:30091/readyz"},
        {"key": "grafana", "label": "Grafana", "url": "http://192.168.0.108:30081/login"},
        {"key": "alertmanager", "label": "Alertmanager", "url": "http://192.168.0.108:30093/"},
        {"key": "gitlab", "label": "GitLab", "url": "http://192.168.0.108:8929/users/sign_in"},
    ]

    logging.basicConfig(
        level=os.getenv("LOG_LEVEL", "INFO").upper(),
        format="%(asctime)s %(levelname)s %(message)s",
    )
    LOGGER = logging.getLogger("alert-webhook-receiver")

    INDEX_HTML = """<!doctype html>
    <html lang="zh-CN">
    <head>
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1" />
      <title>Alert Sink</title>
      <style>
        :root {
          color-scheme: light;
          --bg: #f5f7fb;
          --card: #ffffff;
          --text: #162033;
          --muted: #60708a;
          --border: #d7deea;
          --ok: #1f7a43;
          --warn: #b26b00;
          --danger: #b42318;
        }
        * { box-sizing: border-box; }
        body {
          margin: 0;
          font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
          background: linear-gradient(180deg, #eef3fb 0%, var(--bg) 100%);
          color: var(--text);
        }
        .wrap {
          max-width: 1100px;
          margin: 0 auto;
          padding: 24px;
        }
        .hero, .summary, .event {
          background: var(--card);
          border: 1px solid var(--border);
          border-radius: 16px;
          box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
        }
        .hero {
          padding: 20px 24px;
          margin-bottom: 20px;
        }
        .hero h1 {
          margin: 0 0 8px;
          font-size: 28px;
        }
        .hero p {
          margin: 0;
          color: var(--muted);
          line-height: 1.6;
        }
        .hero .links {
          margin-top: 12px;
          display: flex;
          gap: 12px;
          flex-wrap: wrap;
        }
        .hero a {
          color: #175cd3;
          text-decoration: none;
          font-weight: 600;
        }
        .summaries {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
          gap: 14px;
          margin-bottom: 20px;
        }
        .summary {
          padding: 16px;
        }
        .summary small {
          display: block;
          color: var(--muted);
          margin-bottom: 8px;
        }
        .summary strong {
          font-size: 24px;
          display: block;
        }
        .summary .ok { color: var(--ok); }
        .summary .warn { color: var(--warn); }
        .summary .danger { color: var(--danger); }
        .toolbar {
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 12px;
          gap: 12px;
          flex-wrap: wrap;
        }
        .toolbar button {
          border: 1px solid var(--border);
          background: var(--card);
          border-radius: 999px;
          padding: 8px 14px;
          cursor: pointer;
        }
        .toolbar .muted {
          color: var(--muted);
          font-size: 14px;
        }
        .events {
          display: grid;
          gap: 14px;
        }
        .event {
          padding: 16px;
        }
        .event header {
          display: flex;
          justify-content: space-between;
          gap: 12px;
          flex-wrap: wrap;
          margin-bottom: 10px;
        }
        .event h2 {
          margin: 0;
          font-size: 18px;
        }
        .meta {
          color: var(--muted);
          font-size: 14px;
          line-height: 1.6;
        }
        .chips {
          display: flex;
          gap: 8px;
          flex-wrap: wrap;
          margin: 10px 0 12px;
        }
        .chip {
          border-radius: 999px;
          padding: 4px 10px;
          background: #eef2f8;
          color: var(--text);
          font-size: 13px;
        }
        .chip.firing { background: #fee4e2; color: var(--danger); }
        .chip.resolved { background: #dcfae6; color: var(--ok); }
        .chip.alertmanager { background: #dff7e6; color: var(--ok); }
        .chip.smoke { background: #fff2d7; color: var(--warn); }
        .chip.manual { background: #e7ecf5; color: var(--muted); }
        details {
          border-top: 1px solid var(--border);
          padding-top: 12px;
        }
        pre {
          white-space: pre-wrap;
          word-break: break-word;
          background: #0f172a;
          color: #e2e8f0;
          padding: 12px;
          border-radius: 12px;
          overflow: auto;
        }
        .empty {
          padding: 20px;
          background: var(--card);
          border: 1px dashed var(--border);
          border-radius: 16px;
          color: var(--muted);
        }
      </style>
    </head>
    <body>
      <div class="wrap">
        <section class="hero">
          <h1>Alert Sink</h1>
          <p>当前页面会保留最近收到的 Alertmanager webhook payload，并把这份轻量留痕落到小容量磁盘，方便值班时在 Pod 重启后继续确认“哪条告警、何时开始、发给了哪个 receiver”。这不是长期告警真源；正式历史仍以 Alertmanager 和 Prometheus 为准。</p>
          <div class="links">
            <a href="http://192.168.0.108:30093" target="_blank" rel="noreferrer">打开 Alertmanager</a>
            <a href="http://192.168.0.108:30081/d/lab-ha-service-governance/ha-lab-service-governance" target="_blank" rel="noreferrer">打开服务治理看板</a>
          </div>
        </section>
        <section class="summaries">
          <div class="summary"><small>已缓存事件</small><strong id="summary-count">0</strong></div>
          <div class="summary"><small>真实告警</small><strong id="summary-real">0</strong></div>
          <div class="summary"><small>手工样本</small><strong id="summary-sample">0</strong></div>
          <div class="summary"><small>最近状态</small><strong id="summary-status">无</strong></div>
          <div class="summary"><small>最近 receiver</small><strong id="summary-receiver">无</strong></div>
          <div class="summary"><small>最近时间</small><strong id="summary-time">无</strong></div>
        </section>
        <div class="toolbar">
          <div class="muted" id="updated-at">等待首个 payload...</div>
          <button id="refresh-btn" type="button">刷新</button>
        </div>
        <section class="events" id="events"></section>
      </div>
      <script>
        const countEl = document.getElementById('summary-count');
        const realCountEl = document.getElementById('summary-real');
        const sampleCountEl = document.getElementById('summary-sample');
        const statusEl = document.getElementById('summary-status');
        const receiverEl = document.getElementById('summary-receiver');
        const timeEl = document.getElementById('summary-time');
        const updatedAtEl = document.getElementById('updated-at');
        const eventsEl = document.getElementById('events');
        const refreshBtn = document.getElementById('refresh-btn');

        const fmtTime = (value) => {
          if (!value) return '无';
          try {
            return new Date(value).toLocaleString();
          } catch (err) {
            return value;
          }
        };

        const renderEvents = (items) => {
          if (!Array.isArray(items) || items.length === 0) {
            eventsEl.innerHTML = '<div class="empty">最近还没有收到 webhook payload。若 Alertmanager 当前无新告警，可先看 Alertmanager 自身页面确认是否有 active alert。</div>';
            countEl.textContent = '0';
            realCountEl.textContent = '0';
            sampleCountEl.textContent = '0';
            statusEl.textContent = '无';
            receiverEl.textContent = '无';
            timeEl.textContent = '无';
            updatedAtEl.textContent = '尚未收到 payload';
            return;
          }

          const latest = items[0];
          const stats = items.reduce((acc, item) => {
            const source = item.summary && item.summary.source_type ? item.summary.source_type : 'manual';
            acc[source] = (acc[source] || 0) + 1;
            return acc;
          }, { alertmanager: 0, smoke: 0, manual: 0 });
          countEl.textContent = String(items.length);
          realCountEl.textContent = String(stats.alertmanager || 0);
          sampleCountEl.textContent = String((stats.smoke || 0) + (stats.manual || 0));
          statusEl.textContent = latest.summary.status || 'unknown';
          receiverEl.textContent = latest.summary.receiver || 'unknown';
          timeEl.textContent = fmtTime(latest.received_at);
          updatedAtEl.textContent = `最后刷新：${new Date().toLocaleString()}`;

          eventsEl.innerHTML = items.map((item) => {
            const alertNames = (item.summary.alert_names || []).map((name) => `<span class="chip">${name}</span>`).join('');
            const statusClass = item.summary.status === 'firing' ? 'firing' : (item.summary.status === 'resolved' ? 'resolved' : '');
            const sourceClass = item.summary.source_type || 'manual';
            const sourceLabel = item.summary.source_label || '手工投递';
            return `
              <article class="event">
                <header>
                  <div>
                    <h2>${item.summary.receiver || 'unknown'} / ${item.summary.status || 'unknown'}</h2>
                    <div class="meta">
                      接收时间：${fmtTime(item.received_at)}<br />
                      告警数量：${item.summary.alert_count}<br />
                      来源：${item.remote_addr || '-'}
                    </div>
                  </div>
                  <div class="chips">
                    <span class="chip ${sourceClass}">${sourceLabel}</span>
                    <span class="chip ${statusClass}">${item.summary.status || 'unknown'}</span>
                    <span class="chip">group ${item.summary.group_key || '-'}</span>
                  </div>
                </header>
                <div class="chips">${alertNames || '<span class="chip">无 alertname</span>'}</div>
                <details>
                  <summary>查看完整 payload</summary>
                  <pre>${JSON.stringify(item.payload, null, 2).replace(/[&<>]/g, (ch) => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[ch]))}</pre>
                </details>
              </article>
            `;
          }).join('');
        };

        const fetchAlerts = async () => {
          refreshBtn.disabled = true;
          try {
            const res = await fetch('/api/alerts', { cache: 'no-store' });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            renderEvents(data.events || []);
          } catch (err) {
            updatedAtEl.textContent = `刷新失败：${err.message}`;
          } finally {
            refreshBtn.disabled = false;
          }
        };

        refreshBtn.addEventListener('click', fetchAlerts);
        fetchAlerts();
        setInterval(fetchAlerts, 15000);
      </script>
    </body>
    </html>
    """

    def utc_now_iso():
        return datetime.now(timezone.utc).isoformat()


    def persist_events():
        DATA_PATH.parent.mkdir(parents=True, exist_ok=True)
        with DATA_PATH.open("w", encoding="utf-8") as handle:
            for event in EVENTS:
                handle.write(json.dumps(event, ensure_ascii=False) + "\n")


    def classify_source(payload, user_agent, alert_names):
        receiver = str(payload.get("receiver", "") or "").lower()
        agent = str(user_agent or "")
        agent_lower = agent.lower()
        alert_names_lower = [name.lower() for name in alert_names]
        if agent.startswith("Alertmanager/"):
            return {"type": "alertmanager", "label": "真实告警"}
        if "smoke" in receiver or any("smoke" in name for name in alert_names_lower) or agent_lower.startswith("curl/"):
            return {"type": "smoke", "label": "手工样本"}
        return {"type": "manual", "label": "手工投递"}


    def summarize_payload(payload, user_agent):
        alerts = payload.get("alerts") or []
        alert_names = sorted(
            {
                alert.get("labels", {}).get("alertname", "unknown")
                for alert in alerts
            }
        )
        source = classify_source(payload, user_agent, alert_names)
        return {
            "status": payload.get("status", "unknown"),
            "receiver": payload.get("receiver", "unknown"),
            "group_key": payload.get("groupKey", ""),
            "alert_count": len(alerts),
            "alert_names": alert_names,
            "source_type": source["type"],
            "source_label": source["label"],
        }


    def load_events():
        if not DATA_PATH.exists():
            return
        try:
            for line in DATA_PATH.read_text(encoding="utf-8").splitlines():
                if not line.strip():
                    continue
                event = json.loads(line)
                summary = event.get("summary") or {}
                if "source_type" not in summary or "source_label" not in summary:
                    event["summary"] = summarize_payload(event.get("payload") or {}, event.get("user_agent", ""))
                EVENTS.append(event)
        except Exception as exc:
            LOGGER.warning("load events failed: %s", exc)


    def store_event(payload, remote_addr, user_agent):
        event = {
            "id": str(uuid.uuid4()),
            "received_at": utc_now_iso(),
            "remote_addr": remote_addr,
            "user_agent": user_agent,
            "summary": summarize_payload(payload, user_agent),
            "payload": payload,
        }
        with STORE_LOCK:
            EVENTS.appendleft(event)
            while len(EVENTS) > MAX_EVENTS:
                EVENTS.pop()
            persist_events()
        LOGGER.info(
            "stored webhook receiver=%s status=%s alerts=%s names=%s remote=%s",
            event["summary"]["receiver"],
            event["summary"]["status"],
            event["summary"]["alert_count"],
            ",".join(event["summary"]["alert_names"]),
            remote_addr,
        )
        return event


    def filtered_events(source_filter):
        items = list(EVENTS)
        if not source_filter:
            return items
        return [
            item for item in items
            if (item.get("summary") or {}).get("source_type") == source_filter
        ]


    def read_ops_summary(summary_name):
        if not summary_name or "/" in summary_name or ".." in summary_name:
            return None
        path = OPS_STATE_DIR / f"{summary_name}.json"
        if not path.exists():
            return None
        try:
            data = json.loads(path.read_text(encoding="utf-8"))
            return data if isinstance(data, dict) else None
        except Exception as exc:
            LOGGER.warning("load ops summary %s failed: %s", summary_name, exc)
            return None


    def read_all_ops_summaries():
        if not OPS_STATE_DIR.exists():
            return {}
        items = {}
        for path in sorted(OPS_STATE_DIR.glob("*.json")):
            data = read_ops_summary(path.stem)
            if data is not None:
                items[path.stem] = data
        return items


    def service_account_token():
        if not K8S_TOKEN_PATH.exists():
            raise RuntimeError("service account token not mounted")
        token = K8S_TOKEN_PATH.read_text(encoding="utf-8").strip()
        if not token:
            raise RuntimeError("service account token is empty")
        return token


    def kubernetes_ssl_context():
        if K8S_CA_PATH.exists():
            return ssl.create_default_context(cafile=str(K8S_CA_PATH))
        return ssl.create_default_context()


    def kubernetes_json(path):
        request = Request(
            f"{K8S_API_BASE}{path}",
            headers={
                "Authorization": f"Bearer {service_account_token()}",
                "Accept": "application/json",
            },
        )
        try:
            with urlopen(request, timeout=LIVE_STATUS_TIMEOUT_SECONDS, context=kubernetes_ssl_context()) as response:
                return json.loads(response.read().decode("utf-8"))
        except HTTPError as exc:
            raise RuntimeError(f"kubernetes api http {exc.code} for {path}") from exc
        except URLError as exc:
            raise RuntimeError(f"kubernetes api unavailable for {path}: {exc.reason}") from exc


    def list_namespace_pods(namespace):
        data = kubernetes_json(f"/api/v1/namespaces/{namespace}/pods")
        items = data.get("items")
        return items if isinstance(items, list) else []


    def list_nodes():
        data = kubernetes_json("/api/v1/nodes")
        items = data.get("items")
        return items if isinstance(items, list) else []


    def pod_is_ready(pod):
        status = pod.get("status") or {}
        if status.get("phase") != "Running":
            return False
        container_statuses = status.get("containerStatuses") or []
        if not container_statuses:
            return False
        return all(bool(item.get("ready")) for item in container_statuses)


    def node_is_ready(node):
        status = node.get("status") or {}
        conditions = status.get("conditions") or []
        for condition in conditions:
            if condition.get("type") == "Ready":
                return condition.get("status") == "True"
        return False


    def summarize_requirement(pods, requirement):
        matched = [pod for pod in pods if (pod.get("metadata") or {}).get("name", "").startswith(requirement["prefix"])]
        ready_count = sum(1 for pod in matched if pod_is_ready(pod))
        min_ready = int(requirement.get("min_ready", 1))
        return {
            "label": requirement["label"],
            "ready": ready_count >= min_ready,
            "ready_count": ready_count,
            "min_ready": min_ready,
            "matched": len(matched),
        }


    def summarize_workload_group(group, namespace_pods):
        pods = namespace_pods.get(group["namespace"], [])
        requirement_results = [summarize_requirement(pods, item) for item in group["requirements"]]
        blocked = [item["label"] for item in requirement_results if not item["ready"]]
        return {
            "key": group["key"],
            "label": group["label"],
            "status": "ok" if not blocked else "warn",
            "ready": 0 if blocked else 1,
            "total": 1,
            "blocked": blocked,
        }


    def probe_url(url):
        request = Request(url, headers={"User-Agent": "alert-webhook-receiver/live-ops"})
        try:
            with urlopen(request, timeout=LIVE_STATUS_TIMEOUT_SECONDS) as response:
                return response.status == HTTPStatus.OK, response.status
        except HTTPError as exc:
            return False, exc.code
        except Exception:
            return False, 0


    def build_ordered_nodes(order, node_map):
        ordered_nodes = []
        for node in order:
            live_item = node_map.get(node["name"])
            ready = node_is_ready(live_item or {})
            ordered_nodes.append({
                "name": node["name"],
                "ip": node["ip"],
                "order": node["order"],
                "ready": ready,
                "stopped": not ready,
                "status": "ok" if ready else "warn",
            })
        return ordered_nodes


    def count_contiguous(items, predicate):
        count = 0
        for item in items:
            if predicate(item):
                count += 1
                continue
            break
        return count


    def collect_live_status_snapshot():
        nodes = list_nodes()
        namespace_pods = {
            group["namespace"]: list_namespace_pods(group["namespace"])
            for group in BOOT_WORKLOAD_GROUPS
        }
        node_map = {
            (item.get("metadata") or {}).get("name"): item
            for item in nodes
        }
        boot_nodes = build_ordered_nodes(BOOT_NODE_ORDER, node_map)
        shutdown_nodes = build_ordered_nodes(SHUTDOWN_NODE_ORDER, node_map)
        workload_groups = [summarize_workload_group(group, namespace_pods) for group in BOOT_WORKLOAD_GROUPS]
        core_ready = sum(item["ready"] for item in workload_groups)
        blocked_components = [
            f'{item["label"]}({", ".join(item["blocked"])})' if item["blocked"] else item["label"]
            for item in workload_groups
            if item["status"] != "ok"
        ]

        url_results = []
        url_ok = 0
        for item in BOOT_PROBE_URLS:
            ok, status_code = probe_url(item["url"])
            if ok:
                url_ok += 1
            url_results.append({
                "key": item["key"],
                "label": item["label"],
                "ok": ok,
                "status_code": status_code,
                "status": "ok" if ok else "warn",
            })
        blocked_urls = [item["label"] for item in url_results if not item["ok"]]
        fixed_entry_ready = 1 if any(
            node["name"] == PORTAL_ENTRY_NODE["name"] and node["ready"]
            for node in boot_nodes
        ) else 0
        return {
            "checked_at": utc_now_iso(),
            "boot_nodes": boot_nodes,
            "shutdown_nodes": shutdown_nodes,
            "ready_nodes": sum(1 for item in boot_nodes if item["ready"]),
            "core_ready": core_ready,
            "core_total": len(BOOT_WORKLOAD_GROUPS),
            "url_ok": url_ok,
            "url_total": len(BOOT_PROBE_URLS),
            "blocked_components": blocked_components,
            "blocked_urls": blocked_urls,
            "fixed_entry_ready": fixed_entry_ready,
        }


    def build_boot_progress_payload():
        payload = {
            "kind": "boot-progress",
            "checked_at": utc_now_iso(),
            "status": "loading",
            "phase": "loading",
            "ready_nodes": 0,
            "total_nodes": len(BOOT_NODE_ORDER),
            "contiguous_ready_nodes": 0,
            "core_ready": 0,
            "core_total": len(BOOT_WORKLOAD_GROUPS),
            "url_ok": 0,
            "url_total": len(BOOT_PROBE_URLS),
            "next_node": "",
            "next_node_ip": "",
            "nodes": [],
            "gates": [],
            "blocked_components": [],
            "blocked_urls": [],
            "error": "",
        }
        try:
            snapshot = collect_live_status_snapshot()
            ordered_nodes = snapshot["boot_nodes"]
            ready_nodes = snapshot["ready_nodes"]
            contiguous_ready_nodes = count_contiguous(ordered_nodes, lambda item: item["ready"])
            out_of_order = any(item["ready"] for item in ordered_nodes[contiguous_ready_nodes:])
            next_node = ordered_nodes[contiguous_ready_nodes] if contiguous_ready_nodes < len(ordered_nodes) else None
            core_ready = snapshot["core_ready"]
            url_ok = snapshot["url_ok"]
            blocked_components = snapshot["blocked_components"]
            blocked_urls = snapshot["blocked_urls"]
            if out_of_order:
                phase = "out-of-order"
                status = "warn"
            elif next_node is not None:
                phase = f'waiting-{next_node["name"]}'
                status = "warn" if contiguous_ready_nodes > 0 else "loading"
            elif core_ready < len(BOOT_WORKLOAD_GROUPS) or url_ok < len(BOOT_PROBE_URLS):
                phase = "stabilizing"
                status = "warn"
            else:
                phase = "complete"
                status = "ok"

            payload.update({
                "checked_at": snapshot["checked_at"],
                "status": status,
                "phase": phase,
                "ready_nodes": ready_nodes,
                "contiguous_ready_nodes": contiguous_ready_nodes,
                "core_ready": core_ready,
                "url_ok": url_ok,
                "next_node": next_node["name"] if next_node else "",
                "next_node_ip": next_node["ip"] if next_node else "",
                "nodes": ordered_nodes,
                "gates": [
                    {"key": "nodes", "status": "ok" if ready_nodes == len(ordered_nodes) else ("warn" if ready_nodes > 0 else "loading"), "ready": ready_nodes, "total": len(ordered_nodes)},
                    {"key": "entry-node", "status": "ok" if snapshot["fixed_entry_ready"] else "warn", "ready": snapshot["fixed_entry_ready"], "total": 1},
                    {"key": "core", "status": "ok" if core_ready == len(BOOT_WORKLOAD_GROUPS) else "warn", "ready": core_ready, "total": len(BOOT_WORKLOAD_GROUPS), "blocked": blocked_components},
                    {"key": "urls", "status": "ok" if url_ok == len(BOOT_PROBE_URLS) else "warn", "ready": url_ok, "total": len(BOOT_PROBE_URLS), "blocked": blocked_urls},
                ],
                "blocked_components": blocked_components,
                "blocked_urls": blocked_urls,
            })
            return payload
        except Exception as exc:
            LOGGER.warning("build boot progress failed: %s", exc)
            payload.update({
                "status": "fail",
                "phase": "unavailable",
                "error": str(exc),
                "gates": [
                    {"key": "nodes", "status": "loading", "ready": 0, "total": len(BOOT_NODE_ORDER)},
                    {"key": "entry-node", "status": "loading", "ready": 0, "total": 1},
                    {"key": "core", "status": "loading", "ready": 0, "total": len(BOOT_WORKLOAD_GROUPS), "blocked": []},
                    {"key": "urls", "status": "loading", "ready": 0, "total": len(BOOT_PROBE_URLS), "blocked": []},
                ],
            })
            return payload


    def build_shutdown_progress_payload():
        payload = {
            "kind": "shutdown-progress",
            "checked_at": utc_now_iso(),
            "status": "loading",
            "phase": "loading",
            "stopped_nodes": 0,
            "total_nodes": len(SHUTDOWN_NODE_ORDER),
            "remaining_ready_nodes": 0,
            "remaining_total_nodes": len(SHUTDOWN_NODE_ORDER),
            "contiguous_stopped_nodes": 0,
            "core_ready": 0,
            "core_total": len(BOOT_WORKLOAD_GROUPS),
            "url_ok": 0,
            "url_total": len(BOOT_PROBE_URLS),
            "next_node": "",
            "next_node_ip": "",
            "portal_last_visible_step": False,
            "nodes": [],
            "gates": [],
            "blocked_components": [],
            "blocked_urls": [],
            "error": "",
        }
        try:
            snapshot = collect_live_status_snapshot()
            ordered_nodes = snapshot["shutdown_nodes"]
            stopped_nodes = sum(1 for item in ordered_nodes if item["stopped"])
            remaining_ready_nodes = sum(1 for item in ordered_nodes if item["ready"])
            contiguous_stopped_nodes = count_contiguous(ordered_nodes, lambda item: item["stopped"])
            out_of_order = any(item["stopped"] for item in ordered_nodes[contiguous_stopped_nodes:])
            next_node = ordered_nodes[contiguous_stopped_nodes] if contiguous_stopped_nodes < len(ordered_nodes) else None
            core_ready = snapshot["core_ready"]
            url_ok = snapshot["url_ok"]
            blocked_components = snapshot["blocked_components"]
            blocked_urls = snapshot["blocked_urls"]
            portal_last_visible_step = bool(next_node and next_node["name"] == PORTAL_ENTRY_NODE["name"])
            stable_remaining_stack = core_ready == len(BOOT_WORKLOAD_GROUPS) and url_ok == len(BOOT_PROBE_URLS)
            if out_of_order:
                phase = "out-of-order"
                status = "warn"
            elif next_node is None:
                phase = "complete"
                status = "ok"
            elif stopped_nodes > 0 and not stable_remaining_stack:
                phase = "stabilizing"
                status = "warn"
            elif portal_last_visible_step:
                phase = "portal-last-visible-step"
                status = "warn"
            else:
                phase = f'waiting-{next_node["name"]}'
                status = "ok" if stable_remaining_stack else "warn"

            payload.update({
                "checked_at": snapshot["checked_at"],
                "status": status,
                "phase": phase,
                "stopped_nodes": stopped_nodes,
                "remaining_ready_nodes": remaining_ready_nodes,
                "remaining_total_nodes": max(len(ordered_nodes) - contiguous_stopped_nodes, 0),
                "contiguous_stopped_nodes": contiguous_stopped_nodes,
                "core_ready": core_ready,
                "url_ok": url_ok,
                "next_node": next_node["name"] if next_node else "",
                "next_node_ip": next_node["ip"] if next_node else "",
                "portal_last_visible_step": portal_last_visible_step,
                "nodes": ordered_nodes,
                "gates": [
                    {"key": "stopped", "status": "ok" if stopped_nodes == len(ordered_nodes) else ("warn" if stopped_nodes > 0 else "loading"), "ready": stopped_nodes, "total": len(ordered_nodes)},
                    {"key": "remaining", "status": "ok" if remaining_ready_nodes == len(ordered_nodes) - stopped_nodes else "warn", "ready": remaining_ready_nodes, "total": len(ordered_nodes) - stopped_nodes},
                    {"key": "core", "status": "ok" if core_ready == len(BOOT_WORKLOAD_GROUPS) else "warn", "ready": core_ready, "total": len(BOOT_WORKLOAD_GROUPS), "blocked": blocked_components},
                    {"key": "urls", "status": "ok" if url_ok == len(BOOT_PROBE_URLS) else "warn", "ready": url_ok, "total": len(BOOT_PROBE_URLS), "blocked": blocked_urls},
                ],
                "blocked_components": blocked_components,
                "blocked_urls": blocked_urls,
            })
            return payload
        except Exception as exc:
            LOGGER.warning("build shutdown progress failed: %s", exc)
            payload.update({
                "status": "fail",
                "phase": "unavailable",
                "error": str(exc),
                "gates": [
                    {"key": "stopped", "status": "loading", "ready": 0, "total": len(SHUTDOWN_NODE_ORDER)},
                    {"key": "remaining", "status": "loading", "ready": 0, "total": len(SHUTDOWN_NODE_ORDER)},
                    {"key": "core", "status": "loading", "ready": 0, "total": len(BOOT_WORKLOAD_GROUPS), "blocked": []},
                    {"key": "urls", "status": "loading", "ready": 0, "total": len(BOOT_PROBE_URLS), "blocked": []},
                ],
            })
            return payload


    class Handler(BaseHTTPRequestHandler):
        server_version = "AlertSink/1.0"

        def log_message(self, fmt, *args):
            LOGGER.info("%s - %s", self.address_string(), fmt % args)

        def _send_json(self, payload, status=HTTPStatus.OK):
            body = json.dumps(payload, ensure_ascii=False).encode("utf-8")
            self.send_response(status)
            self.send_header("Content-Type", "application/json; charset=utf-8")
            self.send_header("Cache-Control", "no-store")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def _send_text(self, body, status=HTTPStatus.OK, content_type="text/plain; charset=utf-8"):
            data = body.encode("utf-8")
            self.send_response(status)
            self.send_header("Content-Type", content_type)
            self.send_header("Cache-Control", "no-store")
            self.send_header("Content-Length", str(len(data)))
            self.end_headers()
            self.wfile.write(data)

        def do_GET(self):
            parsed = urlparse(self.path)
            path = parsed.path
            query = parse_qs(parsed.query)
            source_filter = (query.get("source", [""])[0] or "").strip().lower()
            if path in ("/healthz", "/readyz"):
                self._send_text("ok\n")
                return
            if path == "/api/alerts":
                with STORE_LOCK:
                    items = filtered_events(source_filter)
                self._send_json({"events": items})
                return
            if path == "/api/alerts/latest":
                with STORE_LOCK:
                    items = filtered_events(source_filter)
                    item = items[0] if items else None
                if item is None:
                    self._send_json({"error": "no alerts yet"}, status=HTTPStatus.NOT_FOUND)
                    return
                self._send_json(item)
                return
            if path == "/api/ops/summaries":
                self._send_json({"summaries": read_all_ops_summaries()})
                return
            if path == "/api/ops/live/cold-start":
                self._send_json(build_boot_progress_payload())
                return
            if path == "/api/ops/live/shutdown":
                self._send_json(build_shutdown_progress_payload())
                return
            if path.startswith("/api/ops/summaries/"):
                summary_name = path.rsplit("/", 1)[-1].strip().lower()
                item = read_ops_summary(summary_name)
                if item is None:
                    self._send_json({"error": "summary not found"}, status=HTTPStatus.NOT_FOUND)
                    return
                self._send_json(item)
                return
            if path == "/":
                self._send_text(INDEX_HTML, content_type="text/html; charset=utf-8")
                return
            self._send_json({"error": "not found"}, status=HTTPStatus.NOT_FOUND)

        def do_POST(self):
            path = urlparse(self.path).path
            if path not in ("/", "/api/alerts"):
                self._send_json({"error": "not found"}, status=HTTPStatus.NOT_FOUND)
                return
            content_length = int(self.headers.get("Content-Length", "0") or "0")
            if content_length <= 0:
                self._send_json({"error": "empty body"}, status=HTTPStatus.BAD_REQUEST)
                return
            if content_length > MAX_BODY_BYTES:
                self._send_json({"error": "payload too large"}, status=HTTPStatus.REQUEST_ENTITY_TOO_LARGE)
                return
            body = self.rfile.read(content_length)
            try:
                payload = json.loads(body)
            except json.JSONDecodeError as exc:
                self._send_json({"error": f"invalid json: {exc.msg}"}, status=HTTPStatus.BAD_REQUEST)
                return
            event = store_event(
                payload=payload,
                remote_addr=self.headers.get("X-Forwarded-For", self.client_address[0]),
                user_agent=self.headers.get("User-Agent", ""),
            )
            self._send_json(
                {
                    "ok": True,
                    "event_id": event["id"],
                    "stored_events": len(EVENTS),
                    "summary": event["summary"],
                },
                status=HTTPStatus.OK,
            )


    def main():
        load_events()
        port = int(os.getenv("PORT", "8080"))
        server = ThreadingHTTPServer(("0.0.0.0", port), Handler)
        LOGGER.info("alert sink listening on :%s", port)
        server.serve_forever()


    if __name__ == "__main__":
        main()
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: alert-webhook-receiver-data
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alert-webhook-receiver
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: alert-webhook-receiver-read-cluster
rules:
  - apiGroups:
      - ""
    resources:
      - nodes
      - pods
    verbs:
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: alert-webhook-receiver-read-cluster
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: alert-webhook-receiver-read-cluster
subjects:
  - kind: ServiceAccount
    name: alert-webhook-receiver
    namespace: monitoring
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-webhook-receiver
  namespace: monitoring
spec:
  replicas: 1
  strategy:
    # 单副本 + RWO PVC 用 Recreate，避免滚动更新时新旧 Pod 因卷互斥互相卡住。
    type: Recreate
    rollingUpdate: null
  selector:
    matchLabels:
      app: alert-webhook-receiver
  template:
    metadata:
      labels:
        app: alert-webhook-receiver
    spec:
      serviceAccountName: alert-webhook-receiver
      containers:
        - name: receiver
          image: docker.m.daocloud.io/library/python:3.12-alpine
          command:
            - python3
            - /app/receiver.py
          env:
            - name: PORT
              value: "8080"
            - name: DATA_PATH
              value: /data/alerts.jsonl
            - name: MAX_EVENTS
              value: "200"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 30m
              memory: 48Mi
            limits:
              cpu: 150m
              memory: 192Mi
          volumeMounts:
            - name: app
              mountPath: /app
              readOnly: true
            - name: data
              mountPath: /data
      volumes:
        - name: app
          configMap:
            name: alert-webhook-receiver-app
            defaultMode: 0555
        - name: data
          # 最近 webhook payload 对值班排障有直接价值，但体量很小，给一个小 PVC 避免 Pod 重启就清空。
          persistentVolumeClaim:
            claimName: alert-webhook-receiver-data
---
apiVersion: v1
kind: Service
metadata:
  name: alert-webhook-receiver
  namespace: monitoring
spec:
  selector:
    app: alert-webhook-receiver
  ports:
    - name: http
      port: 8080
      targetPort: http
