config:
  inCluster: true
  inClusterContextName: main
  sessionTTL: 43200
  enableHelm: true
  oidc:
    secret:
      create: false

service:
  type: NodePort
  port: 80
  nodePort: 30087

clusterRoleBinding:
  create: true
  clusterRoleName: cluster-admin

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

extraManifests:
  - |
    apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: headlamp-admin
      namespace: headlamp
  - |
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    metadata:
      name: headlamp-admin-cluster-admin
    subjects:
      - kind: ServiceAccount
        name: headlamp-admin
        namespace: headlamp
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: ClusterRole
      name: cluster-admin
