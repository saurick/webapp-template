image:
  # 跟业务镜像保持同一 Harbor 真源，避免 Headlamp 再直接依赖外网 ghcr 可达性。
  registry: harbor.192.168.0.108.nip.io:32668
  repository: library/headlamp
  tag: v0.40.1

config:
  inCluster: true
  inClusterContextName: main
  enableHelm: true
  # v0.40.1 镜像不识别 -session-ttl，实验室值文件显式关闭该参数注入。
  enableSessionTTLFlag: false
  oidc:
    secret:
      create: false

service:
  type: NodePort
  port: 80
  nodePort: 30087

clusterRoleBinding:
  create: true
  clusterRoleName: cluster-admin

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

extraManifests:
  - |
    apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: headlamp-admin
      namespace: headlamp
  - |
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    metadata:
      name: headlamp-admin-cluster-admin
    subjects:
      - kind: ServiceAccount
        name: headlamp-admin
        namespace: headlamp
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: ClusterRole
      name: cluster-admin
