apiVersion: v1
kind: ConfigMap
metadata:
  name: lab-ha-grafana-loadtest
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    release: kube-prometheus-stack
data:
  lab-ha-loadtest.json: |-
    {
      "id": null,
      "uid": "lab-ha-loadtest",
      "title": "HA Lab / Load Test",
      "tags": ["lab-ha", "loadtest", "k6"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "15s",
      "time": {
        "from": "now-24h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "testid",
            "label": "testid",
            "type": "query",
            "hide": 0,
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "definition": "label_values(k6_iterations_total, testid)",
            "query": {
              "query": "label_values(k6_iterations_total, testid)",
              "refId": "PrometheusVariableQueryEditor-VariableQuery"
            },
            "refresh": 1,
            "includeAll": false,
            "multi": false,
            "current": {
              "selected": false,
              "text": "",
              "value": ""
            },
            "options": []
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Requests Total",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 5, "w": 4, "x": 0, "y": 0},
          "targets": [
            {
              "expr": "sum(last_over_time(k6_http_reqs_total{testid=\"$testid\"}[$__range]))",
              "instant": true,
              "refId": "A"
            }
          ],
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}
          },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]
              }
            }
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Iterations Total",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 5, "w": 4, "x": 4, "y": 0},
          "targets": [
            {
              "expr": "sum(last_over_time(k6_iterations_total{testid=\"$testid\"}[$__range]))",
              "instant": true,
              "refId": "A"
            }
          ],
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}
          },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]
              }
            }
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Worst Failure Rate",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 5, "w": 4, "x": 8, "y": 0},
          "targets": [
            {
              "expr": "max(last_over_time(k6_http_req_failed_rate{testid=\"$testid\"}[$__range]))",
              "instant": true,
              "refId": "A"
            }
          ],
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 0.01}, {"color": "red", "value": 0.05}]
              }
            }
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Worst P95 Req Duration",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 5, "w": 4, "x": 12, "y": 0},
          "targets": [
            {
              "expr": "max(last_over_time(k6_http_req_duration_p95{testid=\"$testid\"}[$__range]))",
              "instant": true,
              "refId": "A"
            }
          ],
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 0.3}, {"color": "red", "value": 1}]
              }
            }
          }
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Max VUs",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 5, "w": 4, "x": 16, "y": 0},
          "targets": [
            {
              "expr": "max(last_over_time(k6_vus_max{testid=\"$testid\"}[$__range]))",
              "instant": true,
              "refId": "A"
            }
          ],
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}
          },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]
              }
            }
          }
        },
        {
          "id": 6,
          "type": "text",
          "title": "How To Read",
          "gridPos": {"h": 5, "w": 4, "x": 20, "y": 0},
          "options": {
            "mode": "markdown",
            "content": "- 这张看板只展示 `k6` 通过 remote write 写入的时序。\n- 如果某轮任务退化到 `curl-fallback`，请回 GitLab / Portal 看 `report.html` 和 `summary.json`。\n- 排查业务细节时，继续在 Loki 按 `request_id=<LOADTEST_RUN_ID...>` 过滤，再按 trace drill down。"
          }
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Request Rate By Step",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 5},
          "targets": [
            {
              "expr": "sum by (step) (rate(k6_http_reqs_total{testid=\"$testid\"}[1m]))",
              "legendFormat": "{{step}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "green", "value": null}]
              }
            }
          },
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi"}}
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "P95 Duration By Step",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 5},
          "targets": [
            {
              "expr": "max by (step) (k6_http_req_duration_p95{testid=\"$testid\"})",
              "legendFormat": "{{step}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 0.3}, {"color": "red", "value": 1}]
              }
            }
          },
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi"}}
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Failure Rate By Step",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 5},
          "targets": [
            {
              "expr": "max by (step) (k6_http_req_failed_rate{testid=\"$testid\"})",
              "legendFormat": "{{step}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 0.01}, {"color": "red", "value": 0.05}]
              }
            }
          },
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi"}}
        },
        {
          "id": 10,
          "type": "bargauge",
          "title": "Requests By Step",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 13},
          "targets": [
            {
              "expr": "sum by (step) (last_over_time(k6_http_reqs_total{testid=\"$testid\"}[$__range]))",
              "instant": true,
              "legendFormat": "{{step}}",
              "refId": "A"
            }
          ],
          "options": {
            "displayMode": "gradient",
            "orientation": "horizontal",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "showUnfilled": true
          },
          "fieldConfig": {"defaults": {"unit": "none"}}
        },
        {
          "id": 11,
          "type": "bargauge",
          "title": "P95 By Step",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 13},
          "targets": [
            {
              "expr": "max by (step) (last_over_time(k6_http_req_duration_p95{testid=\"$testid\"}[$__range]))",
              "instant": true,
              "legendFormat": "{{step}}",
              "refId": "A"
            }
          ],
          "options": {
            "displayMode": "gradient",
            "orientation": "horizontal",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "showUnfilled": true
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 0.3}, {"color": "red", "value": 1}]
              }
            }
          }
        },
        {
          "id": 12,
          "type": "bargauge",
          "title": "Check Success By Flow",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 13},
          "targets": [
            {
              "expr": "min by (flow) (last_over_time(k6_checks_rate{testid=\"$testid\"}[$__range]))",
              "instant": true,
              "legendFormat": "{{flow}}",
              "refId": "A"
            }
          ],
          "options": {
            "displayMode": "gradient",
            "orientation": "horizontal",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "showUnfilled": true
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 0.95}, {"color": "green", "value": 1}]
              }
            }
          }
        }
      ]
    }
