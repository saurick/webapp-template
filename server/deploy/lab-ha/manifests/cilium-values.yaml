cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

hubble:
  relay:
    enabled: true
  ui:
    enabled: true

ipam:
  mode: cluster-pool
  operator:
    clusterPoolIPv4PodCIDRList:
      - 10.244.0.0/16

k8sServiceHost: 192.168.0.110
k8sServicePort: 6443
kubeProxyReplacement: false

operator:
  replicas: 1
