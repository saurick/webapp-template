          const getMessage = (locale, key) => {
            return translations[locale][key] || translations.en[key] || '';
          };

          const transformUrl = (value, mode = currentAccessMode) => {
            if (!value || value.startsWith('/')) {
              return value;
            }
            const mappings = mode === ACCESS_MODE_EXTERNAL
              ? URL_BASE_MAPPINGS
              : URL_BASE_MAPPINGS.map(({ internal, external }) => ({ internal: external, external: internal }));
            for (const mapping of mappings) {
              if (value.startsWith(mapping.internal)) {
                return `${mapping.external}${value.slice(mapping.internal.length)}`;
              }
            }
            return value;
          };

          const renderAccessModeChrome = () => {
            if (accessModePill) {
              accessModePill.innerHTML = getMessage(
                currentLocale,
                currentAccessMode === ACCESS_MODE_EXTERNAL ? 'pill.accessExternal' : 'pill.accessInternal'
              );
            }
            if (bestEntryPill) {
              bestEntryPill.innerHTML = getMessage(
                currentLocale,
                currentAccessMode === ACCESS_MODE_EXTERNAL ? 'pill.bestEntryExternal' : 'pill.bestEntryInternal'
              );
            }
            if (endpointModeTag) {
              endpointModeTag.textContent = getMessage(
                currentLocale,
                currentAccessMode === ACCESS_MODE_EXTERNAL ? 'tag.externalEndpoints' : 'tag.internalEndpoints'
              );
            }
          };

          const rewriteAnchorsForAccessMode = () => {
            document.querySelectorAll('a[href]').forEach((link) => {
              const canonicalHref = link.getAttribute('data-canonical-href') || link.getAttribute('href');
              if (!canonicalHref) {
                return;
              }
              link.setAttribute('data-canonical-href', canonicalHref);
              link.setAttribute('href', transformUrl(canonicalHref));
            });
          };

          const renderCopyButton = (button) => {
            const state = button.getAttribute('data-copy-state') || 'default';
            const messageKey = state === 'default' ? (button.getAttribute('data-copy-default-key') || 'copy.default') : `copy.${state}`;
            button.textContent = getMessage(currentLocale, messageKey);
          };

          const setCopyButtonState = (button, state, timeoutMs) => {
            button.setAttribute('data-copy-state', state);
            renderCopyButton(button);
            if (timeoutMs > 0) {
              button._copyTimer = setTimeout(() => {
                button.setAttribute('data-copy-state', 'default');
                renderCopyButton(button);
              }, timeoutMs);
            }
          };

          const legacyCopyText = (value) => {
            const textarea = document.createElement('textarea');
            textarea.value = value;
            textarea.setAttribute('readonly', 'readonly');
            textarea.style.position = 'fixed';
            textarea.style.top = '-9999px';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.focus();
            textarea.select();
            textarea.setSelectionRange(0, value.length);
            let copied = false;
            try {
              copied = document.execCommand('copy');
            } finally {
              document.body.removeChild(textarea);
            }
            return copied;
          };

          const openManualCopyPrompt = (value) => {
            window.prompt(getMessage(currentLocale, 'copy.prompt'), value);
          };

          const renderHeadlampAccess = () => {
            const summaryText = headlampAccessState.data
              ? [headlampAccessState.data.serviceAccount, headlampAccessState.data.duration].filter(Boolean).join(' · ')
              : (headlampAccessState.summaryText || getMessage(currentLocale, headlampAccessState.statusKey));
            const metaText = headlampAccessState.data
              ? buildHeadlampMetaText(headlampAccessState.data)
              : (headlampAccessState.hintKey ? `${getMessage(currentLocale, headlampAccessState.hintKey)} ${HEADLAMP_SYNC_HINT}` : headlampAccessState.metaText);
            if (headlampTokenSummary) {
              headlampTokenSummary.textContent = summaryText;
            }
            if (headlampTokenMeta) {
              if (metaText) {
                headlampTokenMeta.textContent = metaText;
                headlampTokenMeta.classList.remove('hidden');
              } else {
                headlampTokenMeta.textContent = '';
                headlampTokenMeta.classList.add('hidden');
              }
            }
            if (headlampTokenCopy) {
              const hasToken = Boolean(headlampAccessState.token);
              headlampTokenCopy.setAttribute('data-copy', hasToken ? headlampAccessState.token : '');
              headlampTokenCopy.toggleAttribute('disabled', !hasToken);
              renderCopyButton(headlampTokenCopy);
