          };

          const loadPreferredLocale = () => {
            // 本地已有明确选择时优先复用；没有存储再按浏览器语言回退。
            try {
              const stored = window.localStorage.getItem(PORTAL_LANGUAGE_STORAGE_KEY);
              if (stored === 'zh' || stored === 'en') {
                return stored;
              }
            } catch (_err) {
              // 无痕或受限环境拿不到 localStorage 时，继续走浏览器语言兜底。
            }
            return navigator.language && navigator.language.toLowerCase().startsWith('zh') ? 'zh' : 'en';
          };

          const loadPreferredAccessMode = () => {
            try {
              const stored = window.localStorage.getItem(PORTAL_ACCESS_MODE_STORAGE_KEY);
              if (stored === ACCESS_MODE_INTERNAL || stored === ACCESS_MODE_EXTERNAL) {
                return stored;
              }
            } catch (_err) {
              // 访问模式仍然可以按当前 host 推断，只是不记忆下次选择。
            }
            return window.location.hostname === PUBLIC_DOMAIN_SUFFIX || window.location.hostname.endsWith(`.${PUBLIC_DOMAIN_SUFFIX}`)
              ? ACCESS_MODE_EXTERNAL
              : ACCESS_MODE_INTERNAL;
          };

          const savePreferredLocale = (locale) => {
            try {
              window.localStorage.setItem(PORTAL_LANGUAGE_STORAGE_KEY, locale);
            } catch (_err) {
              // 语言切换仍然生效，只是不记忆下次访问偏好。
            }
          };

          const savePreferredAccessMode = (mode) => {
            try {
              window.localStorage.setItem(PORTAL_ACCESS_MODE_STORAGE_KEY, mode);
            } catch (_err) {
              // 访问模式仍然生效，只是不记忆下次访问偏好。
            }
          };

          const normalizeLoadtestStatus = (status) => {
            switch (status) {
              case 'success':
                return 'success';
              case 'failed':
              case 'canceled':
                return 'failed';
              case 'running':
                return 'running';
              case 'created':
              case 'pending':
              case 'waiting_for_resource':
                return 'pending';
              default:
                return 'unavailable';
            }
          };

          const getLoadtestStatusClass = (status) => {
            switch (status) {
              case 'success':
                return 'status-ok';
              case 'failed':
                return 'status-fail';
              case 'running':
                return 'status-loading';
              case 'pending':
                return 'status-warn';
              case 'login':
                return 'status-warn';
              default:
                return 'status-loading';
            }
          };

          const formatPercent = (value) => {
            if (typeof value !== 'number' || Number.isNaN(value)) {
              return 'n/a';
            }
            return `${(value * 100).toFixed(value === 0 ? 0 : 2)}%`;
          };

          const formatDuration = (valueMs) => {
            if (typeof valueMs !== 'number' || Number.isNaN(valueMs)) {
              return 'n/a';
            }
            if (valueMs >= 1000) {
              return `${(valueMs / 1000).toFixed(2)}s`;
            }
            return `${Math.round(valueMs)}ms`;
          };

          const formatDateTime = (value) => {
            if (!value) {
              return '';
            }
            const parsed = new Date(value);
            if (Number.isNaN(parsed.getTime())) {
              return value;
            }
            return new Intl.DateTimeFormat(currentLocale === 'zh' ? 'zh-CN' : 'en-US', {
              month: '2-digit',
              day: '2-digit',
              hour: '2-digit',
              minute: '2-digit',
              hour12: false,
            }).format(parsed);
          };

          const formatDateTimeLong = (value) => {
            if (!value) {
              return '';
            }
            const parsed = new Date(value);
            if (Number.isNaN(parsed.getTime())) {
              return value;
            }
            return new Intl.DateTimeFormat(currentLocale === 'zh' ? 'zh-CN' : 'en-US', {
              year: 'numeric',
              month: '2-digit',
              day: '2-digit',
              hour: '2-digit',
              minute: '2-digit',
              hour12: false,
            }).format(parsed);
          };

          const fetchPortalJson = async (path) => {
            const response = await fetch(path, {
              cache: 'no-store',
              credentials: 'same-origin',
              headers: { Accept: 'application/json' },
            });
            if (response.status === 404) {
              const error = new Error('not found');
              error.code = 'not_found';
              throw error;
            }
            if (!response.ok) {
              const error = new Error(`Portal proxy request failed: ${response.status}`);
              error.code = 'http';
              error.status = response.status;
              throw error;
            }
            return response.json();
          };

          const isGitLabLoginRequiredResponse = (response) => {
            if (!response) {
              return false;
            }
            if (response.type === 'opaqueredirect' || response.status === 401 || response.status === 302) {
              return true;
            }
            return response.status === 204 && response.headers.get(GITLAB_LOGIN_REQUIRED_HEADER) === '1';
          };

          const buildHeadlampMetaText = (data) => {
            const parts = [];
            if (data && data.issuedAt) {
              parts.push(`${getMessage(currentLocale, 'cred.headlampTokenIssued')}${formatDateTimeLong(data.issuedAt)}`);
            }
            if (data && data.expiresAt) {
              parts.push(`${getMessage(currentLocale, 'cred.headlampTokenExpires')}${formatDateTimeLong(data.expiresAt)}`);
            }
            return parts.join(' · ');
          };

          const loadHeadlampAccess = async () => {
            try {
              const data = await fetchPortalJson(HEADLAMP_ACCESS_PATH);
              if (!data || !data.token) {
                const error = new Error('not found');
                error.code = 'not_found';
                throw error;
              }
              headlampAccessState = {
                data,
                statusKey: '',
                hintKey: '',
                summaryText: '',
                metaText: '',
                token: data.token,
              };
            } catch (error) {
              if (error.code === 'not_found') {
                headlampAccessState = {
                  data: null,
                  statusKey: 'cred.headlampTokenMissing',
                  hintKey: 'cred.headlampTokenMissingHint',
                  summaryText: '',
                  metaText: '',
                  token: '',
                };
              } else {
                headlampAccessState = {
                  data: null,
                  statusKey: 'cred.headlampTokenUnavailable',
                  hintKey: 'cred.headlampTokenUnavailableHint',
                  summaryText: '',
                  metaText: '',
                  token: '',
                };
              }
            }
            renderHeadlampAccess();
          };

          const getMetricValue = (summary, metricName, fieldName) => {
            if (!summary || !summary.metrics || !summary.metrics[metricName]) {
              return null;
            }
            const value = summary.metrics[metricName][fieldName];
            return typeof value === 'number' && !Number.isNaN(value) ? value : null;
          };

          const buildLoadtestSummaryText = (meta, summary, job) => {
            const parts = [];
            if (meta && meta.scenario) {
              parts.push(meta.scenario);
            }
            const p95 = getMetricValue(summary, 'http_req_duration', 'p(95)');
            if (p95 !== null) {
              parts.push(`p95 ${formatDuration(p95)}`);
            }
            const failRate = getMetricValue(summary, 'http_req_failed', 'rate');
            if (failRate !== null) {
              parts.push(`fail ${formatPercent(failRate)}`);
            }
            const finishedAt = (meta && meta.finished_at) || job.finished_at || job.started_at || job.created_at;
            if (finishedAt) {
              parts.push(formatDateTime(finishedAt));
            }
            return parts.join(' · ');
          };

          const buildLoadtestFallbackText = (job) => {
            const parts = [];
            if (job && job.ref) {
              parts.push(job.ref);
            }
            const at = (job && (job.started_at || job.created_at || job.finished_at)) || '';
            if (at) {
              parts.push(formatDateTime(at));
            }
            return parts.join(' · ');
          };

          const getAlertSinkStatusClass = (status) => {
            switch (status) {
              case 'firing':
                return 'status-fail';
              case 'resolved':
                return 'status-ok';
              case 'none':
                return 'status-warn';
              default:
                return 'status-loading';
            }
          };

          const buildAlertSinkSummaryText = (item) => {
            if (!item || !item.summary) {
              return '';
            }
            const parts = [];
            const names = Array.isArray(item.summary.alert_names) ? item.summary.alert_names.filter(Boolean) : [];
            if (names.length > 0) {
              parts.push(names.join(', '));
            }
            if (item.summary.receiver) {
              parts.push(item.summary.receiver);
            }
            if (item.received_at) {
              parts.push(formatDateTime(item.received_at));
            }
            return parts.join(' · ');
          };

          const buildAlertSinkDetailText = (item) => {
            if (!item || !item.summary) {
              return '';
            }
            const sourceLabel = item.summary.source_label || (currentLocale === 'zh' ? '真实告警' : 'Real alert');
            const receiver = item.summary.receiver || 'unknown';
            const alertCount = typeof item.summary.alert_count === 'number' ? item.summary.alert_count : 0;
            if (currentLocale === 'zh') {
              return `${sourceLabel} · ${alertCount} 条告警 · receiver ${receiver}`;
            }
            return `${sourceLabel} · ${alertCount} alert(s) · receiver ${receiver}`;
          };

          const renderAlertSinkCard = () => {
            alertsinkStatus.className = `status-value ${alertSinkCardState.statusClass}`;
            alertsinkStatus.textContent = getMessage(currentLocale, alertSinkCardState.statusKey);
            if (alertSinkCardState.item) {
              alertsinkSummary.textContent = buildAlertSinkSummaryText(alertSinkCardState.item);
              const detailText = buildAlertSinkDetailText(alertSinkCardState.item);
              if (detailText) {
                alertsinkDetail.textContent = detailText;
                alertsinkDetail.classList.remove('hidden');
              } else {
                alertsinkDetail.textContent = '';
                alertsinkDetail.classList.add('hidden');
              }
            } else {
              alertsinkSummary.textContent = alertSinkCardState.bodyText || getMessage(currentLocale, alertSinkCardState.bodyKey);
              if (alertSinkCardState.detailText) {
                alertsinkDetail.textContent = alertSinkCardState.detailText;
                alertsinkDetail.classList.remove('hidden');
              } else {
                alertsinkDetail.textContent = '';
                alertsinkDetail.classList.add('hidden');
              }
            }
            setActionLink(alertsinkPrimaryLink, alertSinkCardState.primaryHref, alertSinkCardState.primaryLabelKey);
            setActionLink(alertsinkSecondaryLink, alertSinkCardState.secondaryHref, alertSinkCardState.secondaryLabelKey);
          };

          const getBootStepStateLabel = (state) => {
            if (state === 'ready') {
              return getMessage(currentLocale, 'boot.step.ready');
            }
            if (state === 'next') {
              return getMessage(currentLocale, 'boot.step.next');
            }
            return getMessage(currentLocale, 'boot.step.waiting');
          };

          const getShutdownStepStateLabel = (state) => {
            if (state === 'stopped') {
              return getMessage(currentLocale, 'shutdown.step.stopped');
            }
            if (state === 'next') {
              return getMessage(currentLocale, 'shutdown.step.next');
            }
            return getMessage(currentLocale, 'shutdown.step.waiting');
          };

          const formatProgressBlockedList = (items) => {
            if (!Array.isArray(items) || items.length === 0) {
              return '';
            }
            return items.join(', ');
          };

          const buildBootStatusKey = (data) => {
            if (!data) {
              return 'boot.state.loading';
            }
            if (data.phase === 'complete') {
              return 'boot.state.complete';
            }
            if (data.phase === 'stabilizing') {
              return 'boot.state.stabilizing';
            }
            if (data.phase === 'out-of-order') {
              return 'boot.state.outOfOrder';
            }
            if (data.phase === 'unavailable') {
              return 'boot.state.unavailable';
            }
            if (data.next_node) {
              return 'boot.state.readyForNext';
            }
            return 'boot.state.loading';
          };

          const buildProgressStatusClass = (status) => {
            switch (status) {
              case 'ok':
                return 'status-ok';
              case 'fail':
                return 'status-fail';
              case 'warn':
                return 'status-warn';
              default:
                return 'status-loading';
            }
          };

          const buildBootSummaryText = (data) => {
            if (!data) {
              return getMessage(currentLocale, 'boot.body.loading');
            }
            if (data.phase === 'unavailable') {
              return getMessage(currentLocale, 'boot.body.unavailable');
            }
            if (currentLocale === 'zh') {
              return `节点 ${data.ready_nodes}/${data.total_nodes} 已就绪 · 核心服务 ${data.core_ready}/${data.core_total} · 入口 ${data.url_ok}/${data.url_total}`;
            }
            return `nodes ${data.ready_nodes}/${data.total_nodes} ready · core ${data.core_ready}/${data.core_total} · urls ${data.url_ok}/${data.url_total}`;
          };

          const buildBootDetailText = (data) => {
            if (!data) {
              return '';
            }
            const checkedAt = formatDateTime(data.checked_at);
            const prefix = checkedAt ? `${checkedAt} · ` : '';
            if (data.phase === 'complete') {
              return currentLocale === 'zh'
                ? `${prefix}全部节点、核心工作负载和关键入口都已回绿，可以停止继续上电并按需回跑冷启动验收。`
                : `${prefix}All nodes, core workloads, and key entrypoints are green. You can stop powering on more VMs and rerun the cold-start acceptance if needed.`;
            }
            if (data.phase === 'stabilizing') {
              const blocked = formatProgressBlockedList([...(data.blocked_components || []), ...(data.blocked_urls || [])]);
              return currentLocale === 'zh'
                ? `${prefix}三台节点已经回到 Ready，先不要收口；仍在收敛：${blocked || '关键服务或入口仍未回绿'}。`
                : `${prefix}All three nodes are Ready, but do not close out yet. Still converging: ${blocked || 'some core services or entrypoints are not green yet'}.`;
            }
            if (data.phase === 'out-of-order') {
              return currentLocale === 'zh'
                ? `${prefix}当前 Ready 节点与推荐顺序不一致，请先看开关机顺序文档再继续。`
                : `${prefix}The currently Ready nodes do not match the recommended order. Open the power sequence doc before continuing.`;
            }
            if (data.phase === 'unavailable') {
              return currentLocale === 'zh'
                ? `${prefix}${data.error || '当前拿不到 live 集群状态。'}`
                : `${prefix}${data.error || 'Live cluster status is unavailable right now.'}`;
            }
            if (data.next_node) {
              const readyNames = Array.isArray(data.nodes) ? data.nodes.filter((item) => item.ready).map((item) => item.name) : [];
              if (currentLocale === 'zh') {
                return `${prefix}已就绪：${readyNames.join('、') || '暂无'} · 下一台建议：${data.next_node}（${data.next_node_ip || 'n/a'}）`;
              }
              return `${prefix}ready: ${readyNames.join(', ') || 'none'} · next recommended VM: ${data.next_node} (${data.next_node_ip || 'n/a'})`;
            }
            return prefix.trim();
          };

          const buildShutdownStatusKey = (data) => {
            if (!data) {
              return 'shutdown.state.loading';
            }
            if (data.phase === 'complete') {
              return 'shutdown.state.complete';
            }
            if (data.phase === 'stabilizing') {
              return 'shutdown.state.stabilizing';
            }
            if (data.phase === 'portal-last-visible-step') {
              return 'shutdown.state.portalLast';
            }
            if (data.phase === 'out-of-order') {
              return 'shutdown.state.outOfOrder';
            }
            if (data.phase === 'unavailable') {
              return 'shutdown.state.unavailable';
            }
            if (data.next_node) {
              return 'shutdown.state.readyForNext';
            }
            return 'shutdown.state.loading';
          };

          const buildShutdownSummaryText = (data) => {
            if (!data) {
              return getMessage(currentLocale, 'shutdown.body.loading');
            }
            if (data.phase === 'unavailable') {
              return getMessage(currentLocale, 'shutdown.body.unavailable');
            }
            if (currentLocale === 'zh') {
              return `已退出 Ready ${data.stopped_nodes}/${data.total_nodes} · 剩余节点 ${data.remaining_ready_nodes}/${data.remaining_total_nodes} · 核心服务 ${data.core_ready}/${data.core_total} · 入口 ${data.url_ok}/${data.url_total}`;
            }
            return `exited Ready ${data.stopped_nodes}/${data.total_nodes} · remaining nodes ${data.remaining_ready_nodes}/${data.remaining_total_nodes} · core ${data.core_ready}/${data.core_total} · urls ${data.url_ok}/${data.url_total}`;
          };

          const buildShutdownDetailText = (data) => {
            if (!data) {
              return '';
            }
            const checkedAt = formatDateTime(data.checked_at);
            const prefix = checkedAt ? `${checkedAt} · ` : '';
            if (data.phase === 'complete') {
              return currentLocale === 'zh'
                ? `${prefix}所有节点都已退出 Ready。此时 Portal 理论上也应已不可见，最终电源状态请以虚拟化平台为准。`
                : `${prefix}All nodes have exited Ready. Portal itself should no longer be visible at that point, so use the hypervisor as the final power-state source of truth.`;
            }
            if (data.phase === 'stabilizing') {
              const blocked = formatProgressBlockedList([...(data.blocked_components || []), ...(data.blocked_urls || [])]);
              return currentLocale === 'zh'
                ? `${prefix}上一台已经退出 Ready，但剩余节点和入口还在收敛：${blocked || '关键服务或入口仍未回稳'}。先不要继续关下一台。`
                : `${prefix}The previous VM has already exited Ready, but the remaining nodes and entrypoints are still converging: ${blocked || 'some core services or entrypoints are not stable yet'}. Do not continue with the next shutdown yet.`;
            }
            if (data.phase === 'out-of-order') {
              return currentLocale === 'zh'
                ? `${prefix}当前退出 Ready 的节点与推荐顺序不一致，请先看开关机顺序文档再继续。`
                : `${prefix}The nodes that have exited Ready do not match the recommended shutdown order. Open the power sequence doc before continuing.`;
            }
            if (data.phase === 'unavailable') {
              return currentLocale === 'zh'
                ? `${prefix}${data.error || '当前拿不到 live 集群状态。'}`
                : `${prefix}${data.error || 'Live cluster status is unavailable right now.'}`;
            }
            if (data.next_node) {
              const stoppedNames = Array.isArray(data.nodes) ? data.nodes.filter((item) => item.stopped).map((item) => item.name) : [];
              if (data.portal_last_visible_step) {
                // Portal 跟着 node2 一起下线，所以这里只负责提示“能不能继续关 node2”。
                return currentLocale === 'zh'
                  ? `${prefix}已完成：${stoppedNames.join('、') || '暂无'} · 下一台建议：${data.next_node}（${data.next_node_ip || 'n/a'}）。这是 Portal 最后一个可视步骤；关完 node2 后请改到虚拟化控制台确认，并直接处理 node3。`
                  : `${prefix}done: ${stoppedNames.join(', ') || 'none'} · next recommended VM: ${data.next_node} (${data.next_node_ip || 'n/a'}). This is the last visible Portal step; after shutting down node2, switch to the hypervisor console and finish node3 there.`;
              }
              if (currentLocale === 'zh') {
                return `${prefix}已完成：${stoppedNames.join('、') || '暂无'} · 下一台建议：${data.next_node}（${data.next_node_ip || 'n/a'}）`;
              }
              return `${prefix}done: ${stoppedNames.join(', ') || 'none'} · next recommended VM: ${data.next_node} (${data.next_node_ip || 'n/a'})`;
            }
            return prefix.trim();
          };

          const buildProgressGateValueText = (gate) => {
            if (!gate) {
              return '0/0';
            }
            return `${gate.ready}/${gate.total}`;
          };

          const buildProgressGateDetailText = (gate) => {
            if (!gate || !Array.isArray(gate.blocked) || gate.blocked.length === 0) {
              return '';
            }
            if (currentLocale === 'zh') {
              return `未就绪：${gate.blocked.join('、')}`;
            }
            return `blocked: ${gate.blocked.join(', ')}`;
          };

          const renderBootProgressCard = () => {
            bootProgressStatus.className = `status-value ${bootProgressState.statusClass}`;
            bootProgressStatus.textContent = getMessage(currentLocale, bootProgressState.statusKey);
            const summaryText = bootProgressState.data
              ? buildBootSummaryText(bootProgressState.data)
              : (bootProgressState.summaryText || getMessage(currentLocale, bootProgressState.summaryKey));
            const detailText = bootProgressState.data
              ? buildBootDetailText(bootProgressState.data)
              : bootProgressState.detailText;
            bootProgressSummary.textContent = summaryText;
            if (detailText) {
              bootProgressDetail.textContent = detailText;
              bootProgressDetail.classList.remove('hidden');
            } else {
              bootProgressDetail.textContent = '';
              bootProgressDetail.classList.add('hidden');
            }
            setActionLink(bootProgressPrimaryLink, bootProgressState.primaryHref, bootProgressState.primaryLabelKey);
            setActionLink(bootProgressSecondaryLink, bootProgressState.secondaryHref, bootProgressState.secondaryLabelKey);
            setActionLink(bootProgressTertiaryLink, bootProgressState.tertiaryHref, bootProgressState.tertiaryLabelKey);

            const nodeStates = Array.isArray(bootProgressState.data && bootProgressState.data.nodes)
              ? bootProgressState.data.nodes
              : [];
            bootStepNodes.forEach((nodeCard) => {
              const nodeName = nodeCard.getAttribute('data-boot-node');
              const liveNode = nodeStates.find((item) => item.name === nodeName);
              const isNext = Boolean(bootProgressState.data && bootProgressState.data.next_node === nodeName && !liveNode?.ready);
              const state = liveNode && liveNode.ready ? 'ready' : (isNext ? 'next' : 'waiting');
              nodeCard.classList.remove('boot-step-ready', 'boot-step-next', 'boot-step-waiting');
              nodeCard.classList.add(state === 'ready' ? 'boot-step-ready' : (state === 'next' ? 'boot-step-next' : 'boot-step-waiting'));
              const stateNode = nodeCard.querySelector('.boot-step-state');
              if (stateNode) {
                stateNode.textContent = getBootStepStateLabel(state);
              }
            });

            const gates = Array.isArray(bootProgressState.data && bootProgressState.data.gates)
              ? bootProgressState.data.gates
              : [];
            bootGateCards.forEach((card) => {
              const gateKey = card.getAttribute('data-boot-gate');
              const gate = gates.find((item) => item.key === gateKey) || null;
              const valueNode = card.querySelector('.boot-gate-value');
              const detailNode = card.querySelector('.boot-gate-detail');
              if (valueNode) {
                valueNode.textContent = buildProgressGateValueText(gate);
                valueNode.className = `boot-gate-value ${buildProgressStatusClass(gate && gate.status ? gate.status : 'loading')}`;
              }
              if (detailNode) {
                const detailText = buildProgressGateDetailText(gate);
                if (detailText) {
                  detailNode.textContent = detailText;
                  detailNode.classList.remove('hidden');
                } else {
                  detailNode.textContent = '';
                  detailNode.classList.add('hidden');
                }
              }
            });
          };

          const renderShutdownProgressCard = () => {
            shutdownProgressStatus.className = `status-value ${shutdownProgressState.statusClass}`;
            shutdownProgressStatus.textContent = getMessage(currentLocale, shutdownProgressState.statusKey);
            const summaryText = shutdownProgressState.data
              ? buildShutdownSummaryText(shutdownProgressState.data)
              : (shutdownProgressState.summaryText || getMessage(currentLocale, shutdownProgressState.summaryKey));
            const detailText = shutdownProgressState.data
              ? buildShutdownDetailText(shutdownProgressState.data)
              : shutdownProgressState.detailText;
            shutdownProgressSummary.textContent = summaryText;
            if (detailText) {
              shutdownProgressDetail.textContent = detailText;
              shutdownProgressDetail.classList.remove('hidden');
            } else {
              shutdownProgressDetail.textContent = '';
              shutdownProgressDetail.classList.add('hidden');
            }
            setActionLink(shutdownProgressPrimaryLink, shutdownProgressState.primaryHref, shutdownProgressState.primaryLabelKey);
            setActionLink(shutdownProgressSecondaryLink, shutdownProgressState.secondaryHref, shutdownProgressState.secondaryLabelKey);
            setActionLink(shutdownProgressTertiaryLink, shutdownProgressState.tertiaryHref, shutdownProgressState.tertiaryLabelKey);

            const nodeStates = Array.isArray(shutdownProgressState.data && shutdownProgressState.data.nodes)
              ? shutdownProgressState.data.nodes
              : [];
            shutdownStepNodes.forEach((nodeCard) => {
              const nodeName = nodeCard.getAttribute('data-shutdown-node');
              const liveNode = nodeStates.find((item) => item.name === nodeName);
              const isNext = Boolean(shutdownProgressState.data && shutdownProgressState.data.next_node === nodeName && !liveNode?.stopped);
              const state = liveNode && liveNode.stopped ? 'stopped' : (isNext ? 'next' : 'waiting');
              nodeCard.classList.remove('boot-step-ready', 'boot-step-next', 'boot-step-waiting');
              nodeCard.classList.add(state === 'stopped' ? 'boot-step-ready' : (state === 'next' ? 'boot-step-next' : 'boot-step-waiting'));
              const stateNode = nodeCard.querySelector('.boot-step-state');
              if (stateNode) {
                stateNode.textContent = getShutdownStepStateLabel(state);
              }
            });

            const gates = Array.isArray(shutdownProgressState.data && shutdownProgressState.data.gates)
              ? shutdownProgressState.data.gates
              : [];
            shutdownGateCards.forEach((card) => {
              const gateKey = card.getAttribute('data-shutdown-gate');
              const gate = gates.find((item) => item.key === gateKey) || null;
              const valueNode = card.querySelector('.boot-gate-value');
              const detailNode = card.querySelector('.boot-gate-detail');
              if (valueNode) {
                valueNode.textContent = buildProgressGateValueText(gate);
                valueNode.className = `boot-gate-value ${buildProgressStatusClass(gate && gate.status ? gate.status : 'loading')}`;
              }
              if (detailNode) {
                const detailText = buildProgressGateDetailText(gate);
                if (detailText) {
                  detailNode.textContent = detailText;
                  detailNode.classList.remove('hidden');
                } else {
                  detailNode.textContent = '';
                  detailNode.classList.add('hidden');
                }
              }
            });
          };

          const getOpsSummaryStatusClass = (status) => {
            switch (status) {
              case 'ok':
                return 'status-ok';
              case 'fail':
                return 'status-fail';
              case 'warn':
              case 'none':
                return 'status-warn';
              default:
                return 'status-loading';
            }
          };

          const buildOpsSummaryDetailText = (item) => {
            if (!item) {
              return '';
            }
            const parts = [];
            if (item.checked_at) {
              parts.push(formatDateTime(item.checked_at));
            }
            if (item.detail) {
              parts.push(item.detail);
            }
            return parts.join(' · ');
          };

          const renderOpsSummaryCard = (key) => {
            const bindings = opsSummaryBindings[key];
            const state = opsSummaryCardState[key];
            if (!bindings || !state) {
              return;
            }
            bindings.statusNode.className = `status-value ${state.statusClass}`;
            bindings.statusNode.textContent = getMessage(currentLocale, state.statusKey);
            if (state.item && state.item.summary) {
              bindings.summaryNode.textContent = state.item.summary;
            } else {
              bindings.summaryNode.textContent = state.bodyText || getMessage(currentLocale, state.bodyKey);
            }
            const detailText = state.item ? buildOpsSummaryDetailText(state.item) : state.detailText;
            if (detailText) {
              bindings.detailNode.textContent = detailText;
              bindings.detailNode.classList.remove('hidden');
            } else {
              bindings.detailNode.textContent = '';
              bindings.detailNode.classList.add('hidden');
            }
            setActionLink(bindings.primaryLink, state.primaryHref, state.primaryLabelKey);
            setActionLink(bindings.secondaryLink, state.secondaryHref, state.secondaryLabelKey);
          };

          const renderOpsSummaryCards = () => {
            Object.keys(opsSummaryBindings).forEach((key) => {
              renderOpsSummaryCard(key);
            });
          };

          const loadOpsSummaries = async () => {
            const defaults = {
              'cold-start': buildOpsDefaultState(OPS_COLD_START_RUNBOOK_URL, 'ops.action.openRunbook', OPS_CHECKLIST_URL, 'ops.action.openChecklist'),
              'ha-drill': buildOpsDefaultState(OPS_TEST_REPORT_URL, 'ops.action.openTestReport', OPS_COLD_START_RUNBOOK_URL, 'ops.action.openRunbook'),
              backup: buildOpsDefaultState(OPS_BACKUP_DASHBOARD_URL, 'ops.action.openBackupDashboard', OPS_CHECKLIST_URL, 'ops.action.openChecklist'),
              smoke: buildOpsDefaultState(OPS_ACTIVE_URL, 'ops.action.openActive', OPS_PREVIEW_URL, 'ops.action.openPreview'),
            };

            try {
              const data = await fetchPortalJson(OPS_SUMMARIES_PATH);
              const summaries = data && data.summaries ? data.summaries : {};
              Object.keys(defaults).forEach((key) => {
                const item = summaries[key] || null;
                if (item) {
                  const status = item.status || 'unavailable';
                  opsSummaryCardState[key] = {
                    ...defaults[key],
                    statusKey: `ops.state.${status}`,
                    statusClass: getOpsSummaryStatusClass(status),
                    bodyKey: '',
                    bodyText: '',
                    detailText: '',
                    item,
                  };
                } else {
                  opsSummaryCardState[key] = {
                    ...defaults[key],
                    statusKey: 'ops.state.none',
                    statusClass: getOpsSummaryStatusClass('none'),
                    bodyKey: 'ops.body.none',
                    bodyText: '',
                    detailText: '',
                    item: null,
                  };
                }
              });
            } catch (_error) {
              Object.keys(defaults).forEach((key) => {
                opsSummaryCardState[key] = {
                  ...defaults[key],
                  statusKey: 'ops.state.unavailable',
                  statusClass: getOpsSummaryStatusClass('unavailable'),
                  bodyKey: 'ops.body.unavailable',
                  bodyText: '',
                  detailText: '',
                  item: null,
                };
              });
            }
            renderOpsSummaryCards();
          };

          const loadBootProgress = async () => {
            try {
              const data = await fetchPortalJson(BOOT_PROGRESS_PATH);
              bootProgressState = {
                ...bootProgressState,
                data,
                statusKey: buildBootStatusKey(data),
                statusClass: buildProgressStatusClass(data && data.status ? data.status : 'loading'),
                summaryKey: '',
                summaryText: buildBootSummaryText(data),
                detailText: buildBootDetailText(data),
                primaryHref: VM_POWER_SEQUENCE_URL,
                primaryLabelKey: 'boot.action.openPowerSequence',
                secondaryHref: OPS_COLD_START_RUNBOOK_URL,
                secondaryLabelKey: 'ops.action.openRunbook',
                tertiaryHref: K8S_WORKLOADS_URL,
                tertiaryLabelKey: 'boot.action.openK8s',
              };
            } catch (_error) {
              bootProgressState = {
                data: null,
                statusKey: 'boot.state.unavailable',
                statusClass: buildProgressStatusClass('fail'),
                summaryKey: 'boot.body.unavailable',
                summaryText: '',
                detailText: '',
                primaryHref: VM_POWER_SEQUENCE_URL,
                primaryLabelKey: 'boot.action.openPowerSequence',
                secondaryHref: OPS_COLD_START_RUNBOOK_URL,
                secondaryLabelKey: 'ops.action.openRunbook',
                tertiaryHref: K8S_WORKLOADS_URL,
                tertiaryLabelKey: 'boot.action.openK8s',
              };
            }
            renderBootProgressCard();
          };

          const loadShutdownProgress = async () => {
            try {
              const data = await fetchPortalJson(SHUTDOWN_PROGRESS_PATH);
              shutdownProgressState = {
                ...shutdownProgressState,
                data,
                statusKey: buildShutdownStatusKey(data),
                statusClass: buildProgressStatusClass(data && data.status ? data.status : 'loading'),
                summaryKey: '',
                summaryText: buildShutdownSummaryText(data),
                detailText: buildShutdownDetailText(data),
                primaryHref: VM_POWER_SEQUENCE_URL,
                primaryLabelKey: 'boot.action.openPowerSequence',
                secondaryHref: OPS_COLD_START_RUNBOOK_URL,
                secondaryLabelKey: 'ops.action.openRunbook',
                tertiaryHref: K8S_WORKLOADS_URL,
                tertiaryLabelKey: 'boot.action.openK8s',
              };
            } catch (_error) {
              shutdownProgressState = {
                data: null,
                statusKey: 'shutdown.state.unavailable',
                statusClass: buildProgressStatusClass('fail'),
                summaryKey: 'shutdown.body.unavailable',
                summaryText: '',
                detailText: '',
                primaryHref: VM_POWER_SEQUENCE_URL,
                primaryLabelKey: 'boot.action.openPowerSequence',
                secondaryHref: OPS_COLD_START_RUNBOOK_URL,
                secondaryLabelKey: 'ops.action.openRunbook',
                tertiaryHref: K8S_WORKLOADS_URL,
                tertiaryLabelKey: 'boot.action.openK8s',
              };
            }
            renderShutdownProgressCard();
          };

          const fetchGitLabJson = async (path) => {
            // 通过 Portal 的同源代理复用 GitLab 登录态，避免前端直接跨域请求 8929。
            const response = await fetch(path, {
              credentials: 'same-origin',
              headers: { Accept: 'application/json' },
              redirect: 'manual',
            });
            if (isGitLabLoginRequiredResponse(response)) {
              const error = new Error('login required');
              error.code = 'login';
              throw error;
            }
            if (!response.ok) {
              const error = new Error(`GitLab proxy request failed: ${response.status}`);
              error.code = 'http';
              error.status = response.status;
              throw error;
            }
            return response.json();
          };

          const loadLatestAlertSink = async () => {
            try {
              const data = await fetchPortalJson(ALERT_SINK_REAL_EVENTS_PATH);
              const item = data && Array.isArray(data.events) ? data.events[0] : null;
              if (item) {
                const summaryStatus = item.summary && item.summary.status ? item.summary.status : 'unavailable';
                alertSinkCardState = {
                  statusKey: `alertsink.state.${summaryStatus}`,
                  statusClass: getAlertSinkStatusClass(summaryStatus),
                  bodyKey: '',
                  bodyText: '',
                  detailText: '',
                  item,
                  primaryHref: ALERT_SINK_URL,
                  primaryLabelKey: 'alertsink.action.openSink',
                  secondaryHref: ALERTMANAGER_URL,
                  secondaryLabelKey: 'alertsink.action.openAlertmanager',
                };
              } else {
                alertSinkCardState = {
                  statusKey: 'alertsink.state.none',
                  statusClass: getAlertSinkStatusClass('none'),
                  bodyKey: 'alertsink.body.none',
                  bodyText: '',
                  detailText: '',
                  item: null,
                  primaryHref: ALERT_SINK_URL,
                  primaryLabelKey: 'alertsink.action.openSink',
                  secondaryHref: ALERTMANAGER_URL,
                  secondaryLabelKey: 'alertsink.action.openAlertmanager',
                };
              }
            } catch (error) {
              alertSinkCardState = {
                statusKey: 'alertsink.state.unavailable',
                statusClass: getAlertSinkStatusClass('unavailable'),
                bodyKey: 'alertsink.body.unavailable',
                bodyText: '',
                detailText: '',
                item: null,
                primaryHref: ALERT_SINK_URL,
                primaryLabelKey: 'alertsink.action.openSink',
                secondaryHref: ALERTMANAGER_URL,
                secondaryLabelKey: 'alertsink.action.openAlertmanager',
              };
            }
            renderAlertSinkCard();
          };

          const fetchGitLabText = async (path) => {
            const response = await fetch(path, {
              credentials: 'same-origin',
              headers: { Accept: 'text/plain' },
              redirect: 'manual',
            });
            if (isGitLabLoginRequiredResponse(response)) {
              const error = new Error('login required');
              error.code = 'login';
              throw error;
            }
            if (!response.ok) {
              const error = new Error(`GitLab proxy request failed: ${response.status}`);
              error.code = 'http';
              error.status = response.status;
              throw error;
            }
            return response.text();
          };

          const fetchGitLabHtml = async (path) => {
            const response = await fetch(path, {
              credentials: 'same-origin',
              headers: { Accept: 'text/html,application/xhtml+xml' },
              redirect: 'manual',
            });
            if (isGitLabLoginRequiredResponse(response)) {
              const error = new Error('login required');
              error.code = 'login';
              throw error;
            }
            if (!response.ok) {
              const error = new Error(`GitLab html request failed: ${response.status}`);
              error.code = 'http';
              error.status = response.status;
              throw error;
            }
            return response.text();
          };

          const parseCsrfToken = (html) => {
            const match = typeof html === 'string' ? html.match(/<meta name="csrf-token" content="([^"]+)"/) : null;
            return match ? match[1] : '';
          };

          const buildLoadtestVariables = () => {
            return [
              { key: 'PIPELINE_MODE', value: 'loadtest', variableType: 'ENV_VAR' },
              { key: 'LOADTEST_SCENARIO', value: 'system', variableType: 'ENV_VAR' },
              { key: 'LOADTEST_BASE_URL', value: 'http://192.168.0.108:32668', variableType: 'ENV_VAR' },
              { key: 'LOADTEST_PROMETHEUS_RW_URL', value: 'http://192.168.0.108:30090/api/v1/write', variableType: 'ENV_VAR' },
            ];
          };

          const extractPipelineId = (path) => {
            const match = typeof path === 'string' ? path.match(/\/pipelines\/(\d+)/) : null;
            return match ? Number(match[1]) : 0;
          };

          const clearLoadtestPolling = () => {
            if (loadtestPollTimer) {
              clearTimeout(loadtestPollTimer);
              loadtestPollTimer = null;
            }
            loadtestPollDeadline = 0;
          };

          const scheduleLoadtestPolling = () => {
            clearLoadtestPolling();
            loadtestPollDeadline = Date.now() + LOADTEST_POLL_TIMEOUT_MS;
            const tick = async () => {
              await loadLatestLoadtest();
              if (!loadtestPendingPipelineId || Date.now() >= loadtestPollDeadline) {
                clearLoadtestPolling();
                return;
              }
              loadtestPollTimer = setTimeout(tick, LOADTEST_POLL_INTERVAL_MS);
            };
            loadtestPollTimer = setTimeout(tick, LOADTEST_POLL_INTERVAL_MS);
          };

          const createLoadtestPipeline = async () => {
            // 先取 GitLab 新建页里的 csrf token，再通过同源代理发 GraphQL mutation，避免在 Portal 暴露额外 token。
            const pipelinePageHtml = await fetchGitLabHtml(LOADTEST_TRIGGER_FORM_PATH);
            const csrfToken = parseCsrfToken(pipelinePageHtml);
            if (!csrfToken) {
              const error = new Error('missing csrf token');
              error.code = 'csrf';
              throw error;
            }
            const response = await fetch(LOADTEST_GRAPHQL_PATH, {
              method: 'POST',
              credentials: 'same-origin',
              headers: {
                Accept: 'application/json',
                'Content-Type': 'application/json',
                'X-CSRF-Token': csrfToken,
                'X-Requested-With': 'XMLHttpRequest',
              },
              body: JSON.stringify({
                operationName: 'internalPipelineCreate',
                query: LOADTEST_TRIGGER_MUTATION,
                variables: {
                  input: {
                    projectPath: LOADTEST_PROJECT_PATH,
                    ref: 'master',
                    variables: buildLoadtestVariables(),
                    inputs: [],
                  },
                },
              }),
            });
            if (isGitLabLoginRequiredResponse(response)) {
              const error = new Error('login required');
              error.code = 'login';
              throw error;
            }
            if (!response.ok) {
              const error = new Error(`GitLab graphql request failed: ${response.status}`);
              error.code = 'http';
              error.status = response.status;
              throw error;
            }
            const result = await response.json();
            const payload = result && result.data && result.data.pipelineCreate ? result.data.pipelineCreate : null;
            const pipeline = payload && payload.pipeline ? payload.pipeline : null;
            const errors = payload && Array.isArray(payload.errors) ? payload.errors : [];
            const backendErrors = pipeline && pipeline.errorMessages && Array.isArray(pipeline.errorMessages.nodes)
              ? pipeline.errorMessages.nodes.map((node) => node && node.content).filter(Boolean)
              : [];
            if (!pipeline || !pipeline.path || errors.length > 0 || backendErrors.length > 0) {
              const error = new Error('pipeline create failed');
              error.code = 'create_failed';
              throw error;
            }
            return pipeline;
          };

          const parseMetaEnv = (text) => {
            if (!text) {
              return {};
            }
            return text.split('\n').reduce((acc, line) => {
              const trimmed = line.trim();
              if (!trimmed || trimmed.startsWith('#')) {
                return acc;
              }
              const eqIndex = trimmed.indexOf('=');
              if (eqIndex <= 0) {
                return acc;
              }
              const key = trimmed.slice(0, eqIndex);
              const value = trimmed.slice(eqIndex + 1);
              acc[key] = value;
              return acc;
            }, {});
          };

          const buildLoadtestDetail = (metaEnv) => {
            if (!metaEnv || !metaEnv.LOADTEST_ENGINE) {
              return { detailKey: 'loadtest.detail.unknown', dashboardHref: '', reportPreferred: false };
            }
            const engine = metaEnv.LOADTEST_ENGINE;
            const remoteWriteEnabled = metaEnv.LOADTEST_PROMETHEUS_RW_ENABLED === 'true';
            const runId = metaEnv.LOADTEST_RUN_ID || '';
            if (engine === 'k6' && remoteWriteEnabled && runId) {
              return {
                detailKey: 'loadtest.detail.k6',
                dashboardHref: LOADTEST_DASHBOARD_URL(runId),
                reportPreferred: true,
              };
            }
            if (engine === 'curl-fallback') {
              return { detailKey: 'loadtest.detail.fallback', dashboardHref: '', reportPreferred: true };
            }
            return { detailKey: 'loadtest.detail.unknown', dashboardHref: '', reportPreferred: true };
          };

          const triggerLoadtestFromPortal = async () => {
            if (loadtestTriggerInFlight) {
              return;
            }
            loadtestTriggerInFlight = true;
            setBusyState(true);
            clearLoadtestPolling();
            loadtestCardState = {
              statusKey: 'loadtest.state.triggering',
              statusClass: 'status-loading',
              bodyKey: 'loadtest.body.triggering',
              bodyText: '',
              detailKey: 'loadtest.detail.triggering',
              detailText: '',
              primaryHref: LOADTEST_PIPELINES_URL,
              primaryLabelKey: 'loadtest.action.openPipelines',
              secondaryHref: '',
              secondaryLabelKey: '',
              tertiaryHref: '',
              tertiaryLabelKey: '',
            };
            renderLoadtestCard();
            try {
              const pipeline = await createLoadtestPipeline();
              const pipelineId = extractPipelineId(pipeline.path);
              loadtestPendingPipelineId = pipelineId;
              loadtestCardState = {
                statusKey: 'loadtest.state.pending',
                statusClass: getLoadtestStatusClass('pending'),
                bodyKey: '',
                bodyText: `system · Pipeline #${pipelineId || '?'} · ${formatDateTime(new Date().toISOString())}`,
                detailKey: 'loadtest.detail.triggered',
                detailText: '',
                primaryHref: pipelineId ? LOADTEST_PIPELINE_URL(pipelineId) : LOADTEST_PIPELINES_URL,
                primaryLabelKey: 'loadtest.action.openPipeline',
                secondaryHref: LOADTEST_PIPELINES_URL,
                secondaryLabelKey: 'loadtest.action.openPipelines',
                tertiaryHref: '',
                tertiaryLabelKey: '',
              };
              renderLoadtestCard();
              scheduleLoadtestPolling();
            } catch (error) {
              if (error && error.code === 'login') {
                loadtestCardState = {
                  statusKey: 'loadtest.state.login',
                  statusClass: 'status-warn',
                  bodyKey: 'loadtest.body.login',
                  bodyText: '',
                  detailKey: '',
                  detailText: '',
                  primaryHref: GITLAB_LOGIN_URL,
                  primaryLabelKey: 'loadtest.action.login',
                  secondaryHref: LOADTEST_RUN_URL,
                  secondaryLabelKey: 'loadtest.action.run',
                  tertiaryHref: '',
                  tertiaryLabelKey: '',
                };
              } else {
                loadtestCardState = {
                  statusKey: 'loadtest.state.unavailable',
                  statusClass: 'status-loading',
                  bodyKey: 'loadtest.body.unavailable',
                  bodyText: '',
                  detailKey: 'loadtest.detail.triggerFailed',
                  detailText: '',
                  primaryHref: LOADTEST_PIPELINES_URL,
                  primaryLabelKey: 'loadtest.action.openPipelines',
                  secondaryHref: LOADTEST_RUN_URL,
                  secondaryLabelKey: 'loadtest.action.run',
                  tertiaryHref: '',
                  tertiaryLabelKey: '',
                };
              }
              renderLoadtestCard();
              console.error('portal loadtest trigger failed', error);
            } finally {
              loadtestTriggerInFlight = false;
              setBusyState(false);
            }
          };

          const loadLatestLoadtest = async () => {
            try {
              const jobs = await fetchGitLabJson(LOADTEST_JOBS_API_PATH);
              const job = Array.isArray(jobs) ? jobs.find((item) => item.name === 'loadtest_lab') : null;
              if (!job) {
                if (loadtestPendingPipelineId) {
                  renderLoadtestCard();
                  return;
                }
                loadtestCardState = {
                  statusKey: 'loadtest.state.notRun',
                  statusClass: 'status-warn',
                  bodyKey: 'loadtest.body.notRun',
                  bodyText: '',
                  detailKey: '',
                  detailText: '',
                  primaryHref: LOADTEST_PIPELINES_URL,
                  primaryLabelKey: 'loadtest.action.openPipelines',
                  secondaryHref: LOADTEST_RUN_URL,
                  secondaryLabelKey: 'loadtest.action.run',
                  tertiaryHref: '',
                  tertiaryLabelKey: '',
                };
                renderLoadtestCard();
                return;
              }

              const normalizedStatus = normalizeLoadtestStatus(job.status);
              const currentPipelineId = Number(job && job.pipeline ? job.pipeline.id : 0);
              // 刚触发的新流水线如果还没出现在 jobs 列表里，保持 Portal 本地“已触发”状态，避免闪回上一轮结果。
              if (loadtestPendingPipelineId && currentPipelineId && currentPipelineId < loadtestPendingPipelineId) {
                renderLoadtestCard();
                return;
              }
              // 只有当当前这轮已经进入终态时才停止轮询；否则需要继续等 Portal 从 pending/running 刷到最终报告/看板入口。
              if (
                loadtestPendingPipelineId &&
                currentPipelineId >= loadtestPendingPipelineId &&
                (normalizedStatus === 'success' || normalizedStatus === 'failed')
              ) {
                loadtestPendingPipelineId = 0;
              }
              loadtestCardState = {
                statusKey: `loadtest.state.${normalizedStatus}`,
                statusClass: getLoadtestStatusClass(normalizedStatus),
                bodyKey: 'loadtest.body.unavailable',
                bodyText: buildLoadtestFallbackText(job),
                detailKey: '',
                detailText: '',
                primaryHref: job.pipeline && job.pipeline.id ? LOADTEST_PIPELINE_URL(job.pipeline.id) : LOADTEST_PIPELINES_URL,
                primaryLabelKey: 'loadtest.action.openPipeline',
                secondaryHref: LOADTEST_RUN_URL,
                secondaryLabelKey: 'loadtest.action.run',
                tertiaryHref: '',
                tertiaryLabelKey: '',
              };

              if (normalizedStatus === 'success' || normalizedStatus === 'failed') {
                const [metaResult, summaryResult, envResult] = await Promise.allSettled([
                  fetchGitLabJson(LOADTEST_PORTAL_SUMMARY_PATH(job.id)),
                  fetchGitLabJson(LOADTEST_SUMMARY_PATH(job.id)),
                  fetchGitLabText(LOADTEST_META_PATH(job.id)),
                ]);
                const meta = metaResult.status === 'fulfilled' ? metaResult.value : null;
                const summary = summaryResult.status === 'fulfilled' ? summaryResult.value : null;
                const metaEnv = envResult.status === 'fulfilled' ? parseMetaEnv(envResult.value) : {};
                const summaryText = buildLoadtestSummaryText(meta, summary, job);
                if (summaryText) {
                  loadtestCardState.bodyText = summaryText;
                }
                const detail = buildLoadtestDetail(metaEnv);
                loadtestCardState.detailKey = detail.detailKey;
                if (detail.dashboardHref) {
                  loadtestCardState.secondaryHref = detail.dashboardHref;
                  loadtestCardState.secondaryLabelKey = 'loadtest.action.openDashboard';
                }
                if (meta && meta.has_report) {
                  loadtestCardState.tertiaryHref = LOADTEST_REPORT_URL(job.id);
                  loadtestCardState.tertiaryLabelKey = 'loadtest.action.openReport';
                } else if (!detail.dashboardHref) {
                  loadtestCardState.secondaryHref = LOADTEST_REPORT_URL(job.id);
                  loadtestCardState.secondaryLabelKey = 'loadtest.action.openReport';
                }
              }

              renderLoadtestCard();
            } catch (error) {
              if (error && error.code === 'login') {
                loadtestCardState = {
                  statusKey: 'loadtest.state.login',
                  statusClass: 'status-warn',
                  bodyKey: 'loadtest.body.login',
                  bodyText: '',
                  detailKey: '',
                  detailText: '',
                  primaryHref: GITLAB_LOGIN_URL,
                  primaryLabelKey: 'loadtest.action.login',
                  secondaryHref: LOADTEST_RUN_URL,
                  secondaryLabelKey: 'loadtest.action.run',
                  tertiaryHref: '',
                  tertiaryLabelKey: '',
                };
              } else {
                loadtestCardState = {
                  statusKey: 'loadtest.state.unavailable',
                  statusClass: 'status-loading',
                  bodyKey: 'loadtest.body.unavailable',
                  bodyText: '',
                  detailKey: '',
                  detailText: '',
                  primaryHref: LOADTEST_PIPELINES_URL,
                  primaryLabelKey: 'loadtest.action.openPipelines',
                  secondaryHref: LOADTEST_RUN_URL,
                  secondaryLabelKey: 'loadtest.action.run',
                  tertiaryHref: '',
                  tertiaryLabelKey: '',
                };
              }
              renderLoadtestCard();
            }
          };

          // Portal 只做静态导航、轻量双语与复制反馈，实时状态仍以 Prometheus / GitLab 为准。
          if (runLoadtestCard) {
            runLoadtestCard.addEventListener('click', (event) => {
              if (event.defaultPrevented || event.metaKey || event.ctrlKey || event.shiftKey || event.button !== 0) {
                return;
              }
              event.preventDefault();
              triggerLoadtestFromPortal();
            });
          }
          loadtestSecondaryLink.addEventListener('click', (event) => {
            if (loadtestCardState.secondaryLabelKey !== 'loadtest.action.run') {
              return;
            }
            if (event.defaultPrevented || event.metaKey || event.ctrlKey || event.shiftKey || event.button !== 0) {
              return;
            }
            event.preventDefault();
            triggerLoadtestFromPortal();
          });

          langButtons.forEach((button) => {
            button.addEventListener('click', () => {
              const locale = button.getAttribute('data-lang') || 'en';
              savePreferredLocale(locale);
              applyTranslations(locale);
            });
          });

          accessButtons.forEach((button) => {
            button.addEventListener('click', () => {
              const mode = button.getAttribute('data-access-mode') === ACCESS_MODE_EXTERNAL
                ? ACCESS_MODE_EXTERNAL
                : ACCESS_MODE_INTERNAL;
              currentAccessMode = mode;
              savePreferredAccessMode(mode);
              renderBootProgressCard();
              renderShutdownProgressCard();
              renderAlertSinkCard();
              renderOpsSummaryCards();
              renderLoadtestCard();
              renderAccessModeChrome();
              rewriteAnchorsForAccessMode();
              setActiveAccessMode(mode);
            });
          });

          copyButtons.forEach((button) => {
            renderCopyButton(button);
            button.addEventListener('click', async () => {
              // 页面上既有密码也有 token，但按钮始终只复制敏感值本身，避免把说明文字一并带走。
              const value = button.getAttribute('data-copy') || '';
              clearTimeout(button._copyTimer);
              if (!value) {
                return;
              }
              try {
                await navigator.clipboard.writeText(value);
                setCopyButtonState(button, 'success', 1200);
              } catch (_clipboardErr) {
                try {
                  if (legacyCopyText(value)) {
                    setCopyButtonState(button, 'success', 1200);
                    return;
                  }
                } catch (_legacyErr) {
                  // 留给下面的手工复制 prompt 兜底。
                }
                // 当前浏览器拿不到系统剪贴板时，至少给出一个可选中的手工复制入口。
                openManualCopyPrompt(value);
                setCopyButtonState(button, 'fallback', 1800);
              }
            });
          });

          currentAccessMode = loadPreferredAccessMode();
          applyTranslations(loadPreferredLocale());
          loadHeadlampAccess();
          loadBootProgress();
          setInterval(loadBootProgress, BOOT_PROGRESS_REFRESH_MS);
          loadShutdownProgress();
          setInterval(loadShutdownProgress, SHUTDOWN_PROGRESS_REFRESH_MS);
          loadLatestAlertSink();
          setInterval(loadLatestAlertSink, ALERT_SINK_REFRESH_MS);
          loadOpsSummaries();
          setInterval(loadOpsSummaries, OPS_SUMMARY_REFRESH_MS);
          loadLatestLoadtest();
        </script>
      </body>
    </html>
  loadtest-report.html: |
    <!doctype html>
    <html lang="zh-CN">
      <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Load Test Report Viewer</title>
        <style>
          :root {
            --bg: #07111f;
            --panel: #0e1c2f;
            --line: #1f3654;
            --text: #eaf3ff;
            --muted: #9bb4d1;
            --accent: #66d9ef;
            --danger: #ff7b72;
          }
          * { box-sizing: border-box; }
          body {
            margin: 0;
            min-height: 100vh;
            font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", sans-serif;
            background:
              radial-gradient(circle at top left, rgba(102,217,239,0.18), transparent 32%),
              linear-gradient(180deg, #07111f 0%, #081521 100%);
            color: var(--text);
          }
          .shell {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px 20px 28px;
          }
          .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
          }
          .title {
            display: flex;
            flex-direction: column;
            gap: 6px;
          }
          .title h1 {
            margin: 0;
            font-size: 28px;
          }
          .title p {
            margin: 0;
            color: var(--muted);
          }
          .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
          }
          .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            padding: 0 16px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.10);
            background: rgba(255,255,255,0.04);
            color: var(--text);
            text-decoration: none;
            font-weight: 600;
          }
          .btn.primary {
            border-color: rgba(102,217,239,0.28);
            background: linear-gradient(180deg, rgba(102,217,239,0.26), rgba(102,217,239,0.12));
          }
          .status {
            padding: 18px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(14,28,47,0.84);
            color: var(--muted);
            line-height: 1.7;
            margin-bottom: 16px;
          }
          .status.error {
            border-color: rgba(255,123,114,0.28);
            color: #ffd6d1;
          }
          .report-frame {
            width: 100%;
            min-height: calc(100vh - 170px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            background: #fff;
          }
          .hidden { display: none; }
        </style>
      </head>
      <body>
        <div class="shell">
          <div class="toolbar">
            <div class="title">
              <h1>Load Test Report</h1>
              <p id="subtitle">正在从 GitLab artifact 拉取报告内容。</p>
            </div>
            <div class="actions">
              <a class="btn" href="/">返回 Portal</a>
              <a class="btn" id="open-job" href="/gitlab/root/webapp-template-lab/-/jobs" target="_blank" rel="noreferrer">打开 Job</a>
              <a class="btn primary hidden" id="login-link" href="http://192.168.0.108:8929/users/sign_in" target="_blank" rel="noreferrer">登录 GitLab</a>
            </div>
          </div>
          <div class="status" id="status">加载中，请稍候...</div>
          <iframe class="report-frame hidden" id="report-frame" title="Load Test Report Preview"></iframe>
        </div>
        <script>
          const params = new URLSearchParams(window.location.search);
          const jobId = (params.get('job_id') || '').trim();
          const isPublicPortalHost = window.location.hostname === 'saurick.space' || window.location.hostname.endsWith('.saurick.space');
          const statusNode = document.getElementById('status');
          const subtitleNode = document.getElementById('subtitle');
          const frameNode = document.getElementById('report-frame');
          const loginLink = document.getElementById('login-link');
          const openJobLink = document.getElementById('open-job');
          const reportPath = (id) => `/gitlab/root/webapp-template-lab/-/jobs/${id}/artifacts/raw/server/deploy/lab-ha/artifacts/loadtest/job/report.html`;
          const jobUrl = (id) => `/gitlab/root/webapp-template-lab/-/jobs/${id}`;

          if (jobId) {
            openJobLink.href = jobUrl(jobId);
            subtitleNode.textContent = `Job #${jobId} 的在线报告预览`;
          }
          loginLink.href = isPublicPortalHost ? 'https://gitlab.saurick.space/users/sign_in' : 'http://192.168.0.108:8929/users/sign_in';

          const showStatus = (text, isError = false) => {
            statusNode.textContent = text;
            statusNode.classList.toggle('error', isError);
            statusNode.classList.remove('hidden');
          };

          const renderReport = async () => {
            if (!jobId) {
              showStatus('缺少 job_id，无法定位要预览的压测报告。', true);
              return;
            }

            try {
              // 通过 Portal 同源代理拉取 artifact 内容，再写入 iframe，避免 GitLab 产物页强制下载。
              const response = await fetch(reportPath(jobId), {
                credentials: 'same-origin',
                redirect: 'follow',
              });
              if (response.status === 204 && response.headers.get('x-portal-login-required') === '1') {
                showStatus('当前浏览器还没有 GitLab 登录态，请先登录后再回来查看。', true);
                loginLink.classList.remove('hidden');
                return;
              }
              if (!response.ok) {
                throw new Error(`GitLab report fetch failed: ${response.status}`);
              }

              const html = await response.text();
              const iframeDoc = frameNode.contentWindow.document;
              iframeDoc.open();
              iframeDoc.write(html);
              iframeDoc.close();
              frameNode.classList.remove('hidden');
              statusNode.classList.add('hidden');
            } catch (error) {
              showStatus(`报告加载失败：${error.message || 'unknown error'}`, true);
            }
          };

          renderReport();
        </script>
      </body>
    </html>
  default.conf: |
    server {
      listen 80;
      server_name _;
      root /usr/share/nginx/html;
      index index.html;

      location /gitlab-api/ {
        proxy_pass http://192.168.0.108:8929/api/v4/;
        proxy_http_version 1.1;
        proxy_set_header Host 192.168.0.108:8929;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 301 302 307 308 401 = @gitlab_login_required;
      }

      location /gitlab/ {
        proxy_pass http://192.168.0.108:8929/;
        proxy_http_version 1.1;
        proxy_set_header Host 192.168.0.108:8929;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 301 302 307 308 401 = @gitlab_login_required;
      }

      location /alert-sink-api/ {
        proxy_pass http://alert-webhook-receiver.monitoring.svc.cluster.local:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location /portal-secrets/ {
        alias /etc/lab-portal-secrets/;
        default_type application/json;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        expires -1;
        autoindex off;
      }

      location @gitlab_login_required {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header X-Portal-Login-Required "1" always;
        return 204;
      }

      location / {
        # Portal 首页会动态拼最近一次压测入口，必须禁缓存避免浏览器继续沿用旧链接。
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        expires -1;
        try_files $uri $uri/ /index.html;
      }
    }

    server {
      listen 8080;
      server_name _;

      location / {
        # active/preview 入口要复用 Portal 这层 NodePort，因此这里直接反代到 prod-trial active Service。
        proxy_pass http://webapp-template-prod-trial.webapp-prod-trial.svc.cluster.local:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
    }

    server {
      listen 8081;
      server_name _;

      location / {
        # preview 入口与 active 分离，便于 Portal / blackbox / Rollouts 走固定端口校验。
        proxy_pass http://webapp-template-prod-trial-preview.webapp-prod-trial.svc.cluster.local:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab-portal
  namespace: lab-portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lab-portal
  template:
    metadata:
      labels:
        app: lab-portal
    spec:
      containers:
        - name: nginx
          image: docker.m.daocloud.io/library/nginx:1.27-alpine
          ports:
            - containerPort: 80
              name: http
            - containerPort: 8080
              name: trial-active
            - containerPort: 8081
              name: trial-preview
          resources:
            requests:
              cpu: 30m
              memory: 32Mi
            limits:
              cpu: 150m
              memory: 96Mi
          volumeMounts:
            # 避免 subPath 导致 ConfigMap 更新后页面内容不热刷新。
            - name: html
              mountPath: /usr/share/nginx/html
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
            - name: portal-secrets
              mountPath: /etc/lab-portal-secrets
              readOnly: true
      volumes:
        - name: html
          configMap:
            name: lab-portal-site
            items:
              - key: index.html
                path: index.html
              - key: loadtest-report.html
                path: loadtest-report.html
        - name: nginx-config
          configMap:
            name: lab-portal-site
            items:
              - key: default.conf
                path: default.conf
        - name: portal-secrets
          secret:
            secretName: lab-portal-headlamp-access
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: lab-portal
  namespace: lab-portal
spec:
  type: NodePort
  selector:
    app: lab-portal
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30088
    - name: trial-active
      port: 8080
      targetPort: trial-active
      nodePort: 30089
    - name: trial-preview
      port: 8081
      targetPort: trial-preview
      nodePort: 30091
