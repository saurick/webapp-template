apiVersion: v1
kind: Namespace
metadata:
  name: lab-portal
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lab-portal-site
  namespace: lab-portal
data:
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>HA Lab Portal</title>
        <link
          rel="icon"
          type="image/svg+xml"
          href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%2366d9ef'/%3E%3Cstop offset='100%25' stop-color='%23ffd166'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='18' fill='%2307111f'/%3E%3Cpath d='M16 44V20h8l8 12 8-12h8v24h-8V31l-8 11-8-11v13z' fill='url(%23g)'/%3E%3Ccircle cx='50' cy='16' r='5' fill='%23ffd166'/%3E%3C/svg%3E"
        >
        <style>
          :root {
            --bg: #07111f;
            --panel: #0e1c2f;
            --line: #1f3654;
            --text: #eaf3ff;
            --muted: #9bb4d1;
            --accent: #66d9ef;
            --accent-2: #ffd166;
            --ok: #7bd88f;
          }
          * { box-sizing: border-box; }
          body {
            margin: 0;
            font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", sans-serif;
            background:
              radial-gradient(circle at top left, rgba(102,217,239,0.18), transparent 32%),
              radial-gradient(circle at top right, rgba(255,209,102,0.14), transparent 28%),
              linear-gradient(180deg, #07111f 0%, #081521 100%);
            color: var(--text);
            min-height: 100vh;
          }
          .wrap {
            max-width: 1180px;
            margin: 0 auto;
            padding: 32px 20px 56px;
          }
          .hero {
            padding: 28px;
            border: 1px solid rgba(102,217,239,0.15);
            background: rgba(14,28,47,0.78);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.28);
          }
          .eyebrow {
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.18em;
            font-size: 12px;
            margin-bottom: 14px;
          }
          h1 {
            margin: 0;
            font-size: clamp(28px, 5vw, 52px);
            line-height: 1.04;
          }
          .sub {
            margin: 14px 0 0;
            color: var(--muted);
            max-width: 760px;
            line-height: 1.7;
            font-size: 16px;
          }
          .pill-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 18px;
          }
          .pill {
            border-radius: 999px;
            padding: 8px 12px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            color: var(--muted);
            font-size: 13px;
          }
          .pill b {
            color: var(--text);
          }
          .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
            margin-top: 22px;
          }
          .card {
            display: block;
            text-decoration: none;
            color: inherit;
            padding: 18px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.08);
            background: linear-gradient(180deg, rgba(15,28,44,0.95), rgba(11,20,34,0.92));
            transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
          }
          .card:hover {
            transform: translateY(-2px);
            border-color: rgba(102,217,239,0.45);
            box-shadow: 0 14px 36px rgba(0,0,0,0.22);
          }
          .card small {
            display: block;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.16em;
            margin-bottom: 10px;
            font-size: 11px;
          }
          .card strong {
            display: block;
            font-size: 20px;
            margin-bottom: 8px;
          }
          .card span {
            display: block;
            color: var(--muted);
            line-height: 1.6;
            font-size: 14px;
          }
          .notes {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            margin-top: 24px;
          }
          .creds {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 16px;
            margin-top: 24px;
          }
          .note {
            padding: 18px;
            border-radius: 18px;
            background: rgba(8,16,29,0.86);
            border: 1px solid rgba(255,255,255,0.08);
          }
          .note h2 {
            margin: 0 0 10px;
            font-size: 16px;
          }
          .note p,
          .note li {
            color: var(--muted);
            line-height: 1.7;
            font-size: 14px;
          }
          .cred {
            padding: 18px;
            border-radius: 18px;
            background: linear-gradient(180deg, rgba(11,21,36,0.96), rgba(9,16,28,0.94));
            border: 1px solid rgba(255,255,255,0.08);
          }
          .cred h2 {
            margin: 0 0 12px;
            font-size: 18px;
          }
          .cred-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-top: 1px solid rgba(255,255,255,0.06);
          }
          .cred-line:first-of-type { border-top: 0; }
          .cred-label {
            color: var(--muted);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
          }
          .cred-value {
            color: var(--text);
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 13px;
            word-break: break-all;
          }
          .copy {
            border: 0;
            border-radius: 999px;
            padding: 7px 12px;
            background: rgba(102,217,239,0.14);
            color: var(--accent);
            cursor: pointer;
            font-size: 12px;
          }
          .copy:hover { background: rgba(102,217,239,0.22); }
          ul { margin: 10px 0 0; padding-left: 18px; }
          code {
            background: rgba(255,255,255,0.06);
            padding: 2px 6px;
            border-radius: 6px;
          }
          .tag {
            display: inline-block;
            margin-top: 12px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(255,209,102,0.12);
            color: var(--accent-2);
            font-size: 12px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
          }
          .status-ok {
            color: var(--ok);
            font-weight: 600;
          }
        </style>
      </head>
      <body>
        <div class="wrap">
          <section class="hero">
            <div class="eyebrow">3-node HA Lab</div>
            <h1>WebApp Platform Portal</h1>
            <p class="sub">
              Direct browser entrypoints for the current lab cluster. These links are mapped to
              stable <code>192.168.0.108:port</code> endpoints so they keep working even when
              <code>nip.io</code> or Host-header based routes are unreliable on the client side.
            </p>
            <div class="pill-row">
              <div class="pill"><b>Mode</b> Experiment HA</div>
              <div class="pill"><b>Nodes</b> 3 VM / single stable host</div>
              <div class="pill"><b>Status</b> <span class="status-ok">Healthy</span></div>
              <div class="pill"><b>Best Entry</b> IP:Port direct</div>
            </div>
            <div class="grid">
              <a class="card" href="http://192.168.0.108:32668" target="_blank" rel="noreferrer">
                <small>App</small><strong>WebApp</strong><span>Main product site.</span>
              </a>
              <a class="card" href="http://192.168.0.108:30088" target="_blank" rel="noreferrer">
                <small>Portal</small><strong>Lab Portal</strong><span>This navigation page itself.</span>
              </a>
              <a class="card" href="http://192.168.0.108:30002" target="_blank" rel="noreferrer">
                <small>Registry</small><strong>Harbor</strong><span>Container registry UI.</span>
              </a>
              <a class="card" href="http://192.168.0.108:30081" target="_blank" rel="noreferrer">
                <small>Metrics</small><strong>Grafana</strong><span>Dashboards and observability.</span>
              </a>
              <a class="card" href="http://192.168.0.108:30090/graph" target="_blank" rel="noreferrer">
                <small>Metrics</small><strong>Prometheus</strong><span>Raw scrape and query UI.</span>
              </a>
              <a class="card" href="http://192.168.0.108:30093" target="_blank" rel="noreferrer">
                <small>Alerts</small><strong>Alertmanager</strong><span>Alert grouping and routing.</span>
              </a>
              <a class="card" href="https://192.168.0.108:30443" target="_blank" rel="noreferrer">
                <small>GitOps</small><strong>Argo CD</strong><span>Self-signed HTTPS. Browser may ask you to continue once.</span>
              </a>
              <a class="card" href="http://192.168.0.108:30084" target="_blank" rel="noreferrer">
                <small>Storage</small><strong>Longhorn</strong><span>Persistent volume UI.</span>
              </a>
              <a class="card" href="http://192.168.0.108:30085" target="_blank" rel="noreferrer">
                <small>Network</small><strong>Hubble</strong><span>Cilium flow visibility UI.</span>
              </a>
              <a class="card" href="http://192.168.0.108:30888" target="_blank" rel="noreferrer">
                <small>Object Store</small><strong>SeaweedFS Filer</strong><span>Human-friendly browser UI.</span>
              </a>
              <a class="card" href="http://192.168.0.108:30086" target="_blank" rel="noreferrer">
                <small>Alerts</small><strong>Alert Sink</strong><span>Webhook receiver used for smoke tests.</span>
              </a>
              <a class="card" href="http://192.168.0.108:8929/users/sign_in" target="_blank" rel="noreferrer">
                <small>Source Code</small><strong>GitLab</strong><span>CI/CD and experiment repo.</span>
              </a>
            </div>
            <div class="tag">Stable direct browser endpoints</div>
          </section>

          <section class="creds">
            <div class="cred">
              <h2>Default Accounts</h2>
              <div class="cred-line">
                <div>
                  <div class="cred-label">WebApp</div>
                  <div class="cred-value">admin / AdminLab123!</div>
                </div>
                <button class="copy" data-copy="admin / AdminLab123!">Copy</button>
              </div>
              <div class="cred-line">
                <div>
                  <div class="cred-label">Harbor</div>
                  <div class="cred-value">admin / HarborAdmin123!</div>
                </div>
                <button class="copy" data-copy="admin / HarborAdmin123!">Copy</button>
              </div>
              <div class="cred-line">
                <div>
                  <div class="cred-label">Grafana</div>
                  <div class="cred-value">admin / Grafana123!</div>
                </div>
                <button class="copy" data-copy="admin / Grafana123!">Copy</button>
              </div>
              <div class="cred-line">
                <div>
                  <div class="cred-label">Argo CD</div>
                  <div class="cred-value">admin / aLgJjYwPdezuEzSw</div>
                </div>
                <button class="copy" data-copy="admin / aLgJjYwPdezuEzSw">Copy</button>
              </div>
              <div class="cred-line">
                <div>
                  <div class="cred-label">GitLab</div>
                  <div class="cred-value">root / L4b!Runr2026#Git</div>
                </div>
                <button class="copy" data-copy="root / L4b!Runr2026#Git">Copy</button>
              </div>
            </div>

            <div class="cred">
              <h2>Quick Notes</h2>
              <div class="cred-line">
                <div>
                  <div class="cred-label">Argo CD</div>
                  <div class="cred-value">Self-signed HTTPS. Browser warning once is expected.</div>
                </div>
              </div>
              <div class="cred-line">
                <div>
                  <div class="cred-label">SeaweedFS S3</div>
                  <div class="cred-value">30333 is API-only. Browser AccessDenied is expected.</div>
                </div>
              </div>
              <div class="cred-line">
                <div>
                  <div class="cred-label">Filer UI</div>
                  <div class="cred-value">Use 30888 for human browsing and basic object checks.</div>
                </div>
              </div>
              <div class="cred-line">
                <div>
                  <div class="cred-label">GitOps</div>
                  <div class="cred-value">GitLab CI + Argo CD already drive the lab deployment path.</div>
                </div>
              </div>
            </div>
          </section>

          <section class="notes">
            <div class="note">
              <h2>What Portal is for</h2>
              <ul>
                <li>Central landing page for every lab system.</li>
                <li>Reduces the need to remember many ports.</li>
                <li>Explains which endpoints are web pages and which are APIs.</li>
                <li>Lets future operators or AI pick up the lab quickly.</li>
              </ul>
            </div>
            <div class="note">
              <h2>SeaweedFS S3 note</h2>
              <p>
                <code>http://192.168.0.108:30333</code> is an S3 API endpoint, not a normal web UI.
                Browsers hit it without signed credentials, so an <code>AccessDenied</code> XML response
                is expected. Use <code>30888</code> for the filer UI instead.
              </p>
            </div>
            <div class="note">
              <h2>Docs</h2>
              <p>
                Full runbook, access notes, HA drills, and handover docs live in
                <code>server/deploy/lab-ha/docs</code> inside the repository.
              </p>
            </div>
          </section>
        </div>
        <script>
          document.querySelectorAll('.copy').forEach((button) => {
            button.addEventListener('click', async () => {
              const value = button.getAttribute('data-copy') || '';
              try {
                await navigator.clipboard.writeText(value);
                const old = button.textContent;
                button.textContent = 'Copied';
                setTimeout(() => {
                  button.textContent = old;
                }, 1200);
              } catch (_err) {
                button.textContent = 'Copy manually';
              }
            });
          });
        </script>
      </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab-portal
  namespace: lab-portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lab-portal
  template:
    metadata:
      labels:
        app: lab-portal
    spec:
      containers:
        - name: nginx
          image: docker.m.daocloud.io/library/nginx:1.27-alpine
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 30m
              memory: 32Mi
            limits:
              cpu: 150m
              memory: 96Mi
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
      volumes:
        - name: html
          configMap:
            name: lab-portal-site
---
apiVersion: v1
kind: Service
metadata:
  name: lab-portal
  namespace: lab-portal
spec:
  type: NodePort
  selector:
    app: lab-portal
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30088
