apiVersion: v1
kind: Namespace
metadata:
  name: lab-portal
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lab-portal-site
  namespace: lab-portal
data:
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>HA Lab Portal</title>
        <link
          rel="icon"
          type="image/svg+xml"
          href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%2366d9ef'/%3E%3Cstop offset='100%25' stop-color='%23ffd166'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='18' fill='%2307111f'/%3E%3Cpath d='M16 44V20h8l8 12 8-12h8v24h-8V31l-8 11-8-11v13z' fill='url(%23g)'/%3E%3Ccircle cx='50' cy='16' r='5' fill='%23ffd166'/%3E%3C/svg%3E"
        >
        <style>
          :root {
            --bg: #07111f;
            --panel: #0e1c2f;
            --line: #1f3654;
            --text: #eaf3ff;
            --muted: #9bb4d1;
            --accent: #66d9ef;
            --accent-2: #ffd166;
            --ok: #7bd88f;
            --warn: #ffd166;
            --danger: #ff7b72;
          }
          * { box-sizing: border-box; }
          body {
            margin: 0;
            font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", sans-serif;
            background:
              radial-gradient(circle at top left, rgba(102,217,239,0.18), transparent 32%),
              radial-gradient(circle at top right, rgba(255,209,102,0.14), transparent 28%),
              linear-gradient(180deg, #07111f 0%, #081521 100%);
            color: var(--text);
            min-height: 100vh;
          }
          .wrap {
            max-width: 1180px;
            margin: 0 auto;
            padding: 32px 20px 56px;
          }
          .hero {
            padding: 28px;
            border: 1px solid rgba(102,217,239,0.15);
            background: rgba(14,28,47,0.78);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.28);
          }
          .hero-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 18px;
          }
          .hero-controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 12px;
          }
          .hero-copy {
            min-width: 0;
            flex: 1;
          }
          .eyebrow {
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.18em;
            font-size: 12px;
            margin-bottom: 14px;
          }
          .control-stack {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: flex-start;
          }
          .control-label {
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.14em;
            font-size: 11px;
          }
          .control-switch {
            display: inline-flex;
            gap: 8px;
            padding: 6px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
          }
          .control-btn {
            border: 0;
            border-radius: 999px;
            padding: 8px 12px;
            min-width: 64px;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.04em;
            transition: background 160ms ease, color 160ms ease, transform 160ms ease;
          }
          .control-btn:hover {
            color: var(--text);
            transform: translateY(-1px);
          }
          .control-btn[aria-pressed="true"] {
            background: linear-gradient(180deg, rgba(102,217,239,0.28), rgba(102,217,239,0.16));
            color: var(--text);
            box-shadow: inset 0 0 0 1px rgba(102,217,239,0.18);
          }
          h1 {
            margin: 0;
            font-size: clamp(28px, 5vw, 52px);
            line-height: 1.04;
          }
          .sub {
            margin: 14px 0 0;
            color: var(--muted);
            max-width: 760px;
            line-height: 1.7;
            font-size: 16px;
          }
          .pill-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 18px;
          }
          .pill {
            border-radius: 999px;
            padding: 8px 12px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            color: var(--muted);
            font-size: 13px;
          }
          .pill b {
            color: var(--text);
          }
          .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
            margin-top: 22px;
          }
          .card {
            display: block;
            text-decoration: none;
            color: inherit;
            padding: 18px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.08);
            background: linear-gradient(180deg, rgba(15,28,44,0.95), rgba(11,20,34,0.92));
            transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
          }
          .card:hover {
            transform: translateY(-2px);
            border-color: rgba(102,217,239,0.45);
            box-shadow: 0 14px 36px rgba(0,0,0,0.22);
          }
          .card-accent {
            border-color: rgba(102,217,239,0.28);
            background:
              linear-gradient(180deg, rgba(15,28,44,0.96), rgba(11,20,34,0.92)),
              radial-gradient(circle at top right, rgba(102,217,239,0.12), transparent 46%);
          }
          .card-accent:hover {
            border-color: rgba(255,209,102,0.55);
          }
          .card-accent small {
            color: var(--accent-2);
          }
          .card.is-busy,
          .status-link.is-busy {
            pointer-events: none;
            opacity: 0.68;
            transform: none !important;
          }
          .card small {
            display: block;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.16em;
            margin-bottom: 10px;
            font-size: 11px;
          }
          .card strong {
            display: block;
            font-size: 20px;
            margin-bottom: 8px;
          }
          .card span {
            display: block;
            color: var(--muted);
            line-height: 1.6;
            font-size: 14px;
          }
          .notes {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            margin-top: 24px;
          }
          .creds {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 16px;
            margin-top: 24px;
          }
          .snapshot {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
            margin-top: 24px;
          }
          .note {
            padding: 18px;
            border-radius: 18px;
            background: rgba(8,16,29,0.86);
            border: 1px solid rgba(255,255,255,0.08);
          }
          .note h2 {
            margin: 0 0 10px;
            font-size: 16px;
          }
          .note p,
          .note li {
            color: var(--muted);
            line-height: 1.7;
            font-size: 14px;
          }
          .cred {
            padding: 18px;
            border-radius: 18px;
            background: linear-gradient(180deg, rgba(11,21,36,0.96), rgba(9,16,28,0.94));
            border: 1px solid rgba(255,255,255,0.08);
          }
          .cred h2 {
            margin: 0 0 12px;
            font-size: 18px;
          }
          .cred-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-top: 1px solid rgba(255,255,255,0.06);
          }
          .cred-line:first-of-type { border-top: 0; }
          .cred-label {
            color: var(--muted);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
          }
          .cred-value {
            color: var(--text);
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 13px;
            word-break: break-all;
          }
          .cred-meta {
            margin-top: 4px;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.6;
            word-break: break-word;
          }
          .cred-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 8px;
          }
          .copy {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 0;
            border-radius: 999px;
            min-width: 112px;
            padding: 7px 12px;
            background: rgba(102,217,239,0.14);
            color: var(--accent);
            cursor: pointer;
            font-size: 12px;
            white-space: nowrap;
          }
          .copy:hover {
            background: rgba(102,217,239,0.22);
          }
          .copy:disabled {
            opacity: 0.42;
            cursor: not-allowed;
          }
          ul { margin: 10px 0 0; padding-left: 18px; }
          code {
            background: rgba(255,255,255,0.06);
            padding: 2px 6px;
            border-radius: 6px;
          }
          .tag {
            display: inline-block;
            margin-top: 12px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(255,209,102,0.12);
            color: var(--accent-2);
            font-size: 12px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
          }
          .status-ok {
            color: var(--ok);
            font-weight: 600;
          }
          .status-loading {
            color: var(--accent);
            font-weight: 600;
          }
          .status-warn {
            color: var(--warn);
            font-weight: 600;
          }
          .status-fail {
            color: var(--danger);
            font-weight: 700;
          }
          .status-card {
            padding: 18px;
            border-radius: 18px;
            background: linear-gradient(180deg, rgba(10,20,34,0.96), rgba(8,16,28,0.94));
            border: 1px solid rgba(255,255,255,0.08);
          }
          .status-emphasis {
            border-color: rgba(102,217,239,0.28);
            box-shadow: inset 0 0 0 1px rgba(102,217,239,0.12);
          }
          .status-card h2 {
            margin: 0 0 8px;
            font-size: 16px;
          }
          .status-value {
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 8px;
          }
          .status-card p {
            margin: 0;
            color: var(--muted);
            line-height: 1.7;
            font-size: 14px;
          }
          .status-detail {
            margin-top: 8px !important;
            color: var(--muted);
            font-size: 13px !important;
          }
          .status-card a {
            color: var(--accent);
          }
          .status-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 14px;
          }
          .status-link {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            border-radius: 999px;
            padding: 8px 12px;
            background: rgba(102,217,239,0.14);
            color: var(--accent);
            border: 1px solid rgba(102,217,239,0.12);
            font-size: 13px;
            font-weight: 600;
            transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
          }
          .status-link:hover {
            transform: translateY(-1px);
            background: rgba(102,217,239,0.2);
            border-color: rgba(102,217,239,0.28);
          }
          .status-link-secondary {
            background: rgba(255,209,102,0.12);
            border-color: rgba(255,209,102,0.16);
            color: var(--accent-2);
          }
          .status-link-secondary:hover {
            background: rgba(255,209,102,0.18);
            border-color: rgba(255,209,102,0.28);
          }
          .boot-progress {
            margin-top: 24px;
            padding: 22px;
          }
          .boot-progress-head {
            display: grid;
            grid-template-columns: minmax(0, 1.3fr) minmax(280px, 1fr);
            gap: 18px;
            align-items: start;
          }
          .boot-progress-copy h2 {
            margin: 0 0 10px;
            font-size: 18px;
          }
          .boot-progress-copy .eyebrow {
            margin-bottom: 10px;
          }
          .boot-progress-board {
            display: grid;
            gap: 12px;
            padding: 16px;
            border-radius: 18px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
          }
          .boot-progress-board h3 {
            margin: 0;
            font-size: 13px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
          }
          .boot-steps {
            display: grid;
            gap: 10px;
          }
          .boot-step {
            display: grid;
            grid-template-columns: 28px minmax(0, 1fr) auto;
            gap: 10px;
            align-items: center;
            padding: 12px 14px;
            border-radius: 14px;
            background: rgba(7,17,31,0.56);
            border: 1px solid rgba(255,255,255,0.08);
          }
          .boot-step-index {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 999px;
            background: rgba(102,217,239,0.12);
            color: var(--accent);
            font-size: 12px;
            font-weight: 700;
          }
          .boot-step-copy {
            min-width: 0;
          }
          .boot-step-copy strong,
          .boot-step-copy small {
            display: block;
          }
          .boot-step-copy strong {
            font-size: 14px;
          }
          .boot-step-copy small {
            margin-top: 4px;
            color: var(--muted);
            font-size: 12px;
          }
          .boot-step-copy .boot-step-hint {
            font-size: 11px;
            line-height: 1.45;
            color: rgba(214, 227, 255, 0.72);
          }
          .boot-step-state {
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
          }
          .boot-step-ready {
            border-color: rgba(123,216,143,0.2);
            background: rgba(10,30,18,0.42);
          }
          .boot-step-ready .boot-step-index {
            background: rgba(123,216,143,0.16);
            color: var(--ok);
          }
          .boot-step-ready .boot-step-state {
            color: var(--ok);
          }
          .boot-step-next {
            border-color: rgba(255,209,102,0.28);
            background: rgba(52,38,8,0.26);
          }
          .boot-step-next .boot-step-index {
            background: rgba(255,209,102,0.18);
            color: var(--accent-2);
          }
          .boot-step-next .boot-step-state {
            color: var(--accent-2);
          }
          .boot-step-waiting .boot-step-state {
            color: var(--muted);
          }
          .boot-gates {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 10px;
            margin-top: 16px;
          }
          .boot-gate {
            padding: 12px 14px;
            border-radius: 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
          }
          .boot-gate-label {
            color: var(--muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
          }
          .boot-gate-value {
            display: block;
            margin-top: 8px;
            font-size: 16px;
            font-weight: 700;
          }
          .boot-gate-detail {
            margin-top: 6px;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.5;
          }
          .hidden {
            display: none;
          }
          @media (max-width: 720px) {
            .hero-head {
              flex-direction: column;
            }
            .hero-controls {
              align-self: flex-start;
            }
            .boot-progress-head {
              grid-template-columns: 1fr;
            }
          }
        </style>
      </head>
      <body>
        <div class="wrap">
          <section class="hero">
            <div class="hero-head">
              <div class="hero-copy">
                <div class="eyebrow" data-i18n="hero.eyebrow">3-node HA Lab</div>
                <h1 data-i18n="hero.title">WebApp Lab Portal</h1>
                <p class="sub" data-i18n-html="hero.sub">
                  This portal now keeps both internal <code>IP:Port</code> entrypoints and public
                  <code>HTTPS</code> domains. Use the access switch on the right to decide which
                  target each card opens.
                </p>
              </div>
              <div class="hero-controls">
                <div class="control-stack">
                  <div class="control-label" data-i18n="access.title">Link target</div>
                  <div
                    class="control-switch"
                    role="group"
                    aria-label="Switch portal access mode"
                    data-i18n-aria-label="access.switch"
                  >
                    <button type="button" class="control-btn access-btn" data-access-mode="internal" aria-pressed="false" data-i18n="access.internal">Internal</button>
                    <button type="button" class="control-btn access-btn" data-access-mode="external" aria-pressed="false" data-i18n="access.external">Public</button>
                  </div>
                </div>
                <div class="control-stack">
                  <div class="control-label" data-i18n="language.title">Language</div>
                  <div
                    class="control-switch"
                    role="group"
                    aria-label="Switch language"
                    data-i18n-aria-label="language.switch"
                  >
                    <button type="button" class="control-btn lang-btn" data-lang="zh" aria-pressed="false">中文</button>
                    <button type="button" class="control-btn lang-btn" data-lang="en" aria-pressed="true">EN</button>
                  </div>
                </div>
              </div>
            </div>
            <div class="pill-row">
              <div class="pill" data-i18n-html="pill.mode"><b>Mode</b> Experiment HA</div>
              <div class="pill" data-i18n-html="pill.nodes"><b>Nodes</b> 3 VM / single stable host</div>
              <div class="pill" data-i18n-html="pill.status"><b>Status</b> <span class="status-ok">Healthy</span></div>
              <div id="access-mode-pill" class="pill"><b>Access</b> Internal links</div>
              <div id="best-entry-pill" class="pill"><b>Best Entry</b> IP:Port direct</div>
              <div class="pill" data-i18n-html="pill.curated"><b>Portal Curated</b> 2026-04-08</div>
            </div>
            <div class="grid">
              <a class="card" href="http://192.168.0.108:32668" target="_blank" rel="noreferrer" data-i18n-html="cards.app">
                <small>App</small><strong>WebApp Lab</strong><span>Current lab entry via the shared ingress.</span>
              </a>
              <a class="card" href="http://192.168.0.108:30088" target="_blank" rel="noreferrer" data-i18n-html="cards.portal">
                <small>Portal</small><strong>Lab Portal</strong><span>This navigation page itself.</span>
              </a>
              <a class="card" href="http://192.168.0.156:30088" target="_blank" rel="noreferrer" data-i18n-html="cards.observer">
                <small>Fallback</small><strong>Lab Observer</strong><span>Cluster-external boot and shutdown observer for the periods when Portal is still down or already going away.</span>
              </a>
              <a class="card" href="http://192.168.0.9:9876" target="_blank" rel="noreferrer" data-i18n-html="cards.ddns">
                <small>Edge</small><strong>DDNS Go</strong><span>Dynamic DNS console for the public edge host. Use it when lab.saurick.space needs to follow the current edge IPv6.</span>
              </a>
              <a class="card" href="http://192.168.0.108:30002" target="_blank" rel="noreferrer" data-i18n-html="cards.registry">
                <small>Registry</small><strong>Harbor</strong><span>Container registry UI.</span>
              </a>
              <a class="card" href="http://192.168.0.108:30081" target="_blank" rel="noreferrer" data-i18n-html="cards.grafana">
                <small>Metrics</small><strong>Grafana</strong><span>Dashboards and observability.</span>
              </a>
              <a class="card" href="http://192.168.0.108:30081/d/lab-ha-service-governance/ha-lab-service-governance" target="_blank" rel="noreferrer" data-i18n-html="cards.k8s">
                <small>K8s</small><strong>K8s Workloads</strong><span>Nodes, workloads, HPA, pod restarts, and ingress error signals.</span>
              </a>
              <a class="card" href="http://192.168.0.108:30087" target="_blank" rel="noreferrer" data-i18n-html="cards.headlamp">
                <small>K8s</small><strong>Headlamp</strong><span>Interactive cluster explorer with resource tree, YAML, logs, and map view.</span>
              </a>
              <a class="card" href="http://192.168.0.108:30081/d/lab-ha-overview/ha-lab-ops-overview" target="_blank" rel="noreferrer" data-i18n-html="cards.ops">
                <small>Ops</small><strong>Ops Overview</strong><span>Daily on-call dashboard for cluster, app, backup, and alerts.</span>
              </a>
              <a class="card" href="http://192.168.0.108:30081/d/lab-ha-data/ha-lab-data-and-storage" target="_blank" rel="noreferrer" data-i18n-html="cards.data">
                <small>Data</small><strong>Data &amp; Storage</strong><span>Database, Harbor, Longhorn, SeaweedFS, and PVC health view.</span>
              </a>
              <a class="card" href="http://192.168.0.108:30081/d/lab-ha-postgres/ha-lab-postgresql-and-backup" target="_blank" rel="noreferrer" data-i18n-html="cards.database">
                <small>Database</small><strong>PostgreSQL &amp; Backup</strong><span>Primary/replica roles, lag, DB size, and Velero backup signals.</span>
              </a>
              <a class="card" href="http://192.168.0.108:30081/d/lab-ha-gitops/ha-lab-gitops-and-delivery" target="_blank" rel="noreferrer" data-i18n-html="cards.delivery">
                <small>Delivery</small><strong>WebApp GitOps &amp; Release</strong><span>WebApp Lab sync plus WebApp Prod-Trial active/preview release signals.</span>
              </a>
              <a class="card" href="http://192.168.0.108:8929/root/webapp-template-lab/-/blob/master/server/deploy/lab-ha/docs/PUBLIC_GATEWAY.md" target="_blank" rel="noreferrer" data-i18n-html="cards.publicGateway">
                <small>Edge</small><strong>Public Gateway</strong><span>lab-edge Caddy host map, TLS renewal path, and live sync runbook.</span>
              </a>
              <a class="card card-accent" href="http://192.168.0.108:30089/" target="_blank" rel="noreferrer" data-i18n-html="cards.prodTrialActive">
                <small>Release</small><strong>WebApp Prod-Trial Active</strong><span>Current live release entry routed to the active Service.</span>
