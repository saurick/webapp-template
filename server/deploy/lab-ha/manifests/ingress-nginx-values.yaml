controller:
  config:
    # 显式把限流命中收口为 429，避免默认 503 让治理看板和告警口径失真。
    limit-req-status-code: "429"
    limit-conn-status-code: "429"
  image:
    registry: registry.aliyuncs.com
    image: google_containers/nginx-ingress-controller
    tag: v1.12.2
    digest: ""
  admissionWebhooks:
    patch:
      image:
        registry: registry.aliyuncs.com
        image: google_containers/kube-webhook-certgen
        tag: v1.5.3
        digest: ""
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: kube-prometheus-stack
  replicaCount: 2
  service:
    type: LoadBalancer
    # 入口策略要回收到 Helm 真源，避免后续升级后又退回只能本机命中 ingress pod 的 Local 模式。
    externalTrafficPolicy: Cluster
