grafana:
  adminPassword: Grafana123!
  image:
    registry: docker.m.daocloud.io
    repository: grafana/grafana
  initChownData:
    image:
      registry: docker.m.daocloud.io
      repository: library/busybox
  persistence:
    enabled: true
    size: 5Gi
    storageClassName: longhorn

kube-state-metrics:
  image:
    registry: registry.aliyuncs.com
    repository: google_containers/kube-state-metrics

kubeEtcd:
  enabled: true

prometheus:
  prometheusSpec:
    replicas: 1
    retention: 5d
    # 允许 k6 通过 Prometheus remote write 直接写入压测时序，统一在 Grafana 看趋势。
    enableRemoteWriteReceiver: true
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 20Gi
          storageClassName: longhorn

prometheusOperator:
  admissionWebhooks:
    patch:
      image:
        registry: registry.aliyuncs.com
        repository: google_containers/kube-webhook-certgen
        tag: v1.5.3
