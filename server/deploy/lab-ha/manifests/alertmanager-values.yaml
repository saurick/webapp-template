alertmanager:
  ingress:
    enabled: false
  config:
    global:
      resolve_timeout: 5m
    inhibit_rules:
      - source_matchers:
          - severity = critical
        target_matchers:
          - severity =~ warning|info
        equal:
          - namespace
          - alertname
      - source_matchers:
          - severity = warning
        target_matchers:
          - severity = info
        equal:
          - namespace
          - alertname
    route:
      group_by:
        - namespace
        - alertname
        - severity
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: lab-webhook
      routes:
        - receiver: 'null'
          matchers:
            - alertname = "Watchdog"
    receivers:
      - name: 'null'
      - name: lab-webhook
        webhook_configs:
          - url: http://alert-webhook-receiver.monitoring.svc.cluster.local:8080/
            send_resolved: true
