apiVersion: v1
kind: ConfigMap
metadata:
  name: lab-ha-grafana-jaeger-datasource
  namespace: monitoring
  labels:
    grafana_datasource: "1"
    release: kube-prometheus-stack
data:
  jaeger-datasource.yaml: |-
    apiVersion: 1
    datasources:
      - name: Jaeger
        type: jaeger
        uid: jaeger
        access: proxy
        url: http://jaeger.monitoring.svc.cluster.local:16686/
        editable: false
        jsonData:
          # 统一按 trace id 回查 Loki，避免依赖 span 里未上报的 k8s 标签。
          tracesToLogsV2:
            datasourceUid: loki
            spanStartTimeShift: "-5m"
            spanEndTimeShift: "5m"
            customQuery: true
            query: '{namespace=~"webapp|webapp-prod-trial"} |= "$${__trace.traceId}"'
