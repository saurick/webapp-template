serviceMonitor:
  enabled: true
  defaults:
    labels:
      release: kube-prometheus-stack
    interval: 30s
    scrapeTimeout: 10s
  targets:
    - name: jaeger
      url: http://192.168.0.108:30686/
      labels:
        component: jaeger
        access: direct
    - name: gitlab
      url: http://192.168.0.108:8929/users/sign_in
      labels:
        component: gitlab
        access: external
    - name: portal
      url: http://192.168.0.108:30088/
      labels:
        component: portal
        access: direct
    - name: webapp
      url: http://192.168.0.108:32668/readyz
      labels:
        component: webapp
        access: direct
    # blackbox exporter 在集群里直接探 NodePort，并分别带 active/preview Host 头，避免依赖 nip.io DNS。
    - name: webapp-prod-trial-active
      url: http://192.168.0.108:32668/readyz
      module: http_2xx_webapp_prod_trial_active
      labels:
        release: kube-prometheus-stack
        component: webapp-prod-trial
        access: ingress
        release_slot: active
    - name: webapp-prod-trial-preview
      url: http://192.168.0.108:32668/readyz
      module: http_2xx_webapp_prod_trial_preview
      labels:
        release: kube-prometheus-stack
        component: webapp-prod-trial
        access: ingress
        release_slot: preview
    - name: harbor
      url: http://192.168.0.108:30002/api/v2.0/ping
      labels:
        component: harbor
        access: direct
    - name: grafana
      url: http://192.168.0.108:30081/login
      labels:
        component: grafana
        access: direct
    - name: argocd
      url: https://192.168.0.108:30443/
      module: https_2xx_insecure
      labels:
        component: argocd
        access: direct
    - name: prometheus
      url: http://192.168.0.108:30090/-/ready
      labels:
        component: prometheus
        access: direct
    - name: alertmanager
      url: http://192.168.0.108:30093/-/ready
      labels:
        component: alertmanager
        access: direct
    - name: longhorn
      url: http://192.168.0.108:30084/
      labels:
        component: longhorn
        access: direct
    - name: hubble
      url: http://192.168.0.108:30085/
      labels:
        component: hubble
        access: direct
    - name: seaweedfs-filer
      url: http://192.168.0.108:30888/
      labels:
        component: seaweedfs
        access: direct

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

config:
  modules:
    http_2xx:
      prober: http
      timeout: 5s
      http:
        valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
        follow_redirects: true
        preferred_ip_protocol: ip4
        valid_status_codes: [200, 302, 401, 405]
    http_2xx_webapp_prod_trial_active:
      prober: http
      timeout: 5s
      http:
        valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
        follow_redirects: true
        preferred_ip_protocol: ip4
        headers:
          Host: webapp-trial.192.168.0.108.nip.io
        valid_status_codes: [200, 302, 401, 405]
    http_2xx_webapp_prod_trial_preview:
      prober: http
      timeout: 5s
      http:
        valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
        follow_redirects: true
        preferred_ip_protocol: ip4
        headers:
          Host: webapp-trial-preview.192.168.0.108.nip.io
        valid_status_codes: [200, 302, 401, 405]
    https_2xx_insecure:
      prober: http
      timeout: 5s
      http:
        valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
        follow_redirects: true
        preferred_ip_protocol: ip4
        tls_config:
          insecure_skip_verify: true
        valid_status_codes: [200, 302, 401, 405]

serviceMonitorSelectorNilUsesHelmValues: false

podMonitoring:
  enabled: false

prometheusRule:
  enabled: true
  additionalLabels:
    release: kube-prometheus-stack
  rules:
    - alert: LabEndpointDown
      expr: probe_success{job=~"prometheus-blackbox-exporter.*"} == 0
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "实验室入口异常（{{ $labels.target }})"
        description: "目标 {{ $labels.target }} 对应入口 {{ $labels.instance }} 连续 2 分钟探测失败。先打开 dashboard_url 看值班总览，再按 runbook_url 排查。"
        dashboard_url: "http://192.168.0.108:30081/d/lab-ha-overview/ha-lab-ops-overview"
        runbook_url: "http://192.168.0.108:8929/root/webapp-template-lab/-/blob/master/server/deploy/lab-ha/docs/TROUBLESHOOTING.md"
        alertmanager_url: "http://192.168.0.108:30093/#/alerts"
