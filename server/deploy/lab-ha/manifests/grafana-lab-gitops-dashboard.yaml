apiVersion: v1
kind: ConfigMap
metadata:
  name: lab-ha-grafana-gitops
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    release: kube-prometheus-stack
data:
  lab-ha-gitops.json: |-
    {
      "id": null,
      "uid": "lab-ha-gitops",
      "title": "HA Lab / GitOps & Delivery",
      "tags": ["lab-ha", "gitops", "delivery"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "App Synced",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 5, "w": 4, "x": 0, "y": 0},
          "targets": [{"expr": "sum(argocd_app_info{name=\"webapp-template-lab\",sync_status=\"Synced\"})", "instant": true, "refId": "A"}],
          "options": {"colorMode": "value", "graphMode": "none", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}},
          "fieldConfig": {"defaults": {"unit": "none", "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}}
        },
        {
          "id": 2,
          "type": "stat",
          "title": "App Healthy",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 5, "w": 4, "x": 4, "y": 0},
          "targets": [{"expr": "sum(argocd_app_info{name=\"webapp-template-lab\",health_status=\"Healthy\"})", "instant": true, "refId": "A"}],
          "options": {"colorMode": "value", "graphMode": "none", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}},
          "fieldConfig": {"defaults": {"unit": "none", "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}}
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Sync Success (24h)",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 5, "w": 4, "x": 8, "y": 0},
          "targets": [{"expr": "sum(argocd_app_sync_total{name=\"webapp-template-lab\",phase=\"Succeeded\"})", "instant": true, "refId": "A"}],
          "options": {"colorMode": "value", "graphMode": "none", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}},
          "fieldConfig": {"defaults": {"unit": "none", "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}}
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Cluster Connected",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 5, "w": 4, "x": 12, "y": 0},
          "targets": [{"expr": "max(argocd_cluster_connection_status{server=\"https://kubernetes.default.svc\"})", "instant": true, "refId": "A"}],
          "options": {"colorMode": "value", "graphMode": "none", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}},
          "fieldConfig": {"defaults": {"unit": "none", "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}}
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Rollouts Controller",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 5, "w": 4, "x": 16, "y": 0},
          "targets": [{"expr": "max(argo_rollouts_controller_info)", "instant": true, "refId": "A"}],
          "options": {"colorMode": "value", "graphMode": "none", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}},
          "fieldConfig": {"defaults": {"unit": "none", "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}}
        },
        {
          "id": 6,
          "type": "stat",
          "title": "GitLab Probe",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 5, "w": 4, "x": 20, "y": 0},
          "targets": [{"expr": "probe_success{job=\"blackbox-exporter-prometheus-blackbox-exporter\",target=\"gitlab\"}", "instant": true, "refId": "A"}],
          "options": {"colorMode": "value", "graphMode": "none", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}},
          "fieldConfig": {"defaults": {"unit": "none", "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}}
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "App Reconcile Count",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 5},
          "targets": [{"expr": "argocd_app_reconcile_count{namespace=\"argocd\"}", "legendFormat": "{{dest_server}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "none"}},
          "options": {"legend": {"displayMode": "table", "placement": "bottom"}, "tooltip": {"mode": "multi"}}
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Successful Syncs",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 5},
          "targets": [{"expr": "argocd_app_sync_total{name=\"webapp-template-lab\",phase=\"Succeeded\"}", "legendFormat": "{{name}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "none"}},
          "options": {"legend": {"displayMode": "table", "placement": "bottom"}, "tooltip": {"mode": "multi"}}
        },
        {
          "id": 9,
          "type": "table",
          "title": "Application Status",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 13},
          "targets": [{"expr": "argocd_app_info{name=\"webapp-template-lab\"}", "format": "table", "instant": true, "refId": "A"}],
          "transformations": [{"id": "organize", "options": {"excludeByName": {"Time": true, "Value": true}, "indexByName": {"name": 0, "project": 1, "sync_status": 2, "health_status": 3, "dest_namespace": 4, "repo": 5}}}],
          "options": {"showHeader": true}
        },
        {
          "id": 10,
          "type": "text",
          "title": "GitOps Notes",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 13},
          "options": {
            "mode": "markdown",
            "content": "### GitOps & Delivery Notes\n\n- GitLab is the lab delivery remote; GitHub remains upstream template origin.\n- Argo CD watches the GitLab repo path `server/deploy/lab-ha/argocd/webapp`.\n- Rollouts controller is installed and exposed in metrics, ready for future rollout strategy expansion.\n- Primary day-to-day release signals are: GitLab probe, Argo app sync, app health, and successful sync count."
          }
        }
      ]
    }
