apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: webapp-template-prod-trial
  namespace: argocd
spec:
  project: default
  source:
    repoURL: http://192.168.0.108:8929/root/webapp-template-lab.git
    targetRevision: main
    # 内部域名切换仍复用同一个 Application，避免双应用同时管理同一命名空间。
    path: server/deploy/lab-ha/argocd/webapp-prod-trial-internal
  destination:
    server: https://kubernetes.default.svc
    namespace: webapp-prod-trial
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
