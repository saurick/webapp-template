namespace:
  create: true
  name: webapp
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: baseline
    pod-security.kubernetes.io/warn: baseline

app:
  name: webapp-template

configSecret:
  name: webapp-template-config
  content: |
    server:
      http:
        addr: 0.0.0.0:8000
        timeout: 10s
      grpc:
        addr: 0.0.0.0:9000
        timeout: 10s

    log:
      debug: false

    trace:
      jaeger:
        traceName: webapp-template.service
        endpoint: jaeger.monitoring.svc.cluster.local:4318
        ratio: 0.1

    data:
      postgres:
        debug: false
        dsn: postgres://webapp_owner:WebappPg123!@app-pg-rw.database.svc.cluster.local:5432/webapp_template?sslmode=disable
      etcd:
        hosts:
          - 127.0.0.1:2379
      auth:
        jwtSecret: uM1J0T3gP8vL4X2n9K6qH5sR7bN3cD1f
        jwtExpireSeconds: 604800
        admin:
          username: admin
          password: AdminLab123!

deployment:
  name: webapp-template
  replicas: 2
  revisionHistoryLimit: 10
  image: harbor.192.168.0.108.nip.io:32668/library/webapp-template-server:ha-lab
  command:
    - /app/server
    - -conf
    - /config/config.yaml
  ports:
    - name: http
      containerPort: 8000
    - name: grpc
      containerPort: 9000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 768Mi
  readinessProbe:
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
  livenessProbe:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 20
    periodSeconds: 20
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
  volumeMounts:
    - name: config
      mountPath: /config
      readOnly: true
  volumes:
    - name: config
      secret:
        secretName: webapp-template-config

service:
  name: webapp-template
  ports:
    - name: http
      port: 80
      targetPort: http
    - name: grpc
      port: 9000
      targetPort: grpc

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Max

pdb:
  name: webapp-template
  minAvailable: 1

ingress:
  name: webapp-template
  annotations:
    # 保留足够余量，避免日常巡检和默认压测被误伤，同时先对单 IP 突发流量做基础兜底。
    nginx.ingress.kubernetes.io/limit-connections: "40"
    nginx.ingress.kubernetes.io/limit-rps: "60"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
    nginx.ingress.kubernetes.io/proxy-body-size: "8m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
  ingressClassName: nginx
  rules:
    - paths:
        - path: /
          pathType: Prefix
          servicePort: 80
    - host: app.192.168.0.108.nip.io
      paths:
        - path: /
          pathType: Prefix
          servicePort: 80

networkPolicy:
  name: webapp-template
  ingress:
    # 只允许 ingress controller 和节点侧健康检查来源直接进 Pod，避免同集群其它业务 Pod 横向直连。
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
    - from:
        - ipBlock:
            cidr: 192.168.0.0/24
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: database
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 4318

resourceQuota:
  name: webapp-quota
  hard:
    requests.cpu: "1"
    requests.memory: 2Gi
    limits.cpu: "2"
    limits.memory: 3Gi
    pods: "10"

limitRange:
  name: webapp-defaults
  limits:
    - type: Container
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      default:
        cpu: 500m
        memory: 512Mi
      max:
        cpu: "1"
        memory: 1Gi
