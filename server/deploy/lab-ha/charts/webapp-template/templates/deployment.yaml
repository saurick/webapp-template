# yamllint disable-file
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ required "deployment.name is required" .Values.deployment.name }}
  namespace: {{ required "namespace.name is required" .Values.namespace.name }}
  labels:
{{ include "webapp-template.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.deployment.replicas }}
  revisionHistoryLimit: {{ .Values.deployment.revisionHistoryLimit }}
{{- if gt (int .Values.deployment.minReadySeconds) 0 }}
  minReadySeconds: {{ .Values.deployment.minReadySeconds }}
{{- end }}
{{- if .Values.deployment.progressDeadlineSeconds }}
  progressDeadlineSeconds: {{ .Values.deployment.progressDeadlineSeconds }}
{{- end }}
{{- with .Values.deployment.strategy }}
  strategy:
{{ toYaml . | nindent 4 }}
{{- end }}
  selector:
    matchLabels:
{{ include "webapp-template.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
{{ include "webapp-template.selectorLabels" . | nindent 8 }}
    spec:
{{- if .Values.deployment.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ .Values.deployment.terminationGracePeriodSeconds }}
{{- end }}
{{- with .Values.deployment.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- range . }}
        - maxSkew: {{ .maxSkew }}
          topologyKey: {{ .topologyKey }}
          whenUnsatisfiable: {{ .whenUnsatisfiable }}
          labelSelector:
            matchLabels:
{{ include "webapp-template.selectorLabels" $ | nindent 14 }}
        {{- end }}
{{- end }}
      containers:
        - name: server
          image: {{ required "deployment.image is required" .Values.deployment.image }}
          imagePullPolicy: {{ .Values.deployment.imagePullPolicy }}
{{- with .Values.deployment.command }}
          command:
{{ toYaml . | nindent 12 }}
{{- end }}
{{- with .Values.deployment.env }}
          env:
{{ toYaml . | nindent 12 }}
{{- end }}
          ports:
{{ toYaml .Values.deployment.ports | nindent 12 }}
          resources:
{{ toYaml .Values.deployment.resources | nindent 12 }}
{{- with .Values.deployment.startupProbe }}
          startupProbe:
{{ toYaml . | nindent 12 }}
{{- end }}
          readinessProbe:
{{ toYaml .Values.deployment.readinessProbe | nindent 12 }}
          livenessProbe:
{{ toYaml .Values.deployment.livenessProbe | nindent 12 }}
          volumeMounts:
{{ toYaml .Values.deployment.volumeMounts | nindent 12 }}
      volumes:
{{ toYaml .Values.deployment.volumes | nindent 8 }}
