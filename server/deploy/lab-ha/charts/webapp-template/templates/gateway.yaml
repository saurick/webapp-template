# yamllint disable-file
{{- if .Values.gateway.enabled }}
{{- if not .Values.gateway.listeners }}
{{- fail "gateway.listeners is required when gateway.enabled=true" }}
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ required "gateway.name is required" .Values.gateway.name }}
  namespace: {{ required "namespace.name is required" .Values.namespace.name }}
{{- with .Values.gateway.annotations }}
  annotations:
{{ toYaml . | nindent 4 }}
{{- end }}
{{- with .Values.gateway.labels }}
  labels:
{{ toYaml . | nindent 4 }}
{{- end }}
spec:
  gatewayClassName: {{ required "gateway.gatewayClassName is required" .Values.gateway.gatewayClassName }}
{{- with .Values.gateway.infrastructure }}
  infrastructure:
{{ toYaml . | nindent 4 }}
{{- end }}
  listeners:
{{ toYaml .Values.gateway.listeners | nindent 4 }}
{{- end }}
