# yamllint disable-file
{{- if .Values.httpRoutes }}
{{- range $route := .Values.httpRoutes }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ required "httpRoutes[].name is required" $route.name }}
  namespace: {{ required "namespace.name is required" $.Values.namespace.name }}
{{- with $route.annotations }}
  annotations:
{{ toYaml . | nindent 4 }}
{{- end }}
spec:
{{- with $route.parentRefs }}
  parentRefs:
{{ toYaml . | nindent 4 }}
{{- end }}
{{- with $route.hostnames }}
  hostnames:
{{ toYaml . | nindent 4 }}
{{- end }}
  rules:
{{ toYaml $route.rules | nindent 4 }}
{{- end }}
{{- end }}
