# yamllint disable-file
apiVersion: v1
kind: Secret
metadata:
  name: {{ required "configSecret.name is required" .Values.configSecret.name }}
  namespace: {{ required "namespace.name is required" .Values.namespace.name }}
type: {{ .Values.configSecret.type }}
stringData:
  {{ .Values.configSecret.dataKey }}: |
    {{- /*
    配置文件保持字面量字符串，避免 Helm 对 DSN、占位 Secret 名和值班参数做二次拼装。
    */}}
{{ .Values.configSecret.content | nindent 4 }}
