# yamllint disable-file
{{- $rollout := .Values.rollout | default (dict) }}
{{- $analysis := $rollout.analysis | default (dict) }}
{{- if and (default false $rollout.enabled) (default false $analysis.enabled) }}
{{- $rolloutName := default .Values.deployment.name $rollout.name }}
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: {{ printf "%s-readyz-check" $rolloutName }}
  namespace: {{ required "namespace.name is required" .Values.namespace.name }}
  labels:
{{ include "webapp-template.selectorLabels" . | nindent 4 }}
spec:
  args:
    - name: readyUrl
  metrics:
    - name: readyz
      count: {{ $analysis.count }}
      interval: {{ $analysis.interval }}
      initialDelay: {{ $analysis.initialDelay | quote }}
      failureLimit: {{ $analysis.failureLimit }}
      successCondition: result == {{ $analysis.expectedReadyBody | quote }}
      provider:
        web:
          # 这里直接走正式 Gateway 入口，确保蓝绿切换验证的是 active/preview 对外端口。
          url: '{{ "{{args.readyUrl}}" }}'
          timeoutSeconds: {{ $analysis.timeoutSeconds }}
{{- end }}
