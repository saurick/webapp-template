apiVersion: v1
kind: ConfigMap
metadata:
  name: jaeger-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: jaeger
    app.kubernetes.io/component: tracing
data:
  config.yaml: |
    service:
      extensions: [jaeger_storage, jaeger_query]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [jaeger_storage_exporter]
      telemetry:
        metrics:
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888
    extensions:
      jaeger_query:
        storage:
          traces: badger_store
      jaeger_storage:
        backends:
          badger_store:
            badger:
              directories:
                keys: /var/lib/jaeger/badger/keys
                values: /var/lib/jaeger/badger/values
              ephemeral: false
              ttl:
                spans: 168h
              metrics_update_interval: 10s
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      memory_limiter:
        check_interval: 5s
        limit_mib: 256
        spike_limit_mib: 64
      batch:
        send_batch_size: 512
        timeout: 2s
    exporters:
      jaeger_storage_exporter:
        trace_storage: badger_store
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jaeger-data
  namespace: monitoring
  labels:
    app.kubernetes.io/name: jaeger
    app.kubernetes.io/component: tracing
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: monitoring
  labels:
    app.kubernetes.io/name: jaeger
    app.kubernetes.io/component: tracing
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    # 单副本 + 本地 Badger PVC 不适合默认 RollingUpdate，否则会卡在同一卷的多 Pod 竞争上。
    type: Recreate
    rollingUpdate: null
  selector:
    matchLabels:
      app.kubernetes.io/name: jaeger
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jaeger
        app.kubernetes.io/component: tracing
    spec:
      initContainers:
        - name: prepare-data-dir
          image: jaegertracing/jaeger:2.14.1
          command:
            - sh
            - -c
            - mkdir -p /var/lib/jaeger/badger/keys /var/lib/jaeger/badger/values && chown -R 10001:0 /var/lib/jaeger
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          volumeMounts:
            - name: data
              mountPath: /var/lib/jaeger
      containers:
        - name: jaeger
          # 当前仍保持单副本轻量 tracing，但把最近 traces 落到本地 PVC，避免节点/Pod 重启后排障线索直接清空。
          image: jaegertracing/jaeger:2.14.1
          imagePullPolicy: IfNotPresent
          args:
            - --config=file:/etc/jaeger/config.yaml
          ports:
            - name: query
              containerPort: 16686
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: metrics
              containerPort: 8888
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          readinessProbe:
            tcpSocket:
              port: query
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: query
            initialDelaySeconds: 20
            periodSeconds: 20
          securityContext:
            # 官方镜像默认以 uid=10001 运行，这里显式写明，避免 PVC 权限回退时又变成“配置对了但进程起不来”。
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 0
          volumeMounts:
            - name: config
              mountPath: /etc/jaeger
              readOnly: true
            - name: data
              mountPath: /var/lib/jaeger
      volumes:
        - name: config
          configMap:
            name: jaeger-config
        - name: data
          persistentVolumeClaim:
            claimName: jaeger-data
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: monitoring
  labels:
    app.kubernetes.io/name: jaeger
    app.kubernetes.io/component: tracing
    release: kube-prometheus-stack
spec:
  selector:
    app.kubernetes.io/name: jaeger
  ports:
    - name: query
      port: 16686
      targetPort: query
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
    - name: metrics
      port: 8888
      targetPort: metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: jaeger
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - monitoring
  selector:
    matchLabels:
      app.kubernetes.io/name: jaeger
      release: kube-prometheus-stack
  endpoints:
    - port: metrics
      interval: 30s
      scrapeTimeout: 10s
