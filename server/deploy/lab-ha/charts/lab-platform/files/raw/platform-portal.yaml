          const langButtons = Array.from(document.querySelectorAll('.lang-btn'));
          const copyButtons = Array.from(document.querySelectorAll('.copy'));
          let currentLocale = 'en';

          const getMessage = (locale, key) => {
            return translations[locale][key] || translations.en[key] || '';
          };

          const renderCopyButton = (button) => {
            const state = button.getAttribute('data-copy-state') || 'default';
            const messageKey = state === 'default' ? 'copy.default' : `copy.${state}`;
            button.textContent = getMessage(currentLocale, messageKey);
          };

          const setActiveLanguage = (locale) => {
            langButtons.forEach((button) => {
              button.setAttribute('aria-pressed', button.getAttribute('data-lang') === locale ? 'true' : 'false');
            });
          };

          const applyTranslations = (locale) => {
            currentLocale = locale;
            document.documentElement.lang = locale === 'zh' ? 'zh-CN' : 'en';
            document.title = getMessage(locale, 'document.title');

            document.querySelectorAll('[data-i18n]').forEach((node) => {
              const key = node.getAttribute('data-i18n');
              node.textContent = getMessage(locale, key);
            });

            document.querySelectorAll('[data-i18n-html]').forEach((node) => {
              const key = node.getAttribute('data-i18n-html');
              node.innerHTML = getMessage(locale, key);
            });

            document.querySelectorAll('[data-i18n-aria-label]').forEach((node) => {
              const key = node.getAttribute('data-i18n-aria-label');
              node.setAttribute('aria-label', getMessage(locale, key));
            });

            copyButtons.forEach((button) => {
              renderCopyButton(button);
            });
            setActiveLanguage(locale);
          };

          const loadPreferredLocale = () => {
            // 本地已有明确选择时优先复用；没有存储再按浏览器语言回退。
            try {
              const stored = window.localStorage.getItem(PORTAL_LANGUAGE_STORAGE_KEY);
              if (stored === 'zh' || stored === 'en') {
                return stored;
              }
            } catch (_err) {
              // 无痕或受限环境拿不到 localStorage 时，继续走浏览器语言兜底。
            }
            return navigator.language && navigator.language.toLowerCase().startsWith('zh') ? 'zh' : 'en';
          };

          const savePreferredLocale = (locale) => {
            try {
              window.localStorage.setItem(PORTAL_LANGUAGE_STORAGE_KEY, locale);
            } catch (_err) {
              // 语言切换仍然生效，只是不记忆下次访问偏好。
            }
          };

          // Portal 只做静态导航、轻量双语与复制反馈，实时状态仍以 Prometheus / GitLab 为准。
          langButtons.forEach((button) => {
            button.addEventListener('click', () => {
              const locale = button.getAttribute('data-lang') || 'en';
              savePreferredLocale(locale);
              applyTranslations(locale);
            });
          });

          copyButtons.forEach((button) => {
            renderCopyButton(button);
            button.addEventListener('click', async () => {
              // 页面继续展示“账号 / 密码”，但按钮只复制密码，避免粘贴时把用户名一并带走。
              const value = button.getAttribute('data-copy') || '';
              clearTimeout(button._copyTimer);
              try {
                await navigator.clipboard.writeText(value);
                button.setAttribute('data-copy-state', 'success');
                renderCopyButton(button);
                button._copyTimer = setTimeout(() => {
                  button.setAttribute('data-copy-state', 'default');
                  renderCopyButton(button);
                }, 1200);
              } catch (_err) {
                // 剪贴板权限不可用时保留人工复制提示，避免用户误以为已经成功。
                button.setAttribute('data-copy-state', 'fallback');
                renderCopyButton(button);
                button._copyTimer = setTimeout(() => {
                  button.setAttribute('data-copy-state', 'default');
                  renderCopyButton(button);
                }, 1800);
              }
            });
          });

          applyTranslations(loadPreferredLocale());
        </script>
      </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab-portal
  namespace: lab-portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lab-portal
  template:
    metadata:
      labels:
        app: lab-portal
    spec:
      containers:
        - name: nginx
          image: docker.m.daocloud.io/library/nginx:1.27-alpine
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 30m
              memory: 32Mi
            limits:
              cpu: 150m
              memory: 96Mi
          volumeMounts:
            # 避免 subPath 导致 ConfigMap 更新后页面内容不热刷新。
            - name: html
              mountPath: /usr/share/nginx/html
      volumes:
        - name: html
          configMap:
            name: lab-portal-site
---
apiVersion: v1
kind: Service
metadata:
  name: lab-portal
  namespace: lab-portal
spec:
  type: NodePort
  selector:
    app: lab-portal
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30088
