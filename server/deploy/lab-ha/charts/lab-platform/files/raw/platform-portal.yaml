apiVersion: v1
kind: Namespace
metadata:
  name: lab-portal
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lab-portal-site
  namespace: lab-portal
data:
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>HA Lab Portal</title>
        <link
          rel="icon"
          type="image/svg+xml"
          href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%2366d9ef'/%3E%3Cstop offset='100%25' stop-color='%23ffd166'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='18' fill='%2307111f'/%3E%3Cpath d='M16 44V20h8l8 12 8-12h8v24h-8V31l-8 11-8-11v13z' fill='url(%23g)'/%3E%3Ccircle cx='50' cy='16' r='5' fill='%23ffd166'/%3E%3C/svg%3E"
        >
        <style>
          :root {
            --bg: #07111f;
            --panel: #0e1c2f;
            --line: #1f3654;
            --text: #eaf3ff;
            --muted: #9bb4d1;
            --accent: #66d9ef;
            --accent-2: #ffd166;
            --ok: #7bd88f;
            --warn: #ffd166;
            --danger: #ff7b72;
          }
          * { box-sizing: border-box; }
          body {
            margin: 0;
            font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", sans-serif;
            background:
              radial-gradient(circle at top left, rgba(102,217,239,0.18), transparent 32%),
              radial-gradient(circle at top right, rgba(255,209,102,0.14), transparent 28%),
              linear-gradient(180deg, #07111f 0%, #081521 100%);
            color: var(--text);
            min-height: 100vh;
          }
          .wrap {
            max-width: 1180px;
            margin: 0 auto;
            padding: 32px 20px 56px;
          }
          .hero {
            padding: 28px;
            border: 1px solid rgba(102,217,239,0.15);
            background: rgba(14,28,47,0.78);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.28);
          }
          .hero-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 18px;
          }
          .hero-copy {
            min-width: 0;
            flex: 1;
          }
          .eyebrow {
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.18em;
            font-size: 12px;
            margin-bottom: 14px;
          }
          .lang-switch {
            display: inline-flex;
            gap: 8px;
            padding: 6px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
          }
          .lang-btn {
            border: 0;
            border-radius: 999px;
            padding: 8px 12px;
            min-width: 64px;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.04em;
            transition: background 160ms ease, color 160ms ease, transform 160ms ease;
          }
          .lang-btn:hover {
            color: var(--text);
            transform: translateY(-1px);
          }
          .lang-btn[aria-pressed="true"] {
            background: linear-gradient(180deg, rgba(102,217,239,0.28), rgba(102,217,239,0.16));
            color: var(--text);
            box-shadow: inset 0 0 0 1px rgba(102,217,239,0.18);
          }
          h1 {
            margin: 0;
            font-size: clamp(28px, 5vw, 52px);
            line-height: 1.04;
          }
          .sub {
            margin: 14px 0 0;
            color: var(--muted);
            max-width: 760px;
            line-height: 1.7;
            font-size: 16px;
          }
          .pill-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 18px;
          }
          .pill {
            border-radius: 999px;
            padding: 8px 12px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            color: var(--muted);
            font-size: 13px;
          }
          .pill b {
            color: var(--text);
          }
          .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
            margin-top: 22px;
          }
          .card {
            display: block;
            text-decoration: none;
            color: inherit;
            padding: 18px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.08);
            background: linear-gradient(180deg, rgba(15,28,44,0.95), rgba(11,20,34,0.92));
            transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
          }
          .card:hover {
            transform: translateY(-2px);
            border-color: rgba(102,217,239,0.45);
            box-shadow: 0 14px 36px rgba(0,0,0,0.22);
          }
          .card.is-busy,
          .status-link.is-busy {
            pointer-events: none;
            opacity: 0.68;
            transform: none !important;
          }
          .card small {
            display: block;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.16em;
            margin-bottom: 10px;
            font-size: 11px;
          }
          .card strong {
            display: block;
            font-size: 20px;
            margin-bottom: 8px;
          }
          .card span {
            display: block;
            color: var(--muted);
            line-height: 1.6;
            font-size: 14px;
          }
          .notes {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            margin-top: 24px;
          }
          .creds {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 16px;
            margin-top: 24px;
          }
          .snapshot {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
            margin-top: 24px;
          }
          .note {
            padding: 18px;
            border-radius: 18px;
            background: rgba(8,16,29,0.86);
            border: 1px solid rgba(255,255,255,0.08);
          }
          .note h2 {
            margin: 0 0 10px;
            font-size: 16px;
          }
          .note p,
          .note li {
            color: var(--muted);
            line-height: 1.7;
            font-size: 14px;
          }
          .cred {
            padding: 18px;
            border-radius: 18px;
            background: linear-gradient(180deg, rgba(11,21,36,0.96), rgba(9,16,28,0.94));
            border: 1px solid rgba(255,255,255,0.08);
          }
          .cred h2 {
            margin: 0 0 12px;
            font-size: 18px;
          }
          .cred-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-top: 1px solid rgba(255,255,255,0.06);
          }
          .cred-line:first-of-type { border-top: 0; }
          .cred-label {
            color: var(--muted);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
          }
          .cred-value {
            color: var(--text);
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 13px;
            word-break: break-all;
          }
          .copy {
            border: 0;
            border-radius: 999px;
            min-width: 112px;
            padding: 7px 12px;
            background: rgba(102,217,239,0.14);
            color: var(--accent);
            cursor: pointer;
            font-size: 12px;
            white-space: nowrap;
          }
          .copy:hover { background: rgba(102,217,239,0.22); }
          ul { margin: 10px 0 0; padding-left: 18px; }
          code {
            background: rgba(255,255,255,0.06);
            padding: 2px 6px;
            border-radius: 6px;
          }
          .tag {
            display: inline-block;
            margin-top: 12px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(255,209,102,0.12);
            color: var(--accent-2);
            font-size: 12px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
          }
          .status-ok {
            color: var(--ok);
            font-weight: 600;
          }
          .status-loading {
            color: var(--accent);
            font-weight: 600;
          }
          .status-warn {
            color: var(--warn);
            font-weight: 600;
          }
          .status-fail {
            color: var(--danger);
            font-weight: 700;
          }
          .status-card {
            padding: 18px;
            border-radius: 18px;
            background: linear-gradient(180deg, rgba(10,20,34,0.96), rgba(8,16,28,0.94));
            border: 1px solid rgba(255,255,255,0.08);
          }
          .status-emphasis {
            border-color: rgba(102,217,239,0.28);
            box-shadow: inset 0 0 0 1px rgba(102,217,239,0.12);
          }
          .status-card h2 {
            margin: 0 0 8px;
            font-size: 16px;
          }
          .status-value {
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 8px;
          }
          .status-card p {
            margin: 0;
            color: var(--muted);
            line-height: 1.7;
            font-size: 14px;
          }
          .status-detail {
            margin-top: 8px !important;
            color: var(--muted);
            font-size: 13px !important;
          }
          .status-card a {
            color: var(--accent);
          }
          .status-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 14px;
          }
          .status-link {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            border-radius: 999px;
            padding: 8px 12px;
            background: rgba(102,217,239,0.14);
            color: var(--accent);
            border: 1px solid rgba(102,217,239,0.12);
            font-size: 13px;
            font-weight: 600;
            transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
          }
          .status-link:hover {
            transform: translateY(-1px);
            background: rgba(102,217,239,0.2);
            border-color: rgba(102,217,239,0.28);
          }
          .status-link-secondary {
            background: rgba(255,209,102,0.12);
            border-color: rgba(255,209,102,0.16);
            color: var(--accent-2);
          }
          .status-link-secondary:hover {
            background: rgba(255,209,102,0.18);
            border-color: rgba(255,209,102,0.28);
          }
          .hidden {
            display: none;
          }
          @media (max-width: 720px) {
            .hero-head {
              flex-direction: column;
            }
            .lang-switch {
              align-self: flex-start;
            }
          }
        </style>
      </head>
      <body>
        <div class="wrap">
          <section class="hero">
            <div class="hero-head">
              <div class="hero-copy">
                <div class="eyebrow" data-i18n="hero.eyebrow">3-node HA Lab</div>
                <h1 data-i18n="hero.title">WebApp Platform Portal</h1>
                <p class="sub" data-i18n-html="hero.sub">
                  Direct browser entrypoints for the current lab cluster. These links are mapped to
                  stable <code>192.168.0.108:port</code> endpoints so they keep working even when
                  <code>nip.io</code> or Host-header based routes are unreliable on the client side.
                </p>
              </div>
              <div
                class="lang-switch"
                role="group"
                aria-label="Switch language"
                data-i18n-aria-label="language.switch"
              >
                <button type="button" class="lang-btn" data-lang="zh" aria-pressed="false">中文</button>
                <button type="button" class="lang-btn" data-lang="en" aria-pressed="true">EN</button>
              </div>
            </div>
            <div class="pill-row">
              <div class="pill" data-i18n-html="pill.mode"><b>Mode</b> Experiment HA</div>
              <div class="pill" data-i18n-html="pill.nodes"><b>Nodes</b> 3 VM / single stable host</div>
              <div class="pill" data-i18n-html="pill.status"><b>Status</b> <span class="status-ok">Healthy</span></div>
              <div class="pill" data-i18n-html="pill.bestEntry"><b>Best Entry</b> IP:Port direct</div>
              <div class="pill" data-i18n-html="pill.curated"><b>Portal Curated</b> 2026-03-21</div>
            </div>
            <div class="grid">
              <a class="card" href="http://192.168.0.108:32668" target="_blank" rel="noreferrer" data-i18n-html="cards.app">
                <small>App</small><strong>WebApp</strong><span>Main product site.</span>
              </a>
              <a class="card" href="http://192.168.0.108:30088" target="_blank" rel="noreferrer" data-i18n-html="cards.portal">
                <small>Portal</small><strong>Lab Portal</strong><span>This navigation page itself.</span>
              </a>
              <a class="card" href="http://192.168.0.108:30002" target="_blank" rel="noreferrer" data-i18n-html="cards.registry">
                <small>Registry</small><strong>Harbor</strong><span>Container registry UI.</span>
              </a>
              <a class="card" href="http://192.168.0.108:30081" target="_blank" rel="noreferrer" data-i18n-html="cards.grafana">
                <small>Metrics</small><strong>Grafana</strong><span>Dashboards and observability.</span>
              </a>
              <a class="card" href="http://192.168.0.108:30081/d/lab-ha-overview/ha-lab-ops-overview" target="_blank" rel="noreferrer" data-i18n-html="cards.ops">
                <small>Ops</small><strong>Ops Overview</strong><span>Daily on-call dashboard for cluster, app, backup, and alerts.</span>
              </a>
              <a class="card" href="http://192.168.0.108:30081/d/lab-ha-data/ha-lab-data-and-storage" target="_blank" rel="noreferrer" data-i18n-html="cards.data">
                <small>Data</small><strong>Data &amp; Storage</strong><span>Database, Harbor, Longhorn, SeaweedFS, and PVC health view.</span>
              </a>
              <a class="card" href="http://192.168.0.108:30081/d/lab-ha-postgres/ha-lab-postgresql-and-backup" target="_blank" rel="noreferrer" data-i18n-html="cards.database">
                <small>Database</small><strong>PostgreSQL &amp; Backup</strong><span>Primary/replica roles, lag, DB size, and Velero backup signals.</span>
              </a>
              <a class="card" href="http://192.168.0.108:30081/d/lab-ha-gitops/ha-lab-gitops-and-delivery" target="_blank" rel="noreferrer" data-i18n-html="cards.delivery">
                <small>Delivery</small><strong>GitOps &amp; Delivery</strong><span>Argo CD sync, GitLab probe, rollout controller, and release signals.</span>
              </a>
              <a id="run-loadtest-card" class="card" href="http://192.168.0.108:8929/root/webapp-template-lab/-/pipelines/new?ref=master&amp;var[PIPELINE_MODE]=loadtest&amp;var[LOADTEST_SCENARIO]=system" target="_blank" rel="noreferrer" data-i18n-html="cards.runLoadtest">
                <small>Testing</small><strong>Run Load Test</strong><span>GitLab one-click entry with a safe default system scenario and 192-address artifacts.</span>
              </a>
              <a class="card" href="http://192.168.0.108:30081/d/lab-ha-loadtest/ha-lab-load-test" target="_blank" rel="noreferrer" data-i18n-html="cards.loadtestDashboard">
                <small>Testing</small><strong>Load Test Dashboard</strong><span>Grafana view for k6 remote-write trends, latency, failures, and per-step breakdown.</span>
              </a>
              <a class="card" href="http://192.168.0.108:30081/d/lab-ha-loadtest-official/ha-lab-load-test-official-k6" target="_blank" rel="noreferrer" data-i18n-html="cards.loadtestDashboardOfficial">
                <small>Testing</small><strong>Official k6 Dashboard</strong><span>Official Grafana k6 Prometheus dashboard, adapted to the lab Prometheus datasource.</span>
              </a>
              <a class="card" href="http://192.168.0.108:8929/root/webapp-template-lab/-/blob/master/server/deploy/lab-ha/docs/LOAD_TEST.md" target="_blank" rel="noreferrer" data-i18n-html="cards.loadtest">
                <small>Testing</small><strong>Load Test Guide</strong><span>k6 entry commands, safe scenarios, and observability flow for HA drills.</span>
              </a>
              <a class="card" href="http://192.168.0.108:30090/graph" target="_blank" rel="noreferrer" data-i18n-html="cards.prometheus">
                <small>Metrics</small><strong>Prometheus</strong><span>Raw scrape and query UI.</span>
              </a>
              <a class="card" href="http://192.168.0.108:30093" target="_blank" rel="noreferrer" data-i18n-html="cards.alertmanager">
                <small>Alerts</small><strong>Alertmanager</strong><span>Alert grouping and routing.</span>
              </a>
              <a class="card" href="https://192.168.0.108:30443" target="_blank" rel="noreferrer" data-i18n-html="cards.argocd">
                <small>GitOps</small><strong>Argo CD</strong><span>Self-signed HTTPS. Browser may ask you to continue once.</span>
              </a>
              <a class="card" href="http://192.168.0.108:30084" target="_blank" rel="noreferrer" data-i18n-html="cards.longhorn">
                <small>Storage</small><strong>Longhorn</strong><span>Persistent volume UI.</span>
              </a>
              <a class="card" href="http://192.168.0.108:30085" target="_blank" rel="noreferrer" data-i18n-html="cards.hubble">
                <small>Network</small><strong>Hubble</strong><span>Cilium flow visibility UI.</span>
              </a>
              <a class="card" href="http://192.168.0.108:30888" target="_blank" rel="noreferrer" data-i18n-html="cards.seaweedfs">
                <small>Object Store</small><strong>SeaweedFS Filer</strong><span>Human-friendly browser UI.</span>
              </a>
              <a class="card" href="http://192.168.0.108:30086" target="_blank" rel="noreferrer" data-i18n-html="cards.alertSink">
                <small>Alerts</small><strong>Alert Sink</strong><span>Webhook receiver used for smoke tests.</span>
              </a>
              <a class="card" href="http://192.168.0.108:8929/users/sign_in" target="_blank" rel="noreferrer" data-i18n-html="cards.gitlab">
                <small>Source Code</small><strong>GitLab</strong><span>CI/CD and experiment repo.</span>
              </a>
            </div>
            <div class="tag" data-i18n="tag.stableEndpoints">Stable direct browser endpoints</div>
          </section>

          <section class="snapshot">
            <div class="status-card status-emphasis">
              <h2 data-i18n="snapshot.loadtestTitle">Latest Load Test</h2>
              <div id="loadtest-status" class="status-value status-loading" data-i18n="loadtest.state.loading">Loading</div>
              <p id="loadtest-summary" data-i18n="loadtest.body.loading">Checking GitLab for the latest load test result.</p>
              <p id="loadtest-detail" class="status-detail hidden"></p>
              <div class="status-actions">
                <a
                  id="loadtest-primary-link"
                  class="status-link"
                  href="http://192.168.0.108:8929/root/webapp-template-lab/-/pipelines"
                  target="_blank"
                  rel="noreferrer"
                  data-i18n="loadtest.action.openPipelines"
                >Open pipelines</a>
                <a
                  id="loadtest-secondary-link"
                  class="status-link status-link-secondary"
                  href="http://192.168.0.108:8929/root/webapp-template-lab/-/pipelines/new?ref=master&amp;var[PIPELINE_MODE]=loadtest&amp;var[LOADTEST_SCENARIO]=system"
                  target="_blank"
                  rel="noreferrer"
                  data-i18n="loadtest.action.run"
                >Run load test</a>
                <a
                  id="loadtest-tertiary-link"
                  class="status-link hidden"
                  href="http://192.168.0.108:30081/d/lab-ha-loadtest/ha-lab-load-test"
                  target="_blank"
                  rel="noreferrer"
                  data-i18n="loadtest.action.openDashboard"
                >Open dashboard</a>
              </div>
            </div>
            <div class="status-card" data-i18n-html="snapshot.pipeline">
              <h2>CI Pipeline</h2>
              <div class="status-value status-ok">Open live</div>
              <p>
                Use <a href="http://192.168.0.108:8929/root/webapp-template-lab/-/pipelines" target="_blank" rel="noreferrer">GitLab pipeline history</a>
                for the current build truth. This page intentionally no longer pins a single pipeline number.
              </p>
            </div>
            <div class="status-card" data-i18n-html="snapshot.gitops">
              <h2>GitOps Sync</h2>
              <div class="status-value status-ok">Check Argo</div>
              <p>
                Current sync status, live revision, and drift should be checked in
                <a href="https://192.168.0.108:30443" target="_blank" rel="noreferrer">Argo CD</a>
                or the delivery dashboard, not inferred from this static page.
              </p>
            </div>
            <div class="status-card" data-i18n-html="snapshot.drills">
              <h2>HA Drills</h2>
              <div class="status-value status-ok">Use runbook</div>
              <p>
                Latest verified failover and recovery conclusions are kept in
                <a href="http://192.168.0.108:8929/root/webapp-template-lab/-/blob/master/server/deploy/lab-ha/docs/TEST_REPORT.md" target="_blank" rel="noreferrer">TEST_REPORT.md</a>
                and <a href="http://192.168.0.108:8929/root/webapp-template-lab/-/blob/master/server/deploy/lab-ha/docs/RECOVERY_RUNBOOK.md" target="_blank" rel="noreferrer">RECOVERY_RUNBOOK.md</a>.
              </p>
            </div>
            <div class="status-card" data-i18n-html="snapshot.backup">
              <h2>Velero Backup</h2>
              <div class="status-value status-ok">Check dashboard</div>
              <p>
                Current backup recency and recovery signals should be read from the PostgreSQL / backup dashboard
                and live Velero objects instead of a frozen timestamp on this page.
              </p>
            </div>
            <div class="status-card" data-i18n-html="snapshot.alerts">
              <h2>Alert Delivery</h2>
              <div class="status-value status-ok">Check live</div>
              <p>
                Use <a href="http://192.168.0.108:30093" target="_blank" rel="noreferrer">Alertmanager</a>
                and the alert sink to confirm current routing. The portal only records the default path.
              </p>
            </div>
            <div class="status-card" data-i18n-html="snapshot.blackbox">
              <h2>Blackbox Probes</h2>
              <div class="status-value status-ok">Check Grafana</div>
              <p>
                Human-facing entrypoints are under Prometheus blackbox probing.
                Direct truth remains in Prometheus, Grafana, and Alertmanager, not in the static page itself.
              </p>
            </div>
          </section>

          <section class="creds">
            <div class="cred">
              <h2 data-i18n="cred.defaultAccountsTitle">Default Accounts</h2>
              <div class="cred-line">
                <div>
                  <div class="cred-label">WebApp</div>
                  <div class="cred-value">admin / AdminLab123!</div>
                </div>
                <button type="button" class="copy" data-copy="AdminLab123!" data-copy-state="default">Copy password</button>
              </div>
              <div class="cred-line">
                <div>
                  <div class="cred-label">Harbor</div>
                  <div class="cred-value">admin / HarborAdmin123!</div>
                </div>
