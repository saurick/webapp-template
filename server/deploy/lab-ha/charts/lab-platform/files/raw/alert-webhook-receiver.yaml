apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-webhook-receiver
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alert-webhook-receiver
  template:
    metadata:
      labels:
        app: alert-webhook-receiver
    spec:
      containers:
        - name: receiver
          image: registry.aliyuncs.com/google_containers/echoserver:1.10
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 30m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: alert-webhook-receiver
  namespace: monitoring
spec:
  selector:
    app: alert-webhook-receiver
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alert-webhook-receiver
  namespace: monitoring
spec:
  ingressClassName: nginx
  rules:
    - host: alertsink.192.168.0.108.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: alert-webhook-receiver
                port:
                  number: 8080
