apiVersion: v1
kind: ConfigMap
metadata:
  name: lab-ha-grafana-loki-datasource
  namespace: monitoring
  labels:
    grafana_datasource: "1"
    release: kube-prometheus-stack
data:
  loki-datasource.yaml: |-
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki.logging:3100/
        editable: false
        jsonData:
          maxLines: 2000
          # 只对已采样链路暴露跳转字段，避免低采样环境里把未上报 trace 也做成可点击链接。
          derivedFields:
            - datasourceUid: jaeger
              matcherRegex: '"trace_link_id":"([a-f0-9]{32})"'
              name: trace_link_id
              url: '$${__value.raw}'
              urlDisplayLabel: View trace
