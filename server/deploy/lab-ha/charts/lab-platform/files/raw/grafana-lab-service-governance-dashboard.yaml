apiVersion: v1
kind: ConfigMap
metadata:
  name: lab-ha-grafana-service-governance
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    release: kube-prometheus-stack
data:
  lab-ha-service-governance.json: |-
    {
      "id": null,
      "uid": "lab-ha-service-governance",
      "title": "HA Lab / K8s Workloads",
      "tags": ["lab-ha", "governance", "hpa", "edge"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 3,
      "refresh": "30s",
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "WebApp Available Replicas",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 5, "w": 4, "x": 0, "y": 0},
          "targets": [{"expr": "sum(kube_deployment_status_replicas_available{namespace=\"webapp\",deployment=\"webapp-template\"})", "instant": true, "refId": "A"}],
          "options": {"colorMode": "value", "graphMode": "none", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}},
          "fieldConfig": {"defaults": {"unit": "none", "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 2}]}}}
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Prod Trial Available Replicas",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 5, "w": 4, "x": 4, "y": 0},
          "targets": [{"expr": "sum(kube_deployment_status_replicas_available{namespace=\"webapp-prod-trial\",deployment=\"webapp-template-prod-trial\"})", "instant": true, "refId": "A"}],
          "options": {"colorMode": "value", "graphMode": "none", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}},
          "fieldConfig": {"defaults": {"unit": "none", "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 2}]}}}
        },
        {
          "id": 3,
          "type": "stat",
          "title": "HPA Desired Replicas",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 5, "w": 4, "x": 8, "y": 0},
          "targets": [{"expr": "sum(kube_horizontalpodautoscaler_status_desired_replicas{namespace=~\"webapp.*\"})", "instant": true, "refId": "A"}],
          "options": {"colorMode": "value", "graphMode": "none", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}},
          "fieldConfig": {"defaults": {"unit": "none"}}
        },
        {
          "id": 4,
          "type": "stat",
          "title": "WebApp Edge Up Targets",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 5, "w": 4, "x": 12, "y": 0},
          "targets": [{"expr": "sum(probe_success{job=~\"prometheus-blackbox-exporter.*\",target=~\"webapp|webapp-prod-trial-active|webapp-prod-trial-preview\"}) or vector(0)", "instant": true, "refId": "A"}],
          "options": {"colorMode": "value", "graphMode": "none", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}},
          "fieldConfig": {"defaults": {"unit": "none", "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "orange", "value": 1}, {"color": "green", "value": 3}]}}}
        },
        {
          "id": 5,
          "type": "stat",
          "title": "PDB Disruptions Allowed",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 5, "w": 4, "x": 16, "y": 0},
          "targets": [{"expr": "sum(kube_poddisruptionbudget_status_pod_disruptions_allowed{namespace=~\"webapp.*\"})", "instant": true, "refId": "A"}],
          "options": {"colorMode": "value", "graphMode": "none", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}},
          "fieldConfig": {"defaults": {"unit": "none", "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}}
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Rollouts Controller Ready",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 5, "w": 4, "x": 20, "y": 0},
          "targets": [{"expr": "max(argo_rollouts_controller_info)", "instant": true, "refId": "A"}],
          "options": {"colorMode": "value", "graphMode": "none", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}},
          "fieldConfig": {"defaults": {"unit": "none", "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}}
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Deployment Replicas",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 5},
          "targets": [
            {"expr": "sum by(namespace,deployment) (kube_deployment_status_replicas_available{namespace=~\"webapp.*\",deployment=~\"webapp-template.*\"})", "legendFormat": "{{namespace}}/{{deployment}} available", "refId": "A"},
            {"expr": "sum by(namespace,deployment) (kube_deployment_status_replicas{namespace=~\"webapp.*\",deployment=~\"webapp-template.*\"})", "legendFormat": "{{namespace}}/{{deployment}} desired", "refId": "B"}
          ],
          "fieldConfig": {"defaults": {"unit": "none"}},
          "options": {"legend": {"displayMode": "table", "placement": "bottom"}, "tooltip": {"mode": "multi"}}
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "HPA Current vs Desired",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 5},
          "targets": [
            {"expr": "sum by(namespace,horizontalpodautoscaler) (kube_horizontalpodautoscaler_status_current_replicas{namespace=~\"webapp.*\"})", "legendFormat": "{{namespace}}/{{horizontalpodautoscaler}} current", "refId": "A"},
            {"expr": "sum by(namespace,horizontalpodautoscaler) (kube_horizontalpodautoscaler_status_desired_replicas{namespace=~\"webapp.*\"})", "legendFormat": "{{namespace}}/{{horizontalpodautoscaler}} desired", "refId": "B"},
            {"expr": "max by(namespace,horizontalpodautoscaler) (kube_horizontalpodautoscaler_spec_max_replicas{namespace=~\"webapp.*\"})", "legendFormat": "{{namespace}}/{{horizontalpodautoscaler}} max", "refId": "C"}
          ],
          "fieldConfig": {"defaults": {"unit": "none"}},
          "options": {"legend": {"displayMode": "table", "placement": "bottom"}, "tooltip": {"mode": "multi"}}
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Container CPU Cores",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 13},
          "targets": [{"expr": "sum by(namespace,pod) (rate(container_cpu_usage_seconds_total{namespace=~\"webapp.*\",container=\"server\",pod=~\"webapp-template.*\"}[5m]))", "legendFormat": "{{namespace}}/{{pod}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "cores"}},
          "options": {"legend": {"displayMode": "table", "placement": "bottom"}, "tooltip": {"mode": "multi"}}
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "Working Set Memory",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 13},
          "targets": [{"expr": "sum by(namespace,pod) (container_memory_working_set_bytes{namespace=~\"webapp.*\",container=\"server\",pod=~\"webapp-template.*\"})", "legendFormat": "{{namespace}}/{{pod}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "bytes"}},
          "options": {"legend": {"displayMode": "table", "placement": "bottom"}, "tooltip": {"mode": "multi"}}
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "Edge Probe Success",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 21},
          "targets": [{"expr": "probe_success{job=~\"prometheus-blackbox-exporter.*\",target=~\"webapp|webapp-prod-trial-active|webapp-prod-trial-preview\"}", "legendFormat": "{{target}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "none"}},
          "options": {"legend": {"displayMode": "table", "placement": "bottom"}, "tooltip": {"mode": "multi"}}
        },
        {
          "id": 12,
          "type": "timeseries",
          "title": "Edge Probe Duration",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 21},
          "targets": [{"expr": "avg_over_time(probe_duration_seconds{job=~\"prometheus-blackbox-exporter.*\",target=~\"webapp|webapp-prod-trial-active|webapp-prod-trial-preview\"}[5m])", "legendFormat": "{{target}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "s"}},
          "options": {"legend": {"displayMode": "table", "placement": "bottom"}, "tooltip": {"mode": "multi"}}
        },
        {
          "id": 13,
          "type": "timeseries",
          "title": "Pod Restarts",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 29},
          "targets": [{"expr": "max by(namespace,pod) (kube_pod_container_status_restarts_total{namespace=~\"webapp.*\",container=\"server\",pod=~\"webapp-template.*\"})", "legendFormat": "{{namespace}}/{{pod}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "none"}},
          "options": {"legend": {"displayMode": "table", "placement": "bottom"}, "tooltip": {"mode": "multi"}}
        },
        {
          "id": 14,
          "type": "timeseries",
          "title": "PDB Disruptions Allowed",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 29},
          "targets": [{"expr": "max by(namespace,poddisruptionbudget) (kube_poddisruptionbudget_status_pod_disruptions_allowed{namespace=~\"webapp.*\"})", "legendFormat": "{{namespace}}/{{poddisruptionbudget}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "none"}},
          "options": {"legend": {"displayMode": "table", "placement": "bottom"}, "tooltip": {"mode": "multi"}}
        },
        {
          "id": 15,
          "type": "stat",
          "title": "Firing Governance Alerts",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 5, "w": 4, "x": 0, "y": 37},
          "targets": [{"expr": "count(ALERTS{alertname=~\"LabWebappHpaAtMax|LabWebappPdbBudgetExhausted|LabWebappEdgeDown|LabWebappEdgeSlow\",alertstate=\"firing\"}) or vector(0)", "instant": true, "refId": "A"}],
          "options": {"colorMode": "value", "graphMode": "none", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}},
          "fieldConfig": {"defaults": {"unit": "none", "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 1}, {"color": "red", "value": 2}]}}}
        },
        {
          "id": 16,
          "type": "stat",
          "title": "Pending Governance Alerts",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 5, "w": 4, "x": 4, "y": 37},
          "targets": [{"expr": "count(ALERTS{alertname=~\"LabWebappHpaAtMax|LabWebappPdbBudgetExhausted|LabWebappEdgeDown|LabWebappEdgeSlow\",alertstate=\"pending\"}) or vector(0)", "instant": true, "refId": "A"}],
          "options": {"colorMode": "value", "graphMode": "none", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}},
          "fieldConfig": {"defaults": {"unit": "none", "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 1}, {"color": "orange", "value": 2}]}}}
        },
        {
          "id": 17,
          "type": "table",
          "title": "Current Governance Alerts",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 5, "w": 16, "x": 8, "y": 37},
          "targets": [{"expr": "ALERTS{alertname=~\"LabWebappHpaAtMax|LabWebappPdbBudgetExhausted|LabWebappEdgeDown|LabWebappEdgeSlow\",alertstate=~\"pending|firing\"}", "instant": true, "refId": "A"}],
          "options": {"cellHeight": "sm", "showHeader": true},
          "fieldConfig": {"defaults": {"custom": {"align": "auto", "cellOptions": {"type": "auto"}, "inspect": false}}, "overrides": []}
        },
        {
          "id": 18,
          "type": "text",
          "title": "Governance Notes",
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 42},
          "options": {
            "mode": "markdown",
            "content": "### K8s Workloads Notes\n\n- This board focuses on the first-step workload governance baseline: `nodes`, deployments, `HPA`, `Gateway` 正式入口、`PDB`、pod health, and rollout controller readiness.\n- The alert row shows current `pending` / `firing` governance alerts directly from Prometheus `ALERTS`, so on-call can decide whether Alertmanager deserves a deeper look.\n- Network allow / drop truth still lives in [Hubble](http://192.168.0.108:30085), not in Grafana.\n- GitOps drift, sync status, and rollout operations still belong to [Argo CD](https://192.168.0.108:30443) and the delivery board.\n- Edge panels now read direct blackbox probes against `32668 / 30089 / 30091`, no longer depend on `ingress-nginx` controller metrics.\n- This dashboard intentionally stays small enough for on-call triage instead of replacing every detailed view."
          }
        }
      ]
    }
