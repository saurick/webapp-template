apiVersion: v1
kind: Namespace
metadata:
  name: webapp
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: baseline
    pod-security.kubernetes.io/warn: baseline
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp-template
  namespace: webapp
  labels:
    app.kubernetes.io/name: webapp-template
spec:
  replicas: 2
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/name: webapp-template
  template:
    metadata:
      labels:
        app.kubernetes.io/name: webapp-template
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: webapp-template
      containers:
        - name: server
          image: harbor.192.168.0.108.nip.io:32668/library/webapp-template-server:ha-lab
          imagePullPolicy: IfNotPresent
          command: ["/app/server", "-conf", "/config/config.yaml"]
          ports:
            - name: http
              containerPort: 8000
            - name: grpc
              containerPort: 9000
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
      volumes:
        - name: config
          secret:
            secretName: webapp-template-config
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: webapp-template
  namespace: webapp
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: webapp-template
---
apiVersion: v1
kind: Service
metadata:
  name: webapp-template
  namespace: webapp
spec:
  selector:
    app.kubernetes.io/name: webapp-template
  ports:
    - name: http
      port: 80
      targetPort: http
    - name: grpc
      port: 9000
      targetPort: grpc
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: webapp-template
  namespace: webapp
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "8m"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: webapp-template
                port:
                  number: 80
    - host: app.192.168.0.108.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: webapp-template
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: webapp-template
  namespace: webapp
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: webapp-template
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: database
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
