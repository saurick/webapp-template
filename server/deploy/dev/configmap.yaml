apiVersion: v1
kind: ConfigMap
metadata:
  name: your-project-server-config
  namespace: your-project-dev
data:
  # 初始化项目后请替换 traceName、DSN、JWT 密钥和默认管理员密码。
  config.yaml: |
    server:
      http:
        addr: 0.0.0.0:8000
        timeout: 10s
      grpc:
        addr: 0.0.0.0:9000
        timeout: 10s

    log:
      debug: true

    trace:
      jaeger:
        traceName: your-project-server.service
        endpoint: otel-collector.observability.svc.cluster.local:4318
        ratio: 1

    data:
      mysql:
        debug: true
        dsn: root:replace-me@tcp(mysql.your-project-dev.svc.cluster.local:3306)/app?charset=utf8mb4&parseTime=True&loc=Local&interpolateParams=true
      etcd:
        hosts:
          - etcd.your-project-dev.svc.cluster.local:2379
      auth:
        jwtSecret: replace-me
        jwtExpireSeconds: 604800
        admin:
          username: admin
          password: replace-me
