apiVersion: apps/v1
kind: Deployment
metadata:
  name: your-project-server
  namespace: your-project-dev
  labels:
    app.kubernetes.io/name: your-project-server
    app.kubernetes.io/part-of: your-project
    app.kubernetes.io/component: api
spec:
  replicas: 1
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
  selector:
    matchLabels:
      app.kubernetes.io/name: your-project-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app.kubernetes.io/name: your-project-server
        app.kubernetes.io/part-of: your-project
        app.kubernetes.io/component: api
    spec:
      dnsPolicy: ClusterFirst
      imagePullSecrets:
        - name: registry-credentials
      containers:
        - name: server
          image: registry.example.com/your-project/server:latest
          imagePullPolicy: IfNotPresent
          command: ["/app/server", "-conf", "/config/config.yaml"]
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: grpc
              containerPort: 9000
              protocol: TCP
          startupProbe:
            httpGet:
              path: /readyz
              port: http
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            failureThreshold: 3
            periodSeconds: 10
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 3
            periodSeconds: 30
            timeoutSeconds: 2
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: your-project-server-config
