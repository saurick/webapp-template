# server/configs/dev/config.yaml
server:
  http:
    addr: 0.0.0.0:8200
    timeout: 10s
  grpc:
    addr: 0.0.0.0:9200
    timeout: 10s

log:
  debug: true

# 链路追踪服务器
trace:
  jaeger:
    traceName: ""
    # http endpoint
    endpoint: 192.168.0.106:4318
    # endpoint: http://192.168.0.106:4318/v1/traces
    # gRPC endpoint
    # endpoint: http://192.168.0.106:4317
    # 采集率,ratio>=1表示采集所有
    ratio: 1

# 数据相关
data:
  # 主数据库，保存核心数据
  postgres:
    # if true output sql
    debug: true
    # 公共 dev 配置只保留共享 PG 的 192 地址，真实密码请走 POSTGRES_DSN 或 config.local.yaml。
    dsn: "postgres://test_user:replace-me@192.168.0.106:5432/webapp_template?sslmode=disable"

  # 缓存服务
  # redis:
  #   network: tcp
  #   address: 192.168.0.106:6379
  #   password: ""
  #   database: 0
  #   readTimeout: 0.2s
  #   writeTimeout: 0.2s
  etcd:
    hosts:
      - etcd:2379
  # 认证相关：仓库只保留公开占位值，真实私钥/密码请在本地覆盖。
  auth:
    jwtSecret: "replace-me-dev-jwt-secret"
    jwtExpireSeconds: 604800 # 7 days
    admin:
      username: "admin"
      password: "replace-me-admin-password"

# notify:
#   telegram:
#     apiToken: "replace-me-telegram-token"
#     chatId: 0
